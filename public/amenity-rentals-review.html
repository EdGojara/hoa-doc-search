<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Amenity Rentals · Bedrock Intelligence</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="/brand.css">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--navy-deep);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: 14px; line-height: 1.45;
  }
  header.app {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--rule);
    background: var(--navy-deep);
  }
  .brand-lockup { display: flex; align-items: center; gap: 14px; }
  .brand-lockup svg { width: 32px; height: 40px; }
  .brand-lockup .wm {
    font-family: var(--font-serif); font-size: 18px; font-weight: 500;
    color: var(--ink); letter-spacing: -0.01em; line-height: 1.05;
  }
  .brand-lockup .wm em { font-style: italic; color: var(--gold); }
  .brand-lockup .sub {
    font-size: 10.5px; color: var(--ink-faint);
    letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px;
  }
  header .module-name {
    font-family: var(--font-serif); font-size: 22px; font-weight: 500; color: var(--ink);
  }
  header .module-name em { color: var(--gold); font-style: italic; }
  header .util a {
    color: var(--ink-soft); text-decoration: none; font-size: 13px; margin-left: 18px;
  }
  header .util a:hover { color: var(--gold); }

  .shell {
    display: grid; grid-template-columns: 1fr 0;
    transition: grid-template-columns 0.18s ease;
    height: calc(100vh - 73px); overflow: hidden;
  }
  .shell.detail-open { grid-template-columns: 1fr 560px; }
  main.queue { overflow-y: auto; padding: 20px 32px 40px; }
  aside.detail {
    background: var(--navy-soft);
    border-left: 1px solid var(--rule-strong);
    overflow-y: auto; padding: 22px 24px 60px;
  }

  /* ---- Filters ---- */
  .filter-bar {
    display: flex; gap: 14px; align-items: flex-end;
    margin-bottom: 18px; flex-wrap: wrap;
  }
  .filter-bar label {
    font-size: 11px; color: var(--ink-faint);
    letter-spacing: 0.06em; text-transform: uppercase;
    display: flex; flex-direction: column; gap: 4px;
  }
  .filter-bar select, .filter-bar input {
    background: var(--navy-soft); border: 1px solid var(--rule-strong);
    color: var(--ink); padding: 7px 10px; font-size: 13px;
    border-radius: 4px; min-width: 160px;
    font-family: var(--font-sans);
  }
  .filter-bar input[type="search"] { min-width: 240px; }
  .filter-bar .pill {
    background: var(--navy-soft); border: 1px solid var(--rule-strong);
    color: var(--ink-soft); padding: 7px 14px; border-radius: 999px;
    cursor: pointer; font-size: 12.5px; user-select: none;
  }
  .filter-bar .pill.active {
    background: rgba(212,175,55,0.12); border-color: var(--gold); color: var(--gold);
  }
  .filter-bar .count {
    margin-left: auto; color: var(--ink-faint); font-size: 12px; font-family: var(--font-mono);
  }

  /* ---- Queue table ---- */
  table.queue {
    width: 100%; border-collapse: collapse;
    background: var(--navy-soft); border-radius: 6px; overflow: hidden;
  }
  table.queue thead th {
    text-align: left; padding: 11px 14px;
    border-bottom: 1px solid var(--rule-strong);
    font-weight: 500; color: var(--ink-faint);
    font-size: 11px; letter-spacing: 0.07em; text-transform: uppercase;
    white-space: nowrap;
  }
  table.queue tbody tr {
    cursor: pointer; border-bottom: 1px solid var(--rule);
    transition: background 0.1s ease;
  }
  table.queue tbody tr:hover { background: rgba(255,255,255,0.025); }
  table.queue tbody tr.active { background: rgba(212,175,55,0.07); }
  table.queue tbody td {
    padding: 11px 14px; color: var(--ink);
    font-size: 13px; vertical-align: top;
  }
  table.queue tbody td .sub {
    display: block; color: var(--ink-faint); font-size: 11.5px; margin-top: 2px;
  }
  table.queue tbody td.num {
    font-family: var(--font-mono); color: var(--ink-soft); font-size: 12.5px;
  }

  /* ---- Status badges ---- */
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 500;
    text-transform: capitalize; letter-spacing: 0.02em;
    border: 1px solid transparent;
  }
  .badge.draft, .badge.pending_payment {
    background: rgba(168,178,196,0.12); color: var(--ink-soft); border-color: rgba(168,178,196,0.25);
  }
  .badge.confirmed { background: rgba(80,200,120,0.12); color: #6BD194; border-color: rgba(80,200,120,0.3); }
  .badge.completed { background: rgba(80,150,200,0.12); color: #7DB0E0; border-color: rgba(80,150,200,0.3); }
  .badge.cancelled, .badge.refunded {
    background: rgba(168,178,196,0.08); color: var(--ink-faint); border-color: rgba(168,178,196,0.15);
  }
  .badge.no_show { background: rgba(231,90,90,0.12); color: #E48A8A; border-color: rgba(231,90,90,0.3); }
  .badge.alert {
    background: rgba(231,180,90,0.14); color: #E8C96E; border-color: rgba(231,180,90,0.4);
    margin-left: 6px;
  }

  /* ---- Empty state ---- */
  .empty-state {
    padding: 80px 20px; text-align: center;
    color: var(--ink-faint);
    background: var(--navy-soft); border-radius: 6px;
  }
  .empty-state h2 {
    font-family: var(--font-serif); font-size: 22px;
    color: var(--ink-soft); margin: 0 0 8px;
  }
  .empty-state p { margin: 6px 0; font-size: 13.5px; }

  /* ---- Detail panel ---- */
  aside.detail h2 {
    font-family: var(--font-serif); font-size: 20px; color: var(--ink);
    margin: 0 0 4px;
  }
  aside.detail .ref {
    font-family: var(--font-mono); font-size: 12px;
    color: var(--gold); margin-bottom: 14px;
  }
  aside.detail .close-detail {
    float: right; background: transparent; border: none;
    color: var(--ink-faint); font-size: 20px; cursor: pointer; margin-top: -4px;
  }
  aside.detail .close-detail:hover { color: var(--gold); }
  aside.detail section {
    margin-bottom: 22px; padding-bottom: 18px;
    border-bottom: 1px solid var(--rule);
  }
  aside.detail section:last-of-type { border-bottom: none; }
  aside.detail section h3 {
    font-size: 11px; color: var(--ink-faint);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin: 0 0 10px; font-weight: 500;
  }
  aside.detail dl {
    display: grid; grid-template-columns: 140px 1fr;
    gap: 4px 12px; margin: 0; font-size: 13px;
  }
  aside.detail dt { color: var(--ink-faint); font-size: 12.5px; }
  aside.detail dd { margin: 0; color: var(--ink); }

  .alert-block {
    background: rgba(231,180,90,0.08);
    border: 1px solid rgba(231,180,90,0.3);
    border-left: 3px solid #E8C96E;
    padding: 12px 14px; border-radius: 6px;
    margin-bottom: 14px;
  }
  .alert-block .heading {
    font-size: 11px; font-weight: 500;
    color: #E8C96E; letter-spacing: 0.06em;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .alert-block p { margin: 0 0 8px; font-size: 13px; }
  .alert-block .button-row { display: flex; gap: 8px; margin-top: 10px; }

  /* ---- Payment breakdown ---- */
  .pay-rows { font-size: 12.5px; }
  .pay-rows .row {
    display: flex; justify-content: space-between;
    padding: 4px 0; border-bottom: 1px dotted var(--rule);
  }
  .pay-rows .row:last-child { border-bottom: none; }
  .pay-rows .row .meta-tag {
    font-size: 10px; color: var(--ink-faint);
    margin-left: 6px;
  }
  .pay-rows .row.refunded .meta-tag { color: var(--gold); }
  .pay-rows .total {
    display: flex; justify-content: space-between;
    margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--rule-strong);
    font-weight: 500; color: var(--ink);
  }

  /* ---- Inspection form ---- */
  .inspect-form input,
  .inspect-form select,
  .inspect-form textarea {
    width: 100%; background: var(--navy-deep);
    border: 1px solid var(--rule-strong);
    color: var(--ink); padding: 8px 10px; font-size: 13px;
    border-radius: 4px;
    font-family: var(--font-sans);
  }
  .inspect-form textarea { min-height: 60px; resize: vertical; }
  .inspect-form label {
    display: block; font-size: 11px; color: var(--ink-faint);
    letter-spacing: 0.06em; text-transform: uppercase;
    margin: 12px 0 4px;
  }
  .inspect-form .pass-fail {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    margin: 8px 0;
  }
  .inspect-form .pass-fail button {
    background: var(--navy-deep); border: 1px solid var(--rule-strong);
    color: var(--ink-soft); padding: 12px;
    font-family: var(--font-sans); font-size: 13.5px;
    cursor: pointer; border-radius: 4px;
    transition: all 0.15s ease;
  }
  .inspect-form .pass-fail button.selected.pass {
    border-color: #6BD194; background: rgba(80,200,120,0.08); color: #6BD194;
  }
  .inspect-form .pass-fail button.selected.fail {
    border-color: #E48A8A; background: rgba(231,90,90,0.08); color: #E48A8A;
  }
  .button-row { display: flex; gap: 10px; margin-top: 16px; }
  .primary-btn, .secondary-btn, .danger-btn {
    padding: 10px 18px; border-radius: 4px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    font-family: var(--font-sans);
    transition: all 0.15s ease;
  }
  .primary-btn {
    background: var(--gold); color: var(--navy-deep); border: 1px solid var(--gold);
  }
  .primary-btn:hover { background: var(--gold-bright); border-color: var(--gold-bright); }
  .primary-btn:disabled {
    background: var(--ink-faint); color: var(--navy-deep); cursor: not-allowed; opacity: 0.5;
  }
  .secondary-btn {
    background: transparent; color: var(--ink-soft);
    border: 1px solid var(--rule-strong);
  }
  .secondary-btn:hover { color: var(--gold); border-color: var(--gold); }
  .danger-btn {
    background: transparent; color: #E48A8A; border: 1px solid rgba(231,90,90,0.4);
  }
  .danger-btn:hover { background: rgba(231,90,90,0.08); }

  .loader {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--ink-faint); border-top-color: var(--gold);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: -2px; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed; bottom: 24px; right: 32px;
    background: var(--navy-soft); border: 1px solid var(--rule-strong);
    color: var(--ink); padding: 12px 18px; border-radius: 6px;
    font-size: 13px; z-index: 100;
    box-shadow: 0 8px 28px rgba(0,0,0,0.4);
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.2s ease, transform 0.2s ease;
    max-width: 380px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: rgba(80,200,120,0.4); }
  .toast.error   { border-color: rgba(231,90,90,0.4); }
</style>
</head>
<body>

<header class="app">
  <div class="brand-lockup">
    <img src="/brand-assets/bedrock-mark.svg" alt="Bedrock mark" style="height:58px; width:auto; display:block;">
    <div>
      <div class="wm">BEDROCK <em>INTELLIGENCE</em></div>
      <div class="sub">trustEd · operations platform</div>
    </div>
  </div>
  <div class="module-name">Amenity <em>Rentals</em></div>
  <div class="util">
    <a href="/">← Platform</a>
    <a href="#" id="refreshBtn">Refresh</a>
  </div>
</header>

<div class="shell" id="shell">
  <main class="queue">
    <div class="filter-bar">
      <label>Community
        <select id="filterCommunity"><option value="">All</option></select>
      </label>
      <label>Status
        <select id="filterStatus">
          <option value="">All</option>
          <option value="pending_payment">Pending payment</option>
          <option value="confirmed">Confirmed</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
          <option value="no_show">No-show</option>
        </select>
      </label>
      <label>&nbsp;
        <span class="pill" id="filterFlagged" data-active="0">⚠ Needs review</span>
      </label>
      <label>&nbsp;
        <span class="pill" id="filterUpcoming" data-active="0">📅 Upcoming only</span>
      </label>
      <label>Search
        <input type="search" id="filterSearch" placeholder="reference, renter, address…">
      </label>
      <div class="count" id="resultCount">—</div>
    </div>
    <div id="queueBody">
      <div class="empty-state"><div class="loader"></div> Loading queue…</div>
    </div>
  </main>

  <aside class="detail" id="detailPanel" style="display:none;"></aside>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

const state = { items: [], total: 0, selectedId: null, detail: null };
const filters = { community_id: '', status: '', q: '', flagged: false, upcoming: false };

function $(id) { return document.getElementById(id); }
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function dollars(cents) {
  if (cents == null) return '—';
  return (Number(cents) / 100).toLocaleString('en-US', { style: 'currency', currency: 'USD' });
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso + (iso.length === 10 ? 'T00:00:00' : ''));
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtTime(t) {
  if (!t) return '—';
  const [h, m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${ampm}`;
}
function toast(msg, kind) {
  const t = $('toast');
  t.className = 'toast show ' + (kind || '');
  t.textContent = msg;
  setTimeout(() => { t.className = 'toast'; }, 4200);
}
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
  return data;
}

// ---- Load communities for filter ----
async function loadCommunities() {
  try {
    const r = await fetch('/api/communities');
    if (!r.ok) return;
    const data = await r.json();
    const list = Array.isArray(data) ? data : (data.communities || data.items || []);
    const sel = $('filterCommunity');
    list.sort((a, b) => (a.name || '').localeCompare(b.name || '')).forEach((c) => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name;
      sel.appendChild(opt);
    });
  } catch (_) {}
}

// ---- Load queue ----
async function loadQueue() {
  const params = new URLSearchParams();
  if (filters.community_id) params.set('community_id', filters.community_id);
  if (filters.status) params.set('status', filters.status);
  if (filters.q) params.set('q', filters.q);
  params.set('limit', '100');

  $('queueBody').innerHTML = `<div class="empty-state"><div class="loader"></div> Loading queue…</div>`;
  try {
    const data = await api('GET', `/api/amenities/admin/queue?${params.toString()}`);
    let items = data.items || [];
    if (filters.flagged) {
      items = items.filter((i) => i.eligibility_check_flag && i.eligibility_check_flag !== 'clean');
    }
    if (filters.upcoming) {
      const today = new Date().toISOString().slice(0, 10);
      items = items.filter((i) => i.event_date >= today && (i.status === 'confirmed' || i.status === 'pending_payment'));
    }
    state.items = items;
    state.total = items.length;
    $('resultCount').textContent = `${items.length} reservation${items.length === 1 ? '' : 's'}`;

    if (!items.length) {
      $('queueBody').innerHTML = `
        <div class="empty-state">
          <h2>No reservations match these filters</h2>
          <p>Adjust filters or try a different community. Real reservations from homeowners land here automatically.</p>
        </div>`;
      return;
    }

    $('queueBody').innerHTML = `
      <table class="queue">
        <thead><tr>
          <th>Reference</th>
          <th>Event</th>
          <th>Renter</th>
          <th>Amenity</th>
          <th>Total / Paid</th>
          <th>Status</th>
        </tr></thead>
        <tbody>${items.map(rowHtml).join('')}</tbody>
      </table>`;
    $('queueBody').querySelectorAll('tbody tr').forEach((tr) => {
      tr.addEventListener('click', () => loadDetail(tr.dataset.id));
    });
  } catch (err) {
    $('queueBody').innerHTML = `<div class="empty-state"><h2>Couldn't load queue</h2><p>${escapeHtml(err.message)}</p></div>`;
  }
}

function rowHtml(item) {
  const flagged = item.eligibility_check_flag && item.eligibility_check_flag !== 'clean'
                  && !item.eligibility_check_flag.startsWith('staff_overridden');
  return `
    <tr data-id="${item.id}" class="${state.selectedId === item.id ? 'active' : ''}">
      <td class="num">${escapeHtml(item.reference_number || '—')}</td>
      <td>
        <strong>${fmtDate(item.event_date)}</strong>
        <span class="sub">${fmtTime(item.arrival_time)} – ${fmtTime(item.departure_time)}</span>
      </td>
      <td>
        ${escapeHtml(item.renter_name)}
        <span class="sub">${escapeHtml(item.renter_email)}</span>
      </td>
      <td>
        ${escapeHtml(item.amenity_name)}
        <span class="sub">${escapeHtml(item.community_name)}</span>
      </td>
      <td>
        ${dollars((item.total_paid_cents || 0) + (item.total_pending_cents || 0))}
        <span class="sub">${item.total_refunded_cents ? `Refunded ${dollars(item.total_refunded_cents)}` : 'Paid in full'}</span>
      </td>
      <td>
        <span class="badge ${item.status}">${escapeHtml((item.status || '').replace(/_/g, ' '))}</span>
        ${flagged ? `<span class="badge alert" title="${escapeHtml(item.eligibility_check_flag)}">⚠ Review</span>` : ''}
      </td>
    </tr>`;
}

// ---- Load detail ----
async function loadDetail(id) {
  state.selectedId = id;
  document.querySelectorAll('table.queue tbody tr').forEach((tr) => {
    tr.classList.toggle('active', tr.dataset.id === id);
  });
  $('shell').classList.add('detail-open');
  const panel = $('detailPanel');
  panel.style.display = '';
  panel.innerHTML = `<div style="padding:80px 0;text-align:center;color:var(--ink-faint);"><div class="loader"></div> Loading…</div>`;
  try {
    // Fetch the rental + its payments
    const data = await api('GET', `/api/amenities/rentals/${id}`);
    // We don't have a full /admin/rentals/:id endpoint; use queue list data + this thin lookup.
    const item = state.items.find((it) => it.id === id) || {};
    const merged = { ...item, ...data };
    state.detail = merged;
    renderDetail(merged);
  } catch (err) {
    panel.innerHTML = `<div class="empty-state">Couldn't load: ${escapeHtml(err.message)}</div>`;
  }
}

function closeDetail() {
  state.selectedId = null;
  state.detail = null;
  $('shell').classList.remove('detail-open');
  $('detailPanel').style.display = 'none';
  document.querySelectorAll('table.queue tbody tr').forEach((tr) => tr.classList.remove('active'));
}
window.__closeAmenityDetail = closeDetail;

function renderDetail(r) {
  const flagged = r.eligibility_check_flag && r.eligibility_check_flag !== 'clean'
                  && !r.eligibility_check_flag.startsWith('staff_overridden');
  const today = new Date().toISOString().slice(0, 10);
  const isPostEvent = r.event_date < today;
  const isInspectionDue = isPostEvent && r.status === 'confirmed' && !r.inspection_completed_at;
  const isInspected = !!r.inspection_completed_at;
  const totalPaid = r.total_paid_cents || 0;
  const totalRefunded = r.total_refunded_cents || 0;

  const panel = $('detailPanel');
  panel.innerHTML = `
    <button class="close-detail" onclick="window.__closeAmenityDetail()">×</button>
    <h2>${escapeHtml(r.renter_name)}</h2>
    <div class="ref">${escapeHtml(r.reference_number || '—')}</div>

    ${flagged ? renderEligibilityAlert(r) : ''}

    <section>
      <h3>Event</h3>
      <dl>
        <dt>Community</dt>      <dd>${escapeHtml(r.community_name || r.community?.name || '—')}</dd>
        <dt>Amenity</dt>        <dd>${escapeHtml(r.amenity_name || r.amenity?.name || '—')}</dd>
        <dt>Date</dt>           <dd>${fmtDate(r.event_date)}</dd>
        <dt>Time</dt>           <dd>${fmtTime(r.arrival_time)} – ${fmtTime(r.departure_time)}</dd>
        <dt>Attendees</dt>      <dd>${escapeHtml(String(r.attendee_count || '—'))}</dd>
        <dt>Description</dt>    <dd>${escapeHtml(r.event_description || '—')}</dd>
      </dl>
    </section>

    <section>
      <h3>Renter</h3>
      <dl>
        <dt>Email</dt>          <dd>${escapeHtml(r.renter_email || '—')}</dd>
        <dt>Phone</dt>          <dd>${escapeHtml(r.renter_phone_cell || '—')}</dd>
        <dt>Property</dt>       <dd>${escapeHtml(r.renter_address || '—')}</dd>
        <dt>Intake</dt>         <dd>${escapeHtml((r.intake_method || 'online_portal').replace(/_/g, ' '))}${r.intake_recorded_by ? ` · by ${escapeHtml(r.intake_recorded_by)}` : ''}</dd>
        <dt>Attested current</dt><dd>${r.attested_current_at_submission ? '✓ Yes' : '— Not asked'}</dd>
      </dl>
    </section>

    <section>
      <h3>Payments</h3>
      <div class="pay-rows" id="payRows">
        <div class="row"><span class="meta-tag">Loading…</span></div>
      </div>
    </section>

    ${isInspectionDue ? renderInspectionForm(r) : ''}
    ${isInspected ? renderInspectionResult(r) : ''}

    ${(r.status === 'confirmed' || r.status === 'pending_payment') && !isPostEvent ? `
      <section>
        <h3>Actions</h3>
        <div class="button-row">
          <button class="danger-btn" id="cancelBtn">Cancel reservation</button>
        </div>
      </section>
    ` : ''}
  `;

  loadPaymentsForRental(r.id);
  wireDetailActions(r);
}

function renderEligibilityAlert(r) {
  const data = r.eligibility_check_data || {};
  return `
    <div class="alert-block">
      <div class="heading">⚠ Eligibility flag · ${escapeHtml(r.eligibility_check_flag.replace(/_/g, ' '))}</div>
      ${r.eligibility_check_flag === 'past_due_at_intake' ? `
        <p>This renter appears <strong>past due</strong> at intake. Balance ${dollars(data.balance_cents)} · status ${escapeHtml(data.ar_status || '—')} · snapshot from ${fmtDate(data.snapshot_at)}.</p>
        <p style="font-size:12px;color:var(--ink-faint);">Verify against current Vantaca AR before confirming. The reservation was accepted but the homeowner agreed in their attestation to cancellation if found past due.</p>
      ` : r.eligibility_check_flag === 'no_property_match' ? `
        <p>Renter address <strong>"${escapeHtml(r.renter_address || '')}"</strong> couldn't be matched to a property in this community. Verify they're a homeowner before confirming.</p>
      ` : `
        <p>Eligibility was unverified at intake (${escapeHtml(data.reason || 'reason unknown')}). Verify before confirming.</p>
      `}
      <div class="button-row">
        <button class="primary-btn" id="confirmEligibilityBtn">✓ Confirm — homeowner is eligible</button>
        <button class="danger-btn" id="cancelEligibilityBtn">Cancel + refund</button>
      </div>
    </div>`;
}

async function loadPaymentsForRental(rentalId) {
  try {
    // Re-fetch the rental via queue (we have total rollups there) for now,
    // plus a thin list of payments through a generic admin lookup.
    // For v0 we just read the totals from the queue row + show the breakdown via a quick fetch.
    const item = state.items.find((it) => it.id === rentalId);
    if (!item) return;
    const total = (item.total_paid_cents || 0);
    const refunded = (item.total_refunded_cents || 0);
    // For full breakdown we'd want /api/amenities/admin/rentals/:id/payments — defer.
    $('payRows').innerHTML = `
      <div class="row"><span>Total paid</span><span>${dollars(total)}</span></div>
      ${refunded ? `<div class="row refunded"><span>Refunded</span><span><span class="meta-tag">deposit returned</span>${dollars(refunded)}</span></div>` : ''}
      <div class="total">
        <span>Net to ${escapeHtml(item.community_name || 'community')} + Bedrock</span>
        <span>${dollars(total - refunded)}</span>
      </div>`;
  } catch (_) {
    $('payRows').innerHTML = `<div class="row"><span class="meta-tag">Could not load payment breakdown.</span></div>`;
  }
}

function renderInspectionForm(r) {
  return `
    <section>
      <h3>Post-event inspection</h3>
      <div class="inspect-form">
        <label>Inspected by</label>
        <input type="text" id="inspectBy" placeholder="Your name">

        <label>Result</label>
        <div class="pass-fail">
          <button type="button" id="passBtn" data-val="true" class="pass">✓ Passed</button>
          <button type="button" id="failBtn" data-val="false" class="fail">⚠ Issues found</button>
        </div>

        <label>Withholding (if any)</label>
        <input type="number" id="withholdAmt" min="0" step="0.01" placeholder="0.00" inputmode="decimal">

        <label>Notes (visible internally; reason for any withholding)</label>
        <textarea id="inspectNotes" placeholder="e.g., minor scuffs on floor from chair-dragging; deposit fully refunded."></textarea>

        <div class="button-row">
          <button class="primary-btn" id="submitInspectBtn">Submit inspection &amp; issue refund</button>
          <button class="secondary-btn" id="closeAfterBtn">Close</button>
        </div>
      </div>
    </section>`;
}

function renderInspectionResult(r) {
  const withheld = r.deposit_withholding_cents || 0;
  return `
    <section>
      <h3>Inspection result</h3>
      <dl>
        <dt>Completed</dt> <dd>${fmtDate(r.inspection_completed_at)} by ${escapeHtml(r.inspection_completed_by || '—')}</dd>
        <dt>Outcome</dt>   <dd>${r.inspection_passed ? '✓ Passed' : '⚠ Issues found'}</dd>
        ${withheld ? `<dt>Withheld</dt><dd>${dollars(withheld)} — ${escapeHtml(r.deposit_withholding_reason || '')}</dd>` : ''}
        ${r.deposit_returned_at ? `<dt>Refunded</dt><dd>${fmtDate(r.deposit_returned_at)}</dd>` : ''}
      </dl>
      ${r.inspection_notes ? `<p style="margin-top:10px;font-size:13px;color:var(--ink-soft);">${escapeHtml(r.inspection_notes)}</p>` : ''}
    </section>`;
}

function wireDetailActions(r) {
  // Eligibility resolution
  const conf = $('confirmEligibilityBtn');
  if (conf) conf.addEventListener('click', () => resolveEligibility(r.id, 'confirm'));
  const canEl = $('cancelEligibilityBtn');
  if (canEl) canEl.addEventListener('click', () => resolveEligibility(r.id, 'cancel'));

  // Cancel (pre-event)
  const cancel = $('cancelBtn');
  if (cancel) cancel.addEventListener('click', () => cancelRental(r.id));

  // Inspection
  let inspectionPassed = null;
  ['passBtn', 'failBtn'].forEach((id) => {
    const b = $(id);
    if (b) b.addEventListener('click', () => {
      inspectionPassed = b.dataset.val === 'true';
      $('passBtn')?.classList.toggle('selected', inspectionPassed === true);
      $('failBtn')?.classList.toggle('selected', inspectionPassed === false);
    });
  });
  const submitBtn = $('submitInspectBtn');
  if (submitBtn) submitBtn.addEventListener('click', () => submitInspection(r.id, () => inspectionPassed));
  const closeBtn = $('closeAfterBtn');
  if (closeBtn) closeBtn.addEventListener('click', closeDetail);
}

async function resolveEligibility(id, decision) {
  const resolved_by = prompt('Your name for the audit trail:');
  if (!resolved_by) return;
  try {
    await api('POST', `/api/amenities/admin/rentals/${id}/resolve-eligibility`, {
      decision, resolved_by,
      notes: decision === 'cancel' ? 'Past due / unverified at intake; cancelled by staff' : null,
    });
    toast(decision === 'confirm' ? 'Eligibility confirmed.' : 'Reservation cancelled.', 'success');
    await loadQueue();
    await loadDetail(id);
  } catch (err) {
    toast(`Failed: ${err.message}`, 'error');
  }
}

async function cancelRental(id) {
  if (!confirm('Cancel this reservation? Any payments collected will need to be manually refunded if applicable.')) return;
  const cancelled_by = prompt('Your name for the audit trail:');
  if (!cancelled_by) return;
  try {
    await api('POST', `/api/amenities/admin/rentals/${id}/cancel`, {
      cancelled_by,
      reason: 'Admin-initiated cancellation',
    });
    toast('Reservation cancelled.', 'success');
    await loadQueue();
    await loadDetail(id);
  } catch (err) {
    toast(`Failed: ${err.message}`, 'error');
  }
}

async function submitInspection(id, getPassed) {
  const passed = getPassed();
  if (passed === null) {
    toast('Pick passed or issues-found first.', 'error');
    return;
  }
  const inspected_by = $('inspectBy').value.trim();
  if (!inspected_by) {
    toast('Enter your name (audit trail requirement).', 'error');
    return;
  }
  const withholdInput = $('withholdAmt').value.trim();
  const withholding_cents = withholdInput ? Math.round(Number(withholdInput) * 100) : 0;
  if (withholding_cents > 0 && !$('inspectNotes').value.trim()) {
    toast('Notes required when withholding any amount.', 'error');
    return;
  }
  const btn = $('submitInspectBtn');
  btn.disabled = true;
  btn.innerHTML = `<span class="loader"></span> Submitting…`;
  try {
    const res = await api('POST', `/api/amenities/admin/rentals/${id}/complete-inspection`, {
      inspected_by,
      passed,
      notes: $('inspectNotes').value.trim() || null,
      withholding_cents,
      withholding_reason: withholding_cents > 0 ? $('inspectNotes').value.trim() : null,
      issue_refund: true,
    });
    const r = res.refund || {};
    if (r.refunded_cents > 0) {
      toast(`Inspection recorded · ${dollars(r.refunded_cents)} refunded${r.withheld_cents ? `, ${dollars(r.withheld_cents)} withheld` : ''}.`, 'success');
    } else {
      toast(`Inspection recorded · no refund issued.`, 'success');
    }
    await loadQueue();
    await loadDetail(id);
  } catch (err) {
    toast(`Failed: ${err.message}`, 'error');
    btn.disabled = false;
    btn.textContent = 'Submit inspection & issue refund';
  }
}

// ---- Wire filters ----
function debounce(fn, ms) {
  let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}
$('filterCommunity').addEventListener('change', (e) => { filters.community_id = e.target.value; loadQueue(); });
$('filterStatus').addEventListener('change',    (e) => { filters.status = e.target.value; loadQueue(); });
$('filterSearch').addEventListener('input', debounce((e) => { filters.q = e.target.value; loadQueue(); }, 250));
$('filterFlagged').addEventListener('click', (e) => {
  const on = e.target.dataset.active === '1';
  e.target.dataset.active = on ? '0' : '1';
  e.target.classList.toggle('active', !on);
  filters.flagged = !on;
  loadQueue();
});
$('filterUpcoming').addEventListener('click', (e) => {
  const on = e.target.dataset.active === '1';
  e.target.dataset.active = on ? '0' : '1';
  e.target.classList.toggle('active', !on);
  filters.upcoming = !on;
  loadQueue();
});
$('refreshBtn').addEventListener('click', (e) => { e.preventDefault(); loadQueue(); });

(async function init() {
  await loadCommunities();
  await loadQueue();
})();
</script>
</body>
</html>
