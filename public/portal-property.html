<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Property Summary · Bedrock Homeowner Portal</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
  * { box-sizing: border-box; }
  :root {
    --navy: #0B1D34;
    --navy-soft: #2A4870;
    --gold: #D4AF37;
    --gold-bright: #e8c96e;
    --gold-faint: rgba(212, 175, 55, 0.08);
    --green: #4A9A6A;
    --green-faint: rgba(80, 200, 120, 0.08);
    --cream: #FAFAF6;
    --cream-soft: #F5F4ED;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-faint: #7a7a7a;
    --rule: #E5E3DA;
    --shadow-soft: 0 1px 3px rgba(26, 48, 80, 0.06), 0 4px 12px rgba(26, 48, 80, 0.04);
    --font-serif: 'Cormorant Garamond', 'Playfair Display', Georgia, serif;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    --radius: 10px;
  }
  html, body {
    margin: 0; padding: 0;
    background: var(--cream-soft);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: 15px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  header.top {
    background: white; border-bottom: 1px solid var(--rule);
    padding: 14px 22px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
  .brand svg { width: 26px; height: 33px; }
  .brand .wm {
    font-family: var(--font-serif); font-size: 16px; font-weight: 500;
    color: var(--navy); letter-spacing: -0.01em; line-height: 1.05;
  }
  .brand .wm em { color: var(--gold); font-style: italic; font-weight: 500; }
  .back-link {
    font-size: 13px; color: var(--navy); text-decoration: none;
    padding: 8px 14px; border: 1px solid var(--rule); border-radius: 6px;
    transition: all 0.15s ease;
  }
  .back-link:hover { border-color: var(--gold); color: var(--gold); }
  .demo-ribbon {
    background: var(--gold); color: var(--navy);
    padding: 4px 10px; border-radius: 999px;
    font-size: 10.5px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-left: 10px;
  }

  main { max-width: 820px; margin: 0 auto; padding: 28px 22px 80px; }

  /* ---- Hero ---- */
  .hero {
    background: linear-gradient(135deg, #0B1D34 0%, #2A4870 100%);
    color: var(--cream);
    border-radius: var(--radius);
    padding: 32px 36px;
    margin-bottom: 22px;
    position: relative; overflow: hidden;
    box-shadow: var(--shadow-soft);
  }
  .hero::after {
    content: ''; position: absolute; top: -50px; right: -60px;
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(212,175,55,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero .eyebrow {
    font-size: 12px; color: rgba(255,255,255,0.7);
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px;
  }
  .hero h1 {
    font-family: var(--font-serif); font-size: 30px; font-weight: 500;
    margin: 0 0 8px; letter-spacing: -0.01em; line-height: 1.15;
  }
  .hero .subline { color: rgba(255,255,255,0.85); font-size: 14px; }
  .hero .city-state { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 4px; }

  /* ---- Cards ---- */
  .card {
    background: white;
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 24px 28px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-soft);
  }
  .card h2 {
    font-family: var(--font-serif); font-size: 18px; font-weight: 500;
    margin: 0 0 14px;
    color: var(--navy); letter-spacing: -0.005em;
    display: flex; align-items: center; gap: 10px;
  }
  .card h2 .ic {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--gold-faint); color: var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .card dl {
    display: grid; grid-template-columns: 160px 1fr;
    gap: 8px 14px;
    margin: 0; font-size: 14px;
  }
  .card dt {
    color: var(--ink-faint);
    font-size: 12.5px;
  }
  .card dd { margin: 0; color: var(--ink); font-weight: 500; }

  /* ---- Owners ---- */
  .owner-row {
    display: flex; gap: 14px; padding: 12px 0;
    border-bottom: 1px solid var(--rule);
  }
  .owner-row:last-child { border-bottom: none; }
  .owner-row .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--cream-soft); color: var(--navy);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600;
    flex-shrink: 0;
  }
  .owner-row.primary .avatar { background: var(--gold); color: var(--navy-deep); }
  .owner-row .info { flex: 1; }
  .owner-row .name {
    font-weight: 500; color: var(--ink); font-size: 15px;
    display: flex; align-items: center; gap: 8px;
  }
  .owner-row .name .badge {
    font-size: 10px; padding: 2px 7px; border-radius: 999px;
    background: var(--gold-faint); color: var(--gold);
    letter-spacing: 0.04em; text-transform: uppercase;
    font-weight: 600;
  }
  .owner-row .contact {
    font-size: 13px; color: var(--ink-soft);
    margin-top: 4px; line-height: 1.55;
  }
  .owner-row .contact a { color: var(--navy); text-decoration: none; }
  .owner-row .contact a:hover { color: var(--gold); }
  .owner-row .since {
    font-size: 11.5px; color: var(--ink-faint); margin-top: 4px;
  }

  .update-cta {
    background: var(--gold-faint);
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 8px;
    padding: 14px 18px;
    margin-top: 14px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .update-cta .copy {
    font-size: 13.5px; color: var(--ink); line-height: 1.5;
  }
  .update-cta .copy strong { color: var(--navy); }
  .update-cta .btn {
    background: var(--navy); color: white;
    padding: 9px 16px; border-radius: 6px;
    font-size: 13px; font-weight: 500;
    text-decoration: none; white-space: nowrap;
    transition: all 0.15s ease;
  }
  .update-cta .btn:hover { background: #2A4870; }

  /* ---- Activity timeline ---- */
  .activity {
    list-style: none; padding: 0; margin: 0;
  }
  .activity li {
    display: flex; gap: 14px; padding: 12px 0;
    border-bottom: 1px solid var(--rule);
  }
  .activity li:last-child { border-bottom: none; }
  .activity .ic {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--cream-soft);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .activity .summary {
    flex: 1; font-size: 14px; color: var(--ink); line-height: 1.5;
  }
  .activity .date {
    font-size: 12px; color: var(--ink-faint); margin-top: 3px;
  }
  .empty-activity {
    text-align: center; padding: 30px 20px;
    color: var(--ink-faint); font-size: 13.5px;
    font-style: italic;
  }

  /* ---- States ---- */
  .full-loader {
    min-height: 60vh; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px; color: var(--ink-faint);
  }
  .spinner {
    width: 22px; height: 22px;
    border: 2px solid var(--rule); border-top-color: var(--gold);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    margin-top: 36px; text-align: center;
    font-size: 11.5px; color: var(--ink-faint);
  }
  footer .tag {
    font-family: var(--font-mono);
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--ink-soft);
  }
</style>
</head>
<body>

<div id="app">
  <div class="full-loader"><div class="spinner"></div> Loading your property…</div>
</div>

<template id="pageTemplate">
<header class="top">
  <a class="brand" href="/portal" id="brandLink">
    <img src="/brand-assets/bedrock-mark.svg" alt="Bedrock mark" style="height:58px; width:auto; display:block;">
    <div><div class="wm">BEDROCK <em>ASSOCIATION MANAGEMENT</em></div></div>
  </a>
  <a class="back-link" href="/portal" id="backLink">← Portal</a>
</header>

<main>
  <div class="hero">
    <div class="eyebrow" id="heroEyebrow">Property summary</div>
    <h1 id="heroAddress">—</h1>
    <div class="subline" id="heroSubline">—</div>
    <div class="city-state" id="heroCity">—</div>
  </div>

  <div class="card">
    <h2><span class="ic">🏠</span>Property details</h2>
    <dl id="propertyDl"></dl>
  </div>

  <div class="card">
    <h2><span class="ic">👤</span>Owners of record</h2>
    <div id="ownersList"></div>
    <div class="update-cta">
      <div class="copy">
        <strong>Need to update an owner name, email, phone, or add a co-owner?</strong>
        Email Bedrock and we'll update the record within one business day.
      </div>
      <a class="btn" id="updateBtn" href="#">✉️ Email to update</a>
    </div>
  </div>

  <div class="card">
    <h2><span class="ic">🕒</span>Recent activity</h2>
    <ul class="activity" id="activityList"></ul>
  </div>
</main>

<footer>
  <div class="tag">Community. Simplified.</div>
  <div style="margin-top:6px;">Bedrock Association Management · (832) 588-2485</div>
</footer>
</template>

<script>
'use strict';

let isDemo = false;
let demoCommunitySlug = '';

function $(id) { return document.getElementById(id); }
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function fmtDateLong(iso) {
  if (!iso) return '—';
  const d = new Date(iso + (iso.length === 10 ? 'T00:00:00' : ''));
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}
function fmtDateShort(iso) {
  if (!iso) return '—';
  const d = new Date(iso + (iso.length === 10 ? 'T00:00:00' : ''));
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function initials(name) {
  return String(name || '?').split(/\s+/).map((p) => p[0] || '').slice(0, 2).join('').toUpperCase() || '?';
}

function getQueryParams() {
  const u = new URL(window.location.href);
  return { demo: u.searchParams.get('demo') === '1', community: u.searchParams.get('community') || '' };
}

(async function init() {
  const q = getQueryParams();
  isDemo = q.demo;
  demoCommunitySlug = q.community;

  if (isDemo) return renderPage(buildDemoData(demoCommunitySlug || 'waterview'));

  try {
    let _pid = ''; try { _pid = sessionStorage.getItem('bedrock_portal_property_id') || ''; } catch (_) {}
    const _urlPid = new URLSearchParams(window.location.search).get('property_id') || '';
    const _propId = _urlPid || _pid;
    const r = await fetch('/api/portal/property' + (_propId ? '?property_id=' + encodeURIComponent(_propId) : ''), { credentials: 'same-origin' });
    if (r.status === 401) { window.location.href = '/portal-login.html'; return; }
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    renderPage(data);
  } catch (err) {
    $('app').innerHTML = `<div class="full-loader">Couldn't load: ${escapeHtml(err.message)}</div>`;
  }
})();

function buildDemoData(slug) {
  const names = {
    'waterview': 'Waterview Estates',
    'canyon-gate': 'Canyon Gate at Cinco Ranch',
    'august-meadows': 'August Meadows',
    'still-creek-ranch': 'Still Creek Ranch',
    'lakes-of-pine-forest': 'Lakes of Pine Forest',
    'quail-ridge': 'Quail Ridge',
  };
  const today = new Date();
  return {
    demo: true,
    property: {
      street_address: '1234 Sample Drive',
      city: 'Richmond', state: 'TX', zip: '77407',
      property_type: 'sfh',
      lot_number: '12',
      on_record_since: '2021-03-15',
    },
    community: {
      name: names[slug] || 'Your Community',
      slug,
      hoa_legal_name: `${names[slug] || 'Your Community'} Owners Association, Inc.`,
    },
    owners: [
      { name: 'Sarah Henderson', email: 'sarah.henderson@example.com', phone: '(832) 555-0142', is_primary: true, start_date: '2021-03-15', vesting: 'joint' },
      { name: 'Mike Henderson', email: 'mike.henderson@example.com', phone: '(832) 555-0188', is_primary: false, start_date: '2021-03-15', vesting: 'joint' },
    ],
    activity: [
      { type: 'arc', icon: '🏗️', date: new Date(today.getTime() - 5 * 86400000).toISOString(), summary: 'ARC request approved · exterior paint refresh' },
      { type: 'rental', icon: '🎉', date: new Date(today.getTime() - 28 * 86400000).toISOString(), summary: 'Clubhouse reservation · WVE-CLB-2026-0014 (completed)' },
      { type: 'compliance', icon: '✅', date: new Date(today.getTime() - 75 * 86400000).toISOString(), summary: 'Compliance notice resolved · trash bin storage' },
      { type: 'arc', icon: '🏗️', date: new Date(today.getTime() - 180 * 86400000).toISOString(), summary: 'ARC request approved · new fence install' },
    ],
  };
}

function renderPage(ctx) {
  const tpl = $('pageTemplate');
  $('app').innerHTML = '';
  $('app').appendChild(tpl.content.cloneNode(true));

  if (isDemo) {
    const back = `/portal?demo=1&community=${encodeURIComponent(ctx.community?.slug || demoCommunitySlug || 'waterview')}`;
    $('brandLink').href = back;
    $('backLink').href = back;
  }

  const p = ctx.property || {};
  const community = ctx.community || {};

  // Hero
  $('heroEyebrow').innerHTML = `${escapeHtml(community.name || 'Your community')}${isDemo ? '<span class="demo-ribbon">Demo</span>' : ''}`;
  $('heroAddress').textContent = p.street_address || '—';
  const lotLine = p.lot_number ? `Lot ${p.lot_number}` : '';
  $('heroSubline').textContent = lotLine || (community.hoa_legal_name || '');
  $('heroCity').textContent = [p.city, p.state, p.zip].filter(Boolean).join(', ') || '';

  // Property details
  const propTypeMap = {
    sfh: 'Single-family home', townhouse: 'Townhouse', condo: 'Condominium',
    duplex: 'Duplex', other: 'Property',
  };
  $('propertyDl').innerHTML = `
    <dt>Street address</dt><dd>${escapeHtml(p.street_address || '—')}</dd>
    ${p.unit ? `<dt>Unit</dt><dd>${escapeHtml(p.unit)}</dd>` : ''}
    <dt>City / State</dt><dd>${escapeHtml([p.city, p.state, p.zip].filter(Boolean).join(', ') || '—')}</dd>
    <dt>Property type</dt><dd>${escapeHtml(propTypeMap[p.property_type] || p.property_type || '—')}</dd>
    ${p.lot_number ? `<dt>Lot</dt><dd>${escapeHtml(p.lot_number)}</dd>` : ''}
    <dt>Community</dt><dd>${escapeHtml(community.name || '—')}</dd>
    ${p.on_record_since ? `<dt>On file with Bedrock since</dt><dd>${fmtDateLong(p.on_record_since)}</dd>` : ''}
  `;

  // Owners
  const owners = ctx.owners || [];
  if (owners.length) {
    $('ownersList').innerHTML = owners.map((o) => `
      <div class="owner-row ${o.is_primary ? 'primary' : ''}">
        <div class="avatar">${escapeHtml(initials(o.name))}</div>
        <div class="info">
          <div class="name">
            ${escapeHtml(o.name || 'Owner')}
            ${o.is_primary ? '<span class="badge">Primary</span>' : ''}
          </div>
          <div class="contact">
            ${o.email ? `<a href="mailto:${escapeHtml(o.email)}">${escapeHtml(o.email)}</a>` : ''}
            ${o.email && o.phone ? ' · ' : ''}
            ${o.phone ? `<a href="tel:${escapeHtml(o.phone.replace(/[^0-9+]/g, ''))}">${escapeHtml(o.phone)}</a>` : ''}
            ${!o.email && !o.phone ? '<em style="color:var(--ink-faint);">No contact on file</em>' : ''}
          </div>
          ${o.start_date ? `<div class="since">Owner of record since ${fmtDateShort(o.start_date)}${o.vesting ? ` · ${escapeHtml(o.vesting)}` : ''}</div>` : ''}
        </div>
      </div>
    `).join('');
  } else {
    $('ownersList').innerHTML = `<div class="empty-activity">No owners of record on file. Email Bedrock to provide ownership information.</div>`;
  }

  // Email to update CTA
  $('updateBtn').href = buildUpdateMailto(p, community);

  // Activity
  const activity = ctx.activity || [];
  if (activity.length) {
    $('activityList').innerHTML = activity.map((a) => `
      <li>
        <div class="ic">${a.icon || '•'}</div>
        <div class="summary">
          ${escapeHtml(a.summary || '')}
          <div class="date">${fmtDateShort(a.date)}</div>
        </div>
      </li>
    `).join('');
  } else {
    $('activityList').outerHTML = `<div class="empty-activity">No recent activity on file for your property.</div>`;
  }
}

function buildUpdateMailto(p, community) {
  const subject = `Update property record — ${p.street_address || ''}`;
  const body = [
    `Hi Bedrock,`,
    ``,
    `Please update the property record for:`,
    `Address: ${p.street_address || '—'}`,
    `Community: ${community.name || '—'}`,
    ``,
    `Change requested:`,
    `[Describe the change — new email, phone, co-owner, mailing address, etc.]`,
    ``,
    `Thank you,`,
  ].join('\n');
  return `mailto:info@bedrocktx.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}
</script>
</body>
</html>
