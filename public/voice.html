<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>askEd — Bedrock Intelligence</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1A3050" />

  <!-- iOS: Add to Home Screen behavior -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="askEd" />
  <link rel="apple-touch-icon" href="/logos/bedrock_logo.png" />

  <!-- Hint Android/Chrome -->
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="stylesheet" href="/brand.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(180deg, #f7f9fc 0%, #eef2f7 100%);
      color: #1f2937;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ---------- Header ---------- */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px 10px;
      border-bottom: 1px solid #e2e8f0;
      background: #fff;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-mark {
      width: 26px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .brand-mark svg { width: 100%; height: 100%; display: block; }
    .brand-title {
      font-family: var(--font-serif);
      font-weight: 500;
      font-size: 16px;
      letter-spacing: -0.01em;
      color: var(--navy);
      line-height: 1.1;
    }
    .brand-title em { font-style: italic; color: var(--gold); font-weight: 500; }
    .brand-sub {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--grey);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .topbar-pills {
      display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-end;
    }
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: #f1f5f9; color: #334155;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px; font-weight: 600;
      border: 1px solid #e2e8f0;
    }
    .pill select {
      border: none; background: transparent; font: inherit; color: inherit;
      outline: none; padding-right: 4px;
      max-width: 130px;
    }
    /* legacy class still used in markup; identical to .pill */
    .community-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: #f1f5f9; color: #334155;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px; font-weight: 600;
      border: 1px solid #e2e8f0;
    }
    .community-pill select {
      border: none; background: transparent; font: inherit; color: inherit;
      outline: none; padding-right: 4px;
      max-width: 130px;
    }

    /* ---------- Transcript stream ---------- */
    .stream {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px 24px;
      display: flex; flex-direction: column; gap: 14px;
      -webkit-overflow-scrolling: touch;
    }
    .bubble {
      max-width: 90%;
      padding: 12px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
      animation: fadeUp 0.22s ease;
    }
    .bubble.user {
      align-self: flex-end;
      background: var(--navy);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble.assistant {
      align-self: flex-start;
      background: #fff;
      color: #0f172a;
      border: 1px solid #e2e8f0;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    .bubble.assistant.thinking {
      color: #64748b; font-style: italic;
    }
    .bubble.assistant h2 {
      font-size: 14px; margin: 10px 0 6px; color: var(--navy); font-weight: 700;
    }
    .bubble.assistant h2:first-child { margin-top: 0; }
    .bubble.assistant p { margin: 0 0 8px; }
    .bubble.assistant ul, .bubble.assistant ol { margin: 4px 0 8px; padding-left: 20px; }
    .bubble.assistant li { margin-bottom: 3px; }
    .bubble.assistant strong { color: #0f172a; }
    .bubble.assistant code {
      background: #f1f5f9; padding: 1px 5px; border-radius: 4px;
      font-size: 13px; font-family: ui-monospace, SFMono-Regular, monospace;
    }
    .bubble-actions {
      display: flex; gap: 6px; margin-top: 8px;
    }
    .bubble-action {
      background: #f1f5f9; border: 1px solid #e2e8f0;
      color: #475569;
      padding: 4px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 600;
      cursor: pointer;
    }
    .bubble-action:hover { background: #e2e8f0; }
    .bubble-action.playing { background: var(--navy); color: #fff; border-color: var(--navy); }

    .empty-state {
      text-align: center;
      color: #64748b;
      padding: 36px 20px;
    }
    .empty-state h1 {
      font-size: 22px;
      margin: 0 0 6px;
      color: #0f172a;
      font-weight: 700;
    }
    .empty-state p {
      margin: 0 0 18px;
      font-size: 14px;
      line-height: 1.5;
    }
    .empty-state .suggestions {
      display: flex; flex-direction: column; gap: 8px;
      max-width: 320px; margin: 0 auto;
    }
    .suggestion-chip {
      background: #fff; border: 1px solid #cbd5e1;
      color: #334155;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.05s;
    }
    .suggestion-chip:active { transform: scale(0.98); }
    .suggestion-chip:hover { border-color: var(--navy); }

    /* ---------- Footer / Mic bar ---------- */
    .footer {
      padding: 12px 16px calc(env(safe-area-inset-bottom) + 14px);
      background: #fff;
      border-top: 1px solid #e2e8f0;
    }
    .input-row {
      display: flex; align-items: flex-end; gap: 10px;
    }
    .text-input {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
      border: 1px solid #cbd5e1;
      border-radius: 22px;
      padding: 11px 14px;
      font: inherit; font-size: 15px;
      resize: none;
      background: #f8fafc;
      outline: none;
    }
    .text-input:focus { border-color: var(--navy); background: #fff; }

    .mic-btn {
      flex-shrink: 0;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--navy);
      color: #fff;
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(49, 90, 135, 0.35);
      transition: transform 0.08s, background 0.15s;
    }
    .mic-btn:active { transform: scale(0.94); }
    .mic-btn svg { width: 26px; height: 26px; }

    .mic-btn.listening {
      background: #dc2626;
      animation: pulse 1.2s infinite;
    }
    .mic-btn.disabled {
      background: #cbd5e1;
      cursor: not-allowed;
      box-shadow: none;
    }

    .send-btn {
      flex-shrink: 0;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #0f172a;
      color: #fff;
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .send-btn:disabled { background: #cbd5e1; cursor: not-allowed; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: #94a3b8;
      margin-top: 8px;
      letter-spacing: 0.2px;
    }
    .hint.listening { color: #dc2626; font-weight: 600; }
    .hint.error { color: #dc2626; }

    /* ---------- Animations ---------- */
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.55); }
      50%      { box-shadow: 0 0 0 14px rgba(220, 38, 38, 0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }
    .typing-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      background: #94a3b8;
      border-radius: 50%;
      margin: 0 2px;
      animation: dotPulse 1.4s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* ---------- Stop-talking pill ---------- */
    .stop-pill {
      display: none;
      margin: 0 auto 10px;
      background: #fee2e2;
      color: #b91c1c;
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #fca5a5;
      width: fit-content;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 6px rgba(220, 38, 38, 0.12);
      animation: fadeUp 0.2s ease;
      user-select: none;
      -webkit-user-select: none;
    }
    .stop-pill.show { display: inline-flex; }
    .stop-pill:active { transform: scale(0.97); }

    /* ---------- Install banner ---------- */
    .install-banner {
      display: none;
      background: #0f172a;
      color: #fff;
      padding: 10px 16px;
      font-size: 13px;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .install-banner.show { display: flex; }
    .install-banner button {
      background: #fff; color: #0f172a; border: none;
      padding: 6px 12px; border-radius: 999px;
      font: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer;
    }
    .install-banner .dismiss {
      background: transparent; color: #cbd5e1;
      padding: 6px 8px;
    }
  </style>
</head>
<body>
  <div class="install-banner" id="installBanner">
    <span>📲 Install askEd on your home screen for one-tap voice access.</span>
    <div style="display:flex; gap:4px; align-items:center;">
      <button id="installBtn">Install</button>
      <button class="dismiss" id="dismissInstall">✕</button>
    </div>
  </div>

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark" aria-label="Bedrock cornerstone mark">
        <svg viewBox="0 0 88 110" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
          <polygon points="0,0 88,0 84,28 4,28" fill="var(--gold)"/>
          <polygon points="5,34 83,34 78,68 10,68" fill="var(--gold)"/>
          <polygon points="11,74 77,74 73,110 15,110" fill="var(--gold)"/>
        </svg>
      </div>
      <div>
        <div class="brand-title">askEd</div>
        <div class="brand-sub">Bedrock <em style="font-style:italic; color:var(--gold);">Intelligence</em></div>
      </div>
    </div>
    <div class="topbar-pills">
      <div class="pill" title="Pick the voice askEd uses">
        <span aria-hidden="true">🎙️</span>
        <select id="voiceSelect" aria-label="askEd voice">
          <option value="onyx">Onyx — deep, calm</option>
          <option value="echo">Echo — male, smooth</option>
          <option value="fable">Fable — British male</option>
          <option value="alloy">Alloy — neutral</option>
          <option value="nova">Nova — female, bright</option>
          <option value="shimmer">Shimmer — female, soft</option>
        </select>
      </div>
      <div class="community-pill" title="Which community's docs to consult">
        <span aria-hidden="true">🏘️</span>
        <select id="communitySelect" aria-label="Community">
          <option value="">All communities</option>
        </select>
      </div>
      <label class="pill" title="Off = quick lookup (1-2 sentences). On = full Ed-style guidance." style="cursor:pointer;">
        <input type="checkbox" id="voiceFullModeToggle" style="margin-right:6px;">
        <span>🧠 Full mode</span>
      </label>
      <a href="/" class="pill" title="Back to the main trustEd app" style="text-decoration:none; color:inherit;">
        <span aria-hidden="true">←</span> App
      </a>
    </div>
  </div>

  <div class="stream" id="stream">
    <div class="empty-state" id="emptyState">
      <h1>Tap the mic. Ask Ed.</h1>
      <p>Voice-first answers from your communities' governing docs and Ed's playbook.</p>
      <div class="suggestions">
        <button class="suggestion-chip" data-q="Can a homeowner park a boat in the driveway?">🚤 Can a homeowner park a boat in the driveway?</button>
        <button class="suggestion-chip" data-q="What's the procedure when a board member misses three meetings in a row?">📋 What's the procedure when a board member misses three meetings in a row?</button>
        <button class="suggestion-chip" data-q="A homeowner is complaining about a neighbor's dog barking. What do I tell them?">🐕 A homeowner is complaining about a neighbor's dog barking. What do I tell them?</button>
        <button class="suggestion-chip" data-q="Walk me through how to evaluate a landscape contract renewal.">🌳 How do I evaluate a landscape contract renewal?</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <div style="text-align:center;">
      <button class="stop-pill" id="stopPill" type="button" aria-label="Stop talking">
        <span aria-hidden="true">⏹</span> Stop talking
      </button>
    </div>
    <div class="input-row">
      <textarea
        class="text-input"
        id="textInput"
        rows="1"
        placeholder="Ask Ed anything…"
        autocomplete="off"
        autocorrect="on"
        autocapitalize="sentences"
        spellcheck="true"
      ></textarea>
      <button class="mic-btn" id="micBtn" aria-label="Hold to talk">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3z"/>
          <path d="M19 11a1 1 0 1 0-2 0 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.92V21a1 1 0 1 0 2 0v-3.08A7 7 0 0 0 19 11z"/>
        </svg>
      </button>
      <button class="send-btn" id="sendBtn" aria-label="Send" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
        </svg>
      </button>
    </div>
    <div class="hint" id="hint">Tap the mic to speak — or type your question.</div>
  </div>

  <script>
    // ========================================================================
    // askEd Voice v1
    // ------------------------------------------------------------------------
    // - Web Speech API for STT (free, on-device on most browsers)
    // - SpeechSynthesis for TTS (free, browser-native voices)
    // - Talks to existing /ask-ed backend
    // - Designed to be installable as a PWA via the manifest + sw.js
    // ========================================================================

    // Retry-wrapper to absorb Render cold-starts
    (function () {
      const origFetch = window.fetch.bind(window);
      window.fetch = async function (input, init) {
        let last = null;
        for (let i = 0; i < 3; i++) {
          try { return await origFetch(input, init); }
          catch (e) {
            last = e;
            if (!/Failed to fetch|NetworkError|fetch failed/i.test(e.message || '')) throw e;
            if (i < 2) await new Promise(r => setTimeout(r, i === 0 ? 4000 : 10000));
          }
        }
        throw last;
      };
    })();

    const $ = (id) => document.getElementById(id);
    const stream = $('stream');
    const emptyState = $('emptyState');
    const textInput = $('textInput');
    const micBtn = $('micBtn');
    const sendBtn = $('sendBtn');
    const hint = $('hint');
    const communitySelect = $('communitySelect');

    // ---------- Service worker registration ----------
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch((err) => {
          console.warn('SW registration failed', err);
        });
      });
    }

    // ---------- Install banner (Android/Chrome) ----------
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (localStorage.getItem('asked-install-dismissed') !== 'true') {
        $('installBanner').classList.add('show');
      }
    });
    $('installBtn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      $('installBanner').classList.remove('show');
    });
    $('dismissInstall').addEventListener('click', () => {
      $('installBanner').classList.remove('show');
      localStorage.setItem('asked-install-dismissed', 'true');
    });

    // ---------- Voice picker ----------
    // Selected voice persists across visits. All TTS calls (streaming
    // sentence playback and bubble "Replay") read currentVoice at call time.
    const voiceSelect = $('voiceSelect');
    const VOICE_LABEL = {
      onyx: 'Onyx', echo: 'Echo', fable: 'Fable',
      alloy: 'Alloy', nova: 'Nova', shimmer: 'Shimmer'
    };
    let currentVoice = localStorage.getItem('asked-voice') || 'onyx';
    if (!VOICE_LABEL[currentVoice]) currentVoice = 'onyx';
    voiceSelect.value = currentVoice;
    voiceSelect.addEventListener('change', () => {
      currentVoice = voiceSelect.value;
      localStorage.setItem('asked-voice', currentVoice);
      // Interrupt anything currently speaking, then preview the new voice.
      resetTtsQueue();
      previewVoice();
    });
    function previewVoice() {
      // Short greeting so the picker doubles as an A/B test. Uses speak()
      // which talks to /api/tts with currentVoice.
      speak(`Hi, I'm Ed. This is the ${VOICE_LABEL[currentVoice]} voice.`);
    }

    // ---------- Load communities ----------
    // /ask-ed expects the community NAME (filters Supabase metadata.community
    // strings, not IDs). So we store and submit the name.
    async function loadCommunities() {
      try {
        const res = await fetch('/api/billing/communities');
        if (!res.ok) return;
        const data = await res.json();
        const communities = data.communities || [];
        communities
          .slice()
          .sort((a, b) => (a.name || '').localeCompare(b.name || ''))
          .forEach((c) => {
            const opt = document.createElement('option');
            opt.value = c.name;          // ask-ed wants the name string
            opt.textContent = c.name;
            communitySelect.appendChild(opt);
          });
        const saved = localStorage.getItem('asked-community');
        if (saved) communitySelect.value = saved;
      } catch (err) {
        console.warn('communities load failed', err);
      }
    }
    communitySelect.addEventListener('change', () => {
      localStorage.setItem('asked-community', communitySelect.value);
    });
    loadCommunities();

    // ---------- Text input ----------
    textInput.addEventListener('input', () => {
      sendBtn.disabled = !textInput.value.trim();
      textInput.style.height = 'auto';
      textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
    });
    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (textInput.value.trim()) submit(textInput.value.trim());
      }
    });
    sendBtn.addEventListener('click', () => {
      if (textInput.value.trim()) submit(textInput.value.trim());
    });

    // ---------- Suggestion chips ----------
    document.querySelectorAll('.suggestion-chip').forEach((chip) => {
      chip.addEventListener('click', () => submit(chip.dataset.q));
    });

    // ========================================================================
    // STT — MediaRecorder → /api/stt (OpenAI Whisper)
    // ------------------------------------------------------------------------
    // Reliable across iOS Safari, Chrome Android, desktop. Web Speech API
    // was unusable on iPhone (audio-capture errors). Whisper just works.
    // ========================================================================
    let mediaRecorder = null;
    let recordedChunks = [];
    let listening = false;

    function pickAudioMime() {
      // iOS Safari supports audio/mp4; Chrome/Android prefer audio/webm.
      // We probe in priority order and let MediaRecorder default if none.
      const candidates = [
        'audio/webm;codecs=opus',
        'audio/webm',
        'audio/mp4',
        'audio/mp4;codecs=mp4a.40.2',
        'audio/ogg;codecs=opus'
      ];
      for (const m of candidates) {
        if (typeof MediaRecorder !== 'undefined' && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(m)) {
          return m;
        }
      }
      return ''; // let the browser pick
    }

    async function startListening() {
      if (listening) return;
      hint.classList.remove('error');
      textInput.value = '';
      resetTtsQueue();  // kill in-flight answer playback AND any queued sentences
      unlockAudio();    // also unlock TTS playback while we have a gesture
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mime = pickAudioMime();
        const opts = mime ? { mimeType: mime } : {};
        mediaRecorder = new MediaRecorder(stream, opts);
        recordedChunks = [];
        mediaRecorder.ondataavailable = (e) => {
          if (e.data && e.data.size > 0) recordedChunks.push(e.data);
        };
        mediaRecorder.onstop = async () => {
          // Stop the mic immediately so the iOS red recording indicator goes away
          stream.getTracks().forEach((t) => t.stop());
          listening = false;
          micBtn.classList.remove('listening');
          hint.classList.remove('listening');
          if (recordedChunks.length === 0) {
            hint.textContent = 'No audio captured — tap mic and try again.';
            return;
          }
          const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || mime || 'audio/webm' });
          await transcribeAndSubmit(blob);
        };
        mediaRecorder.start();
        listening = true;
        micBtn.classList.add('listening');
        hint.classList.add('listening');
        hint.textContent = '🎤 Listening… tap mic again when finished.';
      } catch (err) {
        console.warn('mic error', err);
        hint.classList.add('error');
        if (err.name === 'NotAllowedError' || err.name === 'SecurityError') {
          hint.textContent = '🚫 Mic access denied. Settings → Safari → Microphone → Allow.';
        } else if (err.name === 'NotFoundError') {
          hint.textContent = '🚫 No microphone found on this device.';
        } else {
          hint.textContent = 'Mic error: ' + (err.message || err.name);
        }
      }
    }

    function stopListening() {
      if (!listening || !mediaRecorder) return;
      try { mediaRecorder.stop(); } catch (err) { console.warn('stop err', err); }
    }

    async function transcribeAndSubmit(blob) {
      hint.textContent = '✍️ Transcribing…';
      try {
        const form = new FormData();
        // give it a filename matching the codec so Whisper picks the right decoder
        const ext = (blob.type || '').includes('mp4') ? 'mp4'
                  : (blob.type || '').includes('mpeg') ? 'mp3'
                  : (blob.type || '').includes('ogg') ? 'ogg'
                  : 'webm';
        form.append('audio', blob, `voice.${ext}`);
        const res = await fetch('/api/stt', { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || ('HTTP ' + res.status));
        const text = (data.text || '').trim();
        if (!text) {
          hint.textContent = "Didn't catch that — tap mic and try again.";
          return;
        }
        textInput.value = text;
        textInput.dispatchEvent(new Event('input'));
        submit(text);
      } catch (err) {
        console.warn('stt failed', err);
        hint.classList.add('error');
        hint.textContent = 'Transcription error: ' + (err.message || 'unknown');
      }
    }

    micBtn.addEventListener('click', () => {
      if (listening) {
        stopListening();
      } else {
        startListening();
      }
    });

    // Feature detection — if MediaRecorder + getUserMedia don't exist, disable mic
    if (!window.MediaRecorder || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      micBtn.classList.add('disabled');
      micBtn.disabled = true;
      hint.textContent = 'Voice input not supported on this browser — type instead.';
    }

    // ========================================================================
    // TTS — /api/tts (OpenAI Onyx)
    // ------------------------------------------------------------------------
    // iOS blocks audio playback that isn't tied to a user gesture, AND it
    // blocks playback after async fetches even if the gesture started the
    // chain. The unlock pattern: on the first user tap, play a silent
    // <audio> so the element is "user-activated", then we can swap its src
    // freely after fetches.
    // ========================================================================
    const ttsAudio = new Audio();
    ttsAudio.preload = 'auto';
    let audioUnlocked = false;
    let currentSpeakBtn = null;

    function unlockAudio() {
      if (audioUnlocked) return;
      try {
        // 1-frame silent WAV (RIFF header + zero samples)
        ttsAudio.src = 'data:audio/wav;base64,UklGRhwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
        const p = ttsAudio.play();
        if (p && p.then) p.then(() => { audioUnlocked = true; }).catch(() => {});
        else audioUnlocked = true;
      } catch (_) {}
    }

    // Unlock on the very first user gesture anywhere in the UI
    document.addEventListener('click', unlockAudio, { once: true, capture: true });
    document.addEventListener('touchstart', unlockAudio, { once: true, capture: true });

    async function speak(text, button) {
      stopSpeaking();
      currentSpeakBtn = button || null;
      if (currentSpeakBtn) currentSpeakBtn.classList.add('playing');
      try {
        const res = await fetch('/api/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, voice: currentVoice })
        });
        if (!res.ok) {
          const errJson = await res.json().catch(() => ({}));
          throw new Error(errJson.error || ('HTTP ' + res.status));
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        ttsAudio.src = url;
        ttsAudio.onended = () => {
          URL.revokeObjectURL(url);
          if (currentSpeakBtn) currentSpeakBtn.classList.remove('playing');
          currentSpeakBtn = null;
        };
        ttsAudio.onerror = () => {
          URL.revokeObjectURL(url);
          if (currentSpeakBtn) currentSpeakBtn.classList.remove('playing');
          currentSpeakBtn = null;
        };
        await ttsAudio.play();
      } catch (err) {
        console.warn('tts failed', err);
        if (currentSpeakBtn) currentSpeakBtn.classList.remove('playing');
        currentSpeakBtn = null;
      }
    }

    function stopSpeaking() {
      try { ttsAudio.pause(); } catch (_) {}
      try { ttsAudio.currentTime = 0; } catch (_) {}
      if (currentSpeakBtn) currentSpeakBtn.classList.remove('playing');
      currentSpeakBtn = null;
      // Force the in-flight playback promise to resolve so drainTtsQueue
      // can continue (or exit if the queue was cleared).
      if (currentTtsResolver) { currentTtsResolver(); currentTtsResolver = null; }
    }

    // ---- Stop-talking pill: visible while Onyx is playing or queued ----
    document.getElementById('stopPill').addEventListener('click', () => {
      resetTtsQueue();
      hint.textContent = 'Stopped. Tap the mic to ask another question.';
    });

    textInput.addEventListener('focus', () => { resetTtsQueue(); });

    // ========================================================================
    // Submit / render — streaming version
    // ------------------------------------------------------------------------
    // Calls /ask-ed-stream (SSE). As each delta arrives:
    //   1. Append text to the assistant bubble (progressive typing UX)
    //   2. Watch for completed sentences and queue them for TTS
    //   3. drainTtsQueue() plays sentences serially as audio arrives
    // ========================================================================

    // ---- Sentence-aware TTS queue ----
    // Maintains strict-order playback while letting fetches overlap.
    const ttsQueue = [];   // { audioPromise } entries in spoken order
    let ttsPlaying = false;
    let currentTtsResolver = null; // resolves the in-flight playback promise
                                   // when we need to interrupt synchronously

    function updateStopPill() {
      const pill = document.getElementById('stopPill');
      if (!pill) return;
      const visible = ttsPlaying || ttsQueue.length > 0;
      pill.classList.toggle('show', visible);
    }

    function enqueueTtsSentence(sentence) {
      const cleaned = cleanForTts(sentence);
      if (!cleaned) return;
      const voiceAtRequest = currentVoice; // capture in case user switches mid-stream
      const audioPromise = fetch('/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: cleaned, voice: voiceAtRequest })
      })
        .then((r) => { if (!r.ok) throw new Error('TTS HTTP ' + r.status); return r.blob(); })
        .then((blob) => URL.createObjectURL(blob))
        .catch((err) => { console.warn('tts seg failed', err); return null; });

      ttsQueue.push({ audioPromise });
      updateStopPill();
      drainTtsQueue();
    }

    async function drainTtsQueue() {
      if (ttsPlaying) return;
      const next = ttsQueue.shift();
      if (!next) { updateStopPill(); return; }
      ttsPlaying = true;
      updateStopPill();
      try {
        const url = await next.audioPromise;
        if (!url) { ttsPlaying = false; updateStopPill(); return drainTtsQueue(); }
        ttsAudio.src = url;
        await new Promise((resolve) => {
          currentTtsResolver = resolve;
          ttsAudio.onended = () => { URL.revokeObjectURL(url); resolve(); };
          ttsAudio.onerror = () => { URL.revokeObjectURL(url); resolve(); };
          const p = ttsAudio.play();
          if (p && p.catch) p.catch(() => resolve());
        });
        currentTtsResolver = null;
      } catch (err) {
        console.warn('tts play err', err);
      }
      ttsPlaying = false;
      updateStopPill();
      drainTtsQueue();
    }

    function resetTtsQueue() {
      // Clear queue FIRST so drainTtsQueue exits when current promise resolves
      ttsQueue.length = 0;
      stopSpeaking();
      updateStopPill();
    }

    // Strip markdown & filter sentences that shouldn't be spoken
    // (headings, numbered-list scaffolding, emoji-only).
    function cleanForTts(text) {
      let t = text
        .replace(/^#{1,6}\s+.*$/gm, '')       // drop heading lines
        .replace(/^[-*•]\s+/gm, '')           // bullet dashes
        .replace(/^\d+\.\s+/gm, '')           // ordered-list markers
        .replace(/[*_`]/g, '')                // bold/italic/code
        .replace(/\[(.*?)\]\(.*?\)/g, '$1')   // markdown links
        .replace(/[✅📋💡⚠️🧠🎙️📑🏗️📊🏘️🚤🐕🌳🔊📲]/g, '') // common emoji noise
        .replace(/\s+/g, ' ')
        .trim();
      if (t.length < 3) return '';
      // Skip pure section labels like "ACTION", "RESPONSE", etc.
      if (/^[A-Z\s\-]{4,}$/.test(t)) return '';
      return t;
    }

    // Sentence splitter — finds boundary positions in a streamed buffer
    // and returns { sentences, remainder }. Boundaries: . ! ? followed by
    // whitespace; or a blank line; or end-of-block headings.
    function flushSentences(buffer) {
      const sentences = [];
      let remainder = buffer;
      const re = /([.!?])\s+|\n{2,}/g;
      let lastIdx = 0;
      let m;
      while ((m = re.exec(buffer)) !== null) {
        const end = m.index + (m[1] ? 1 : 0);  // include the punctuation
        const piece = buffer.slice(lastIdx, end).trim();
        if (piece) sentences.push(piece);
        lastIdx = re.lastIndex;
      }
      remainder = buffer.slice(lastIdx);
      return { sentences, remainder };
    }

    async function submit(question) {
      if (emptyState && emptyState.parentNode) emptyState.remove();
      addBubble('user', question);
      textInput.value = '';
      textInput.dispatchEvent(new Event('input'));
      hint.textContent = 'Thinking…';

      resetTtsQueue();
      const thinkingBubble = addThinking();
      const assistantDiv = document.createElement('div');
      assistantDiv.className = 'bubble assistant';
      const contentSpan = document.createElement('div');
      contentSpan.className = 'streaming-content';
      assistantDiv.appendChild(contentSpan);

      let fullText = '';
      let pendingForTts = '';
      let firstDeltaSeen = false;

      const form = new FormData();
      form.append('situation', question);
      const communityId = communitySelect.value;
      if (communityId) form.append('community', communityId);
      // Voice page defaults to Quick mode — field-staff use case. Long-form
      // strategic guidance lives in the main app (askEd tab). Override by
      // checking the "Full mode" toggle if it's present in the DOM.
      const fullToggle = document.getElementById('voiceFullModeToggle');
      const useQuick = !(fullToggle && fullToggle.checked);
      if (useQuick) form.append('mode', 'quick');

      try {
        const res = await fetch('/ask-ed-stream', { method: 'POST', body: form });
        if (!res.ok || !res.body) {
          throw new Error('HTTP ' + res.status);
        }
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });

          // SSE frames are separated by blank lines
          const frames = buf.split('\n\n');
          buf = frames.pop(); // keep trailing partial
          for (const frame of frames) {
            const line = frame.split('\n').find((l) => l.startsWith('data:'));
            if (!line) continue;
            let payload;
            try { payload = JSON.parse(line.slice(5).trim()); } catch (_) { continue; }

            if (payload.type === 'delta' && payload.text) {
              if (!firstDeltaSeen) {
                firstDeltaSeen = true;
                thinkingBubble.remove();
                stream.appendChild(assistantDiv);
                hint.textContent = 'askEd is talking…';
              }
              fullText += payload.text;
              pendingForTts += payload.text;
              // Render progressively — re-run markdown over the whole text
              contentSpan.innerHTML = renderMarkdown(fullText);
              stream.scrollTop = stream.scrollHeight;

              // Flush completed sentences into the TTS queue
              const { sentences, remainder } = flushSentences(pendingForTts);
              pendingForTts = remainder;
              for (const s of sentences) {
                if (s.length >= 12) enqueueTtsSentence(s); // skip tiny fragments
              }
            } else if (payload.type === 'error') {
              throw new Error(payload.message || 'stream error');
            } else if (payload.type === 'done') {
              // Flush any leftover prose as the final TTS chunk
              if (pendingForTts.trim()) {
                enqueueTtsSentence(pendingForTts.trim());
                pendingForTts = '';
              }
            }
          }
        }

        // If we never got a single delta, surface that explicitly
        if (!firstDeltaSeen) {
          thinkingBubble.remove();
          assistantDiv.innerHTML = renderMarkdown(fullText || '⚠️ No response received.');
          stream.appendChild(assistantDiv);
        }

        // Add per-bubble actions now that we have final text
        const actions = document.createElement('div');
        actions.className = 'bubble-actions';
        actions.innerHTML = `
          <button class="bubble-action speak">🔊 Replay</button>
          <button class="bubble-action copy">📋 Copy</button>
        `;
        assistantDiv.appendChild(actions);
        actions.querySelector('.speak').addEventListener('click', (e) => {
          const btn = e.currentTarget;
          if (btn.classList.contains('playing')) {
            stopSpeaking();
            btn.classList.remove('playing');
          } else {
            speak(fullText, btn);
          }
        });
        actions.querySelector('.copy').addEventListener('click', async (e) => {
          try {
            await navigator.clipboard.writeText(fullText);
            e.currentTarget.textContent = '✓ Copied';
            setTimeout(() => { e.currentTarget.textContent = '📋 Copy'; }, 1200);
          } catch (_) {}
        });

        hint.textContent = 'Tap the mic to ask a follow-up.';
      } catch (err) {
        console.warn('stream failed', err);
        thinkingBubble.remove();
        addBubble('assistant', '⚠️ Connection error: ' + (err.message || 'unknown'));
        hint.textContent = 'Network error — try again.';
      }
    }

    function addBubble(role, text, includeActions = false) {
      const div = document.createElement('div');
      div.className = 'bubble ' + role;
      if (role === 'assistant') {
        div.innerHTML = renderMarkdown(text);
        if (includeActions) {
          const actions = document.createElement('div');
          actions.className = 'bubble-actions';
          actions.innerHTML = `
            <button class="bubble-action speak">🔊 Play</button>
            <button class="bubble-action copy">📋 Copy</button>
          `;
          div.appendChild(actions);
          actions.querySelector('.speak').addEventListener('click', (e) => {
            const btn = e.currentTarget;
            if (btn.classList.contains('playing')) {
              stopSpeaking();
              btn.classList.remove('playing');
            } else {
              speak(text, btn);
            }
          });
          actions.querySelector('.copy').addEventListener('click', async (e) => {
            try {
              await navigator.clipboard.writeText(text);
              e.currentTarget.textContent = '✓ Copied';
              setTimeout(() => { e.currentTarget.textContent = '📋 Copy'; }, 1200);
            } catch (_) {}
          });
        }
      } else {
        div.textContent = text;
      }
      stream.appendChild(div);
      stream.scrollTop = stream.scrollHeight;
      return div;
    }

    function addThinking() {
      const div = document.createElement('div');
      div.className = 'bubble assistant thinking';
      div.innerHTML = `<span class="typing-dots"><span></span><span></span><span></span></span> askEd is thinking…`;
      stream.appendChild(div);
      stream.scrollTop = stream.scrollHeight;
      return div;
    }

    // ---------- Tiny markdown renderer (askEd 4-part template friendly) ----------
    function renderMarkdown(md) {
      const escape = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      let html = escape(md);
      html = html.replace(/^###\s+(.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^#\s+(.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      // ordered lists
      html = html.replace(/(?:^|\n)((?:\d+\.\s+.+\n?)+)/g, (m, block) => {
        const items = block.trim().split(/\n/).map((line) => line.replace(/^\d+\.\s+/, '')).map((t) => `<li>${t}</li>`).join('');
        return `\n<ol>${items}</ol>`;
      });
      // unordered lists
      html = html.replace(/(?:^|\n)((?:[-*]\s+.+\n?)+)/g, (m, block) => {
        const items = block.trim().split(/\n/).map((line) => line.replace(/^[-*]\s+/, '')).map((t) => `<li>${t}</li>`).join('');
        return `\n<ul>${items}</ul>`;
      });
      // paragraphs
      html = html.split(/\n{2,}/).map((para) => {
        if (/^<(h2|ul|ol)/.test(para.trim())) return para;
        return `<p>${para.replace(/\n/g, '<br>')}</p>`;
      }).join('\n');
      return linkifyContacts(html);
    }

    // Auto-linkify US phone numbers (tel:) and email addresses (mailto:) in
    // already-rendered HTML. Skips anything already inside an <a> tag.
    // The leading "📞 " or "✉ " emoji is absorbed into the match so we don't
    // end up with double emojis when the model also prepends one.
    function linkifyContacts(html) {
      if (!html) return '';
      return html.split(/(<a [^>]*>.*?<\/a>)/g).map((seg, i) => {
        if (i % 2 === 1) return seg; // already an anchor — leave it
        let s = seg;
        // Phone — absorb optional leading 📞 to prevent double emoji
        s = s.replace(
          /(?:📞\s*)?((?:\+?1[-.\s]?)?\(?[2-9]\d{2}\)?[-.\s]?\d{3}[-.\s]?\d{4})/g,
          (m, num) => {
            const digits = num.replace(/[^\d+]/g, '');
            return `<a href="tel:${digits}" style="color:#0d4dd0; font-weight:700; text-decoration:underline; white-space:nowrap;">📞 ${num}</a>`;
          }
        );
        // Email — absorb optional leading ✉ or ✉️
        s = s.replace(
          /(?:✉️?\s*)?([A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,})/g,
          (m, addr) => `<a href="mailto:${addr}" style="color:#0d4dd0; font-weight:700; text-decoration:underline;">✉️ ${addr}</a>`
        );
        return s;
      }).join('');
    }

    // Prevent iOS rubber-band scroll inside the stream from yanking the page
    document.body.addEventListener('touchmove', (e) => {
      if (e.target.closest('.stream, .text-input')) return;
      e.preventDefault();
    }, { passive: false });
  </script>
</body>
</html>
