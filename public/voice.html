<!DOCTYPE html>

<head>

<title>askEd — Bedrock Intelligence</title>
<link rel="manifest" href="/manifest.json">

<!--
  /voice.html was the original voice-first askEd surface. As of 2026-05-22
  Voice + Chat have been unified into a single askEd surface at
  /ask-ed-chat.html. This page redirects so existing bookmarks, installed
  PWA shortcuts on phone home screens, and external links keep working.

  The new surface has everything the old voice page had (mic input via
  Whisper, sentence-streamed TTS, voice picker, PWA install banner)
  plus all the chat features (multi-turn, attachments, tool calls,
  regenerate, abort, hybrid retrieval). Concise toggle = old Quick mode.
-->
<meta http-equiv="refresh" content="0; url=/ask-ed-chat.html">
<link rel="canonical" href="/ask-ed-chat.html">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F4ED; color: #1a1a1a; margin: 0; padding: 40px 24px; text-align: center; }
  .card { max-width: 420px; margin: 80px auto; background: white; border: 1px solid #E5E3DA; border-radius: 12px; padding: 36px 30px; box-shadow: 0 4px 24px rgba(26,48,80,0.06); }
  h1 { font-family: 'Playfair Display', Georgia, serif; color: #1A3050; font-size: 22px; font-weight: 500; margin: 0 0 12px; }
  h1 em { color: #D4AF37; font-style: italic; }
  p { color: #4a4a4a; font-size: 14px; line-height: 1.6; margin: 0 0 18px; }
  a.btn { display: inline-block; background: #1A3050; color: white; padding: 12px 24px; border-radius: 7px; text-decoration: none; font-weight: 500; font-size: 14.5px; }
  a.btn:hover { background: #2A4870; }
</style>
</head>
<body>
<div class="card">
  <h1>askEd <em>moved</em></h1>
  <p>Voice askEd and Chat askEd are now a single surface — same mic, same Ed voice, plus multi-turn follow-ups and document retrieval all in one place.</p>
  <p>Redirecting you now…</p>
  <a class="btn" href="/ask-ed-chat.html">Open askEd</a>
</div>
<script>
  // Belt + suspenders: redirect via JS too, in case meta-refresh is blocked
  setTimeout(() => { window.location.replace('/ask-ed-chat.html'); }, 100);
</script>
</body>
