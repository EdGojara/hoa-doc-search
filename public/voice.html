<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>askEd — Bedrock</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#315A87" />

  <!-- iOS: Add to Home Screen behavior -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="askEd" />
  <link rel="apple-touch-icon" href="/logos/bedrock_logo.png" />

  <!-- Hint Android/Chrome -->
  <meta name="mobile-web-app-capable" content="yes" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(180deg, #f7f9fc 0%, #eef2f7 100%);
      color: #1f2937;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ---------- Header ---------- */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px 10px;
      border-bottom: 1px solid #e2e8f0;
      background: #fff;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-mark {
      width: 32px; height: 32px; border-radius: 8px;
      background: #315A87;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 15px; letter-spacing: 0.5px;
    }
    .brand-title { font-weight: 700; font-size: 16px; color: #0f172a; }
    .brand-sub { font-size: 11px; color: #64748b; font-weight: 500; letter-spacing: 0.3px; text-transform: uppercase; }

    .community-pill {
      display: flex; align-items: center; gap: 6px;
      background: #f1f5f9; color: #334155;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px; font-weight: 600;
      border: 1px solid #e2e8f0;
    }
    .community-pill select {
      border: none; background: transparent; font: inherit; color: inherit;
      outline: none; padding-right: 4px;
      max-width: 140px;
    }

    /* ---------- Transcript stream ---------- */
    .stream {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px 24px;
      display: flex; flex-direction: column; gap: 14px;
      -webkit-overflow-scrolling: touch;
    }
    .bubble {
      max-width: 90%;
      padding: 12px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
      animation: fadeUp 0.22s ease;
    }
    .bubble.user {
      align-self: flex-end;
      background: #315A87;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble.assistant {
      align-self: flex-start;
      background: #fff;
      color: #0f172a;
      border: 1px solid #e2e8f0;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    .bubble.assistant.thinking {
      color: #64748b; font-style: italic;
    }
    .bubble.assistant h2 {
      font-size: 14px; margin: 10px 0 6px; color: #315A87; font-weight: 700;
    }
    .bubble.assistant h2:first-child { margin-top: 0; }
    .bubble.assistant p { margin: 0 0 8px; }
    .bubble.assistant ul, .bubble.assistant ol { margin: 4px 0 8px; padding-left: 20px; }
    .bubble.assistant li { margin-bottom: 3px; }
    .bubble.assistant strong { color: #0f172a; }
    .bubble.assistant code {
      background: #f1f5f9; padding: 1px 5px; border-radius: 4px;
      font-size: 13px; font-family: ui-monospace, SFMono-Regular, monospace;
    }
    .bubble-actions {
      display: flex; gap: 6px; margin-top: 8px;
    }
    .bubble-action {
      background: #f1f5f9; border: 1px solid #e2e8f0;
      color: #475569;
      padding: 4px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 600;
      cursor: pointer;
    }
    .bubble-action:hover { background: #e2e8f0; }
    .bubble-action.playing { background: #315A87; color: #fff; border-color: #315A87; }

    .empty-state {
      text-align: center;
      color: #64748b;
      padding: 36px 20px;
    }
    .empty-state h1 {
      font-size: 22px;
      margin: 0 0 6px;
      color: #0f172a;
      font-weight: 700;
    }
    .empty-state p {
      margin: 0 0 18px;
      font-size: 14px;
      line-height: 1.5;
    }
    .empty-state .suggestions {
      display: flex; flex-direction: column; gap: 8px;
      max-width: 320px; margin: 0 auto;
    }
    .suggestion-chip {
      background: #fff; border: 1px solid #cbd5e1;
      color: #334155;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.05s;
    }
    .suggestion-chip:active { transform: scale(0.98); }
    .suggestion-chip:hover { border-color: #315A87; }

    /* ---------- Footer / Mic bar ---------- */
    .footer {
      padding: 12px 16px calc(env(safe-area-inset-bottom) + 14px);
      background: #fff;
      border-top: 1px solid #e2e8f0;
    }
    .input-row {
      display: flex; align-items: flex-end; gap: 10px;
    }
    .text-input {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
      border: 1px solid #cbd5e1;
      border-radius: 22px;
      padding: 11px 14px;
      font: inherit; font-size: 15px;
      resize: none;
      background: #f8fafc;
      outline: none;
    }
    .text-input:focus { border-color: #315A87; background: #fff; }

    .mic-btn {
      flex-shrink: 0;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: #315A87;
      color: #fff;
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(49, 90, 135, 0.35);
      transition: transform 0.08s, background 0.15s;
    }
    .mic-btn:active { transform: scale(0.94); }
    .mic-btn svg { width: 26px; height: 26px; }

    .mic-btn.listening {
      background: #dc2626;
      animation: pulse 1.2s infinite;
    }
    .mic-btn.disabled {
      background: #cbd5e1;
      cursor: not-allowed;
      box-shadow: none;
    }

    .send-btn {
      flex-shrink: 0;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #0f172a;
      color: #fff;
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .send-btn:disabled { background: #cbd5e1; cursor: not-allowed; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: #94a3b8;
      margin-top: 8px;
      letter-spacing: 0.2px;
    }
    .hint.listening { color: #dc2626; font-weight: 600; }
    .hint.error { color: #dc2626; }

    /* ---------- Animations ---------- */
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.55); }
      50%      { box-shadow: 0 0 0 14px rgba(220, 38, 38, 0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }
    .typing-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      background: #94a3b8;
      border-radius: 50%;
      margin: 0 2px;
      animation: dotPulse 1.4s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* ---------- Install banner ---------- */
    .install-banner {
      display: none;
      background: #0f172a;
      color: #fff;
      padding: 10px 16px;
      font-size: 13px;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .install-banner.show { display: flex; }
    .install-banner button {
      background: #fff; color: #0f172a; border: none;
      padding: 6px 12px; border-radius: 999px;
      font: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer;
    }
    .install-banner .dismiss {
      background: transparent; color: #cbd5e1;
      padding: 6px 8px;
    }
  </style>
</head>
<body>
  <div class="install-banner" id="installBanner">
    <span>📲 Install askEd on your home screen for one-tap voice access.</span>
    <div style="display:flex; gap:4px; align-items:center;">
      <button id="installBtn">Install</button>
      <button class="dismiss" id="dismissInstall">✕</button>
    </div>
  </div>

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">B</div>
      <div>
        <div class="brand-title">askEd</div>
        <div class="brand-sub">Bedrock Intelligence</div>
      </div>
    </div>
    <div class="community-pill">
      <span>🏘️</span>
      <select id="communitySelect">
        <option value="">All communities</option>
      </select>
    </div>
  </div>

  <div class="stream" id="stream">
    <div class="empty-state" id="emptyState">
      <h1>Tap the mic. Ask Ed.</h1>
      <p>Voice-first answers from your communities' governing docs and Ed's playbook.</p>
      <div class="suggestions">
        <button class="suggestion-chip" data-q="Can a homeowner park a boat in the driveway?">🚤 Can a homeowner park a boat in the driveway?</button>
        <button class="suggestion-chip" data-q="What's the procedure when a board member misses three meetings in a row?">📋 What's the procedure when a board member misses three meetings in a row?</button>
        <button class="suggestion-chip" data-q="A homeowner is complaining about a neighbor's dog barking. What do I tell them?">🐕 A homeowner is complaining about a neighbor's dog barking. What do I tell them?</button>
        <button class="suggestion-chip" data-q="Walk me through how to evaluate a landscape contract renewal.">🌳 How do I evaluate a landscape contract renewal?</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="input-row">
      <textarea
        class="text-input"
        id="textInput"
        rows="1"
        placeholder="Ask Ed anything…"
        autocomplete="off"
        autocorrect="on"
        autocapitalize="sentences"
        spellcheck="true"
      ></textarea>
      <button class="mic-btn" id="micBtn" aria-label="Hold to talk">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3z"/>
          <path d="M19 11a1 1 0 1 0-2 0 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.92V21a1 1 0 1 0 2 0v-3.08A7 7 0 0 0 19 11z"/>
        </svg>
      </button>
      <button class="send-btn" id="sendBtn" aria-label="Send" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
        </svg>
      </button>
    </div>
    <div class="hint" id="hint">Tap the mic to speak — or type your question.</div>
  </div>

  <script>
    // ========================================================================
    // askEd Voice v1
    // ------------------------------------------------------------------------
    // - Web Speech API for STT (free, on-device on most browsers)
    // - SpeechSynthesis for TTS (free, browser-native voices)
    // - Talks to existing /ask-ed backend
    // - Designed to be installable as a PWA via the manifest + sw.js
    // ========================================================================

    const $ = (id) => document.getElementById(id);
    const stream = $('stream');
    const emptyState = $('emptyState');
    const textInput = $('textInput');
    const micBtn = $('micBtn');
    const sendBtn = $('sendBtn');
    const hint = $('hint');
    const communitySelect = $('communitySelect');

    // ---------- Service worker registration ----------
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch((err) => {
          console.warn('SW registration failed', err);
        });
      });
    }

    // ---------- Install banner (Android/Chrome) ----------
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (localStorage.getItem('asked-install-dismissed') !== 'true') {
        $('installBanner').classList.add('show');
      }
    });
    $('installBtn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      $('installBanner').classList.remove('show');
    });
    $('dismissInstall').addEventListener('click', () => {
      $('installBanner').classList.remove('show');
      localStorage.setItem('asked-install-dismissed', 'true');
    });

    // ---------- Load communities ----------
    // /ask-ed expects the community NAME (filters Supabase metadata.community
    // strings, not IDs). So we store and submit the name.
    async function loadCommunities() {
      try {
        const res = await fetch('/api/billing/communities');
        if (!res.ok) return;
        const data = await res.json();
        const communities = data.communities || [];
        communities
          .slice()
          .sort((a, b) => (a.name || '').localeCompare(b.name || ''))
          .forEach((c) => {
            const opt = document.createElement('option');
            opt.value = c.name;          // ask-ed wants the name string
            opt.textContent = c.name;
            communitySelect.appendChild(opt);
          });
        const saved = localStorage.getItem('asked-community');
        if (saved) communitySelect.value = saved;
      } catch (err) {
        console.warn('communities load failed', err);
      }
    }
    communitySelect.addEventListener('change', () => {
      localStorage.setItem('asked-community', communitySelect.value);
    });
    loadCommunities();

    // ---------- Text input ----------
    textInput.addEventListener('input', () => {
      sendBtn.disabled = !textInput.value.trim();
      textInput.style.height = 'auto';
      textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px';
    });
    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (textInput.value.trim()) submit(textInput.value.trim());
      }
    });
    sendBtn.addEventListener('click', () => {
      if (textInput.value.trim()) submit(textInput.value.trim());
    });

    // ---------- Suggestion chips ----------
    document.querySelectorAll('.suggestion-chip').forEach((chip) => {
      chip.addEventListener('click', () => submit(chip.dataset.q));
    });

    // ---------- Speech recognition (STT) ----------
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognizer = null;
    let listening = false;

    if (SpeechRec) {
      recognizer = new SpeechRec();
      recognizer.continuous = false;
      recognizer.interimResults = true;
      recognizer.lang = 'en-US';

      recognizer.onstart = () => {
        listening = true;
        micBtn.classList.add('listening');
        hint.classList.add('listening');
        hint.textContent = '🎤 Listening… tap mic again when finished.';
      };

      recognizer.onresult = (event) => {
        let interim = '';
        let final = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const r = event.results[i];
          if (r.isFinal) final += r[0].transcript;
          else interim += r[0].transcript;
        }
        textInput.value = (final + interim).trim();
        textInput.dispatchEvent(new Event('input'));
      };

      recognizer.onerror = (event) => {
        console.warn('STT error', event.error);
        hint.classList.remove('listening');
        hint.classList.add('error');
        if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
          hint.textContent = '🚫 Microphone access denied. Enable mic in browser settings.';
        } else if (event.error === 'no-speech') {
          hint.textContent = "Didn't catch that — tap the mic and try again.";
        } else {
          hint.textContent = 'Speech recognition error: ' + event.error;
        }
        stopListening();
      };

      recognizer.onend = () => {
        listening = false;
        micBtn.classList.remove('listening');
        hint.classList.remove('listening');
        if (!hint.classList.contains('error')) {
          hint.textContent = textInput.value.trim()
            ? 'Tap send, or tap mic to re-record.'
            : 'Tap the mic to speak — or type your question.';
        }
      };
    } else {
      micBtn.classList.add('disabled');
      hint.textContent = 'Voice input not supported on this browser — try Chrome or Safari.';
    }

    function startListening() {
      if (!recognizer || listening) return;
      hint.classList.remove('error');
      textInput.value = '';
      try { recognizer.start(); } catch (err) { console.warn('rec start', err); }
    }
    function stopListening() {
      if (!recognizer || !listening) return;
      try { recognizer.stop(); } catch (err) { console.warn('rec stop', err); }
    }

    micBtn.addEventListener('click', () => {
      if (micBtn.classList.contains('disabled')) return;
      if (listening) {
        stopListening();
        if (textInput.value.trim()) {
          // tiny delay so onresult finishes flushing
          setTimeout(() => submit(textInput.value.trim()), 120);
        }
      } else {
        startListening();
      }
    });

    // ---------- Speech synthesis (TTS) ----------
    // Web Speech API voices are free but robotic. v2 will swap this for
    // OpenAI Onyx via a server-side endpoint — same UX, better voice.
    let currentUtterance = null;
    let preferredVoice = null;

    function pickVoice() {
      const voices = window.speechSynthesis.getVoices();
      // Prefer en-US male-ish voices that sound less robotic on each platform
      const candidates = [
        'Google US English',
        'Microsoft Guy Online (Natural) - English (United States)',
        'Microsoft David Desktop - English (United States)',
        'Alex',
        'Daniel',
        'Samantha'
      ];
      for (const name of candidates) {
        const v = voices.find((x) => x.name === name);
        if (v) return v;
      }
      return voices.find((v) => v.lang && v.lang.startsWith('en')) || voices[0] || null;
    }
    if ('speechSynthesis' in window) {
      // voices load async on some browsers
      window.speechSynthesis.onvoiceschanged = () => { preferredVoice = pickVoice(); };
      preferredVoice = pickVoice();
    }

    function speak(text, button) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      // Strip markdown for cleaner audio output
      const clean = text
        .replace(/^#{1,6}\s+/gm, '')
        .replace(/[*_`]/g, '')
        .replace(/\[(.*?)\]\(.*?\)/g, '$1')
        .replace(/\n{2,}/g, '. ')
        .replace(/\n/g, ' ');
      const utt = new SpeechSynthesisUtterance(clean);
      if (preferredVoice) utt.voice = preferredVoice;
      utt.rate = 1.02;
      utt.pitch = 0.95;
      utt.onstart = () => { if (button) button.classList.add('playing'); };
      utt.onend = utt.onerror = () => { if (button) button.classList.remove('playing'); };
      currentUtterance = utt;
      window.speechSynthesis.speak(utt);
    }
    function stopSpeaking() {
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    }

    // Stop TTS the moment user starts a new mic recording or types
    micBtn.addEventListener('click', stopSpeaking, true);
    textInput.addEventListener('focus', stopSpeaking);

    // ---------- Submit / render ----------
    async function submit(question) {
      if (emptyState && emptyState.parentNode) emptyState.remove();
      addBubble('user', question);
      textInput.value = '';
      textInput.dispatchEvent(new Event('input'));
      hint.textContent = 'Thinking…';

      const thinkingBubble = addThinking();

      try {
        const form = new FormData();
        form.append('situation', question);
        const communityId = communitySelect.value;
        if (communityId) form.append('community', communityId);

        const res = await fetch('/ask-ed', {
          method: 'POST',
          body: form
        });
        const data = await res.json();
        thinkingBubble.remove();

        const answer = data.guidance || data.answer || data.error || 'No response.';
        const bubble = addBubble('assistant', answer, true);
        // Auto-speak the answer
        const playBtn = bubble.querySelector('.bubble-action.speak');
        speak(answer, playBtn);

        hint.textContent = 'Tap the mic to ask a follow-up.';
      } catch (err) {
        thinkingBubble.remove();
        addBubble('assistant', '⚠️ Connection error: ' + err.message);
        hint.textContent = 'Network error — try again.';
      }
    }

    function addBubble(role, text, includeActions = false) {
      const div = document.createElement('div');
      div.className = 'bubble ' + role;
      if (role === 'assistant') {
        div.innerHTML = renderMarkdown(text);
        if (includeActions) {
          const actions = document.createElement('div');
          actions.className = 'bubble-actions';
          actions.innerHTML = `
            <button class="bubble-action speak">🔊 Play</button>
            <button class="bubble-action copy">📋 Copy</button>
          `;
          div.appendChild(actions);
          actions.querySelector('.speak').addEventListener('click', (e) => {
            const btn = e.currentTarget;
            if (btn.classList.contains('playing')) {
              stopSpeaking();
              btn.classList.remove('playing');
            } else {
              speak(text, btn);
            }
          });
          actions.querySelector('.copy').addEventListener('click', async (e) => {
            try {
              await navigator.clipboard.writeText(text);
              e.currentTarget.textContent = '✓ Copied';
              setTimeout(() => { e.currentTarget.textContent = '📋 Copy'; }, 1200);
            } catch (_) {}
          });
        }
      } else {
        div.textContent = text;
      }
      stream.appendChild(div);
      stream.scrollTop = stream.scrollHeight;
      return div;
    }

    function addThinking() {
      const div = document.createElement('div');
      div.className = 'bubble assistant thinking';
      div.innerHTML = `<span class="typing-dots"><span></span><span></span><span></span></span> askEd is thinking…`;
      stream.appendChild(div);
      stream.scrollTop = stream.scrollHeight;
      return div;
    }

    // ---------- Tiny markdown renderer (askEd 4-part template friendly) ----------
    function renderMarkdown(md) {
      const escape = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      let html = escape(md);
      html = html.replace(/^###\s+(.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^#\s+(.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      // ordered lists
      html = html.replace(/(?:^|\n)((?:\d+\.\s+.+\n?)+)/g, (m, block) => {
        const items = block.trim().split(/\n/).map((line) => line.replace(/^\d+\.\s+/, '')).map((t) => `<li>${t}</li>`).join('');
        return `\n<ol>${items}</ol>`;
      });
      // unordered lists
      html = html.replace(/(?:^|\n)((?:[-*]\s+.+\n?)+)/g, (m, block) => {
        const items = block.trim().split(/\n/).map((line) => line.replace(/^[-*]\s+/, '')).map((t) => `<li>${t}</li>`).join('');
        return `\n<ul>${items}</ul>`;
      });
      // paragraphs
      html = html.split(/\n{2,}/).map((para) => {
        if (/^<(h2|ul|ol)/.test(para.trim())) return para;
        return `<p>${para.replace(/\n/g, '<br>')}</p>`;
      }).join('\n');
      return html;
    }

    // Prevent iOS rubber-band scroll inside the stream from yanking the page
    document.body.addEventListener('touchmove', (e) => {
      if (e.target.closest('.stream, .text-input')) return;
      e.preventDefault();
    }, { passive: false });
  </script>
</body>
</html>
