<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Homeowner Portal · Bedrock Association Management</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
  /* =============================================================================
     Homeowner Portal — Bedrock Association Management
     ----------------------------------------------------------------------------
     The customer-UX showcase. Amazon-grade simple. Mobile-first.
     Tile grid renders all modules — live or "coming soon" — based on
     community.portal_module_config. Never broken, never 404.

     Two modes:
       Auth mode (real):  cookie set by /api/portal/consume, data via /api/portal/me
       Demo mode (sales): ?demo=1&community=<slug> — injects realistic mock data
                          so prospective boards see THEIR future portal in a pitch
     ============================================================================= */
  * { box-sizing: border-box; }
  :root {
    --navy: #0B1D34;
    --navy-soft: #2A4870;
    --navy-deep: #0B1D34;
    --gold: #D4AF37;
    --gold-bright: #e8c96e;
    --gold-faint: rgba(212, 175, 55, 0.08);
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-faint: #7a7a7a;
    --cream: #FAFAF6;
    --cream-soft: #F5F4ED;
    --paper: #FFFFFF;
    --rule: #E5E3DA;
    --shadow-soft: 0 1px 3px rgba(26, 48, 80, 0.06), 0 4px 12px rgba(26, 48, 80, 0.04);
    --shadow-hover: 0 4px 12px rgba(26, 48, 80, 0.1), 0 12px 32px rgba(26, 48, 80, 0.08);
    --font-serif: 'Cormorant Garamond', 'Playfair Display', Georgia, serif;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    --radius: 10px;
  }
  html, body {
    margin: 0; padding: 0;
    background: var(--cream-soft);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- Top bar ---- */
  header.top {
    background: white;
    border-bottom: 1px solid var(--rule);
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand svg { width: 28px; height: 35px; flex-shrink: 0; }
  .brand .wm {
    font-family: var(--font-serif); font-size: 17px; font-weight: 500;
    color: var(--navy); letter-spacing: -0.01em; line-height: 1.05;
  }
  .brand .wm em { color: var(--gold); font-style: italic; font-weight: 500; }
  .brand .sub {
    font-family: var(--font-mono); font-size: 9.5px;
    color: var(--ink-faint); letter-spacing: 0.16em; text-transform: uppercase;
    margin-top: 2px;
  }
  .top-right { display: flex; align-items: center; gap: 14px; }
  .top-right .user-name {
    font-size: 13.5px; color: var(--ink); font-weight: 500;
  }
  /* Board View switcher — gold-edged pill in the header for board members.
     Visually distinct from regular nav (signals "this isn't your default
     view; this is the other one"). Hidden by default; JS reveals when
     /me returns is_board_member=true. */
  .board-switcher {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(212,175,55,0.10);
    color: var(--navy);
    border: 1px solid var(--gold);
    padding: 7px 14px; border-radius: 999px;
    font-size: 13px; font-weight: 500;
    text-decoration: none;
    transition: all 0.15s ease;
    margin-right: 4px;
  }
  .board-switcher:hover {
    background: var(--gold);
    color: var(--navy);
    box-shadow: 0 2px 8px rgba(212,175,55,0.4);
  }
  .top-right .user-meta { font-size: 12px; color: var(--ink-faint); }
  .top-right button {
    background: transparent; border: 1px solid var(--rule);
    padding: 8px 14px; border-radius: 6px;
    font-family: var(--font-sans); font-size: 12.5px; color: var(--ink-soft);
    cursor: pointer; transition: all 0.15s ease;
  }
  .top-right button:hover { color: var(--gold); border-color: var(--gold); }
  .demo-badge {
    background: var(--gold); color: var(--navy);
    padding: 4px 10px; border-radius: 999px;
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ---- Hero / property card ---- */
  main { max-width: 1180px; margin: 0 auto; padding: 28px 24px 80px; }

  .hero {
    background: linear-gradient(135deg, #0B1D34 0%, #2A4870 100%);
    border-radius: var(--radius);
    padding: 32px 36px;
    color: var(--cream);
    margin-bottom: 28px;
    position: relative; overflow: hidden;
    box-shadow: var(--shadow-soft);
  }
  .hero::after {
    content: ''; position: absolute; top: -40px; right: -40px;
    width: 240px; height: 240px;
    background: radial-gradient(circle, rgba(212,175,55,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero .greeting {
    font-size: 13px; color: rgba(255,255,255,0.7);
    letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px;
  }
  .hero h1 {
    font-family: var(--font-serif); font-size: 32px; font-weight: 500;
    margin: 0 0 8px; letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .hero h1 em { color: var(--gold); font-style: italic; }
  .hero .property-line {
    font-size: 16px; color: rgba(255,255,255,0.85);
    margin-bottom: 10px;
  }
  .hero-map-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--gold-bright); text-decoration: none;
    font-size: 14px; font-weight: 500;
    padding: 6px 12px; border-radius: 6px;
    background: rgba(212,175,55,0.10);
    border: 1px solid rgba(212,175,55,0.25);
    margin-bottom: 18px;
    transition: all 0.15s ease;
  }
  .hero-map-link:hover {
    background: rgba(212,175,55,0.22);
    border-color: rgba(212,175,55,0.5);
    color: var(--gold-bright);
  }
  .hero .stats {
    display: flex; gap: 36px; flex-wrap: wrap;
    padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.12);
  }
  .hero .stat .label {
    display: block;
    font-size: 11px; color: rgba(255,255,255,0.55);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 4px;
  }
  .hero .stat .value {
    font-family: var(--font-serif); font-size: 22px; color: var(--cream);
    font-weight: 500;
  }
  .hero .stat .value.good   { color: #93E5A8; }
  .hero .stat .value.warn   { color: var(--gold-bright); }
  .hero .stat .value.bad    { color: #E48A8A; }
  .hero .stat .sub {
    font-size: 11.5px; color: rgba(255,255,255,0.6); margin-top: 2px;
  }

  .welcome-banner {
    background: var(--gold-faint); border: 1px solid rgba(212, 175, 55, 0.3);
    color: var(--ink);
    padding: 12px 18px;
    border-radius: 8px;
    margin-bottom: 22px;
    font-size: 13.5px;
  }
  .welcome-banner strong { color: var(--navy); }

  /* ---- Tile grid ---- */
  .section-label {
    font-family: var(--font-sans);
    font-size: 11.5px; color: var(--ink-faint);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin: 0 0 14px;
    font-weight: 500;
  }
  .tile-grid {
    display: grid;
    /* Exactly 3 columns at desktop for the 3-rows-of-3 layout, gracefully
       degrading to 2 on tablets and 1 on phones. */
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .tile {
    background: white;
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 22px;
    position: relative;
    transition: all 0.18s ease;
    box-shadow: var(--shadow-soft);
    text-decoration: none;
    color: inherit;
    display: flex; flex-direction: column;
    min-height: 180px;
  }
  .tile.live { cursor: pointer; }
  .tile.live:hover {
    border-color: var(--gold);
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
  }
  .tile.coming_soon, .tile.maintenance {
    cursor: default;
    background: var(--cream);
  }
  .tile.coming_soon .icon, .tile.coming_soon h3,
  .tile.coming_soon p, .tile.maintenance .icon { opacity: 0.6; }
  .tile .ribbon {
    position: absolute; top: 14px; right: 14px;
    font-size: 10px; padding: 3px 9px;
    border-radius: 999px;
    letter-spacing: 0.06em; text-transform: uppercase;
    font-weight: 500;
  }
  .tile.coming_soon .ribbon {
    background: var(--cream-soft); color: var(--ink-faint);
    border: 1px solid var(--rule);
  }
  .tile.maintenance .ribbon {
    background: rgba(231, 195, 78, 0.15);
    color: #966C00;
    border: 1px solid rgba(231, 195, 78, 0.4);
  }
  .tile.live .ribbon {
    background: rgba(80, 200, 120, 0.12); color: #4A9A6A;
    border: 1px solid rgba(80, 200, 120, 0.3);
  }
  .tile.live.has-action .ribbon { display: none; }

  .tile .icon {
    width: 42px; height: 42px;
    border-radius: 10px;
    background: var(--gold-faint);
    color: var(--gold);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
    font-size: 22px;
  }
  .tile h3 {
    font-family: var(--font-serif); font-size: 18px; font-weight: 500;
    color: var(--navy); margin: 0 0 5px;
    letter-spacing: -0.005em;
  }
  .tile-badge {
    display: inline-block;
    background: #dc2626;
    color: white;
    font-family: var(--font-sans, 'Inter', system-ui, sans-serif);
    font-size: 11.5px;
    font-weight: 700;
    line-height: 1;
    padding: 3px 7px;
    border-radius: 10px;
    margin-left: 4px;
    vertical-align: 2px;
    letter-spacing: 0;
  }
  .tile p {
    font-size: 13px; color: var(--ink-soft); margin: 0 0 14px;
    line-height: 1.5;
  }
  .tile .meta {
    margin-top: auto;
    font-size: 12.5px; color: var(--ink-faint);
    padding-top: 12px; border-top: 1px solid var(--rule);
    display: flex; justify-content: space-between; align-items: center;
  }
  .tile .meta .value { color: var(--ink); font-weight: 500; }
  .tile .meta .arrow {
    color: var(--gold); font-size: 14px; transition: transform 0.15s ease;
  }
  .tile.live:hover .meta .arrow { transform: translateX(3px); }
  .tile .meta-warn { color: #C77E2C; }
  .tile .meta-good { color: #4A9A6A; }

  /* ---- Footer ---- */
  footer.bottom {
    border-top: 1px solid var(--rule);
    padding: 22px 24px;
    background: white;
    font-size: 12px;
    color: var(--ink-faint);
    text-align: center;
  }
  footer.bottom a { color: var(--navy); text-decoration: none; margin: 0 8px; }
  footer.bottom a:hover { color: var(--gold); }
  footer.bottom .tag {
    font-family: var(--font-mono);
    letter-spacing: 0.2em; text-transform: uppercase;
    margin-bottom: 6px;
    color: var(--ink-soft);
  }

  /* ---- Loading state ---- */
  .full-loader {
    display: flex; align-items: center; justify-content: center;
    min-height: 60vh; flex-direction: column; gap: 14px;
    color: var(--ink-faint);
  }
  .spinner {
    width: 22px; height: 22px;
    border: 2px solid var(--rule); border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- Inactive portal state ---- */
  .inactive-state {
    max-width: 480px; margin: 80px auto; text-align: center;
    background: white; padding: 40px 32px;
    border-radius: var(--radius); border: 1px solid var(--rule);
  }
  .inactive-state h2 {
    font-family: var(--font-serif); color: var(--navy);
    font-size: 22px; margin: 0 0 10px;
  }
  .inactive-state p { color: var(--ink-soft); font-size: 14px; }

  /* ---- Header chips (Switch property + Tour) ----
     Both follow the same visual pattern as .board-switcher but distinguished:
     switch-property uses navy outline (utilitarian, frequent use), tour uses
     gold-tinted ghost (less common, slightly inviting). */
  .header-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 13px; border-radius: 999px;
    font-size: 12.5px; font-weight: 500;
    text-decoration: none; cursor: pointer;
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--rule);
    transition: all 0.15s ease;
    font-family: var(--font-sans);
  }
  .header-chip:hover {
    border-color: var(--navy);
    color: var(--navy);
    background: rgba(26, 48, 80, 0.04);
  }
  .header-chip.gold:hover {
    border-color: var(--gold);
    color: var(--navy);
    background: var(--gold-faint);
  }

  /* ---- Property picker (shown when user has 2+ properties) ---- */
  .picker-wrap {
    max-width: 880px; margin: 60px auto; padding: 0 24px;
  }
  .picker-head {
    text-align: center; margin-bottom: 36px;
  }
  .picker-head .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px; color: var(--gold);
    letter-spacing: 0.18em; text-transform: uppercase;
    margin-bottom: 14px;
  }
  .picker-head h2 {
    font-family: var(--font-serif); font-size: 32px; font-weight: 500;
    color: var(--navy); margin: 0 0 8px; letter-spacing: -0.015em;
  }
  .picker-head h2 em { color: var(--gold); font-style: italic; }
  .picker-head p {
    color: var(--ink-soft); font-size: 15px; max-width: 52ch;
    margin: 0 auto;
  }
  .picker-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }
  .picker-card {
    background: white;
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: var(--shadow-soft);
    text-decoration: none; color: inherit;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex; flex-direction: column;
    text-align: left;
  }
  .picker-card:hover {
    border-color: var(--gold);
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
  }
  .picker-card .pc-community {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--ink-faint);
    letter-spacing: 0.14em; text-transform: uppercase;
    margin-bottom: 10px;
  }
  .picker-card .pc-address {
    font-family: var(--font-serif); font-size: 19px; font-weight: 500;
    color: var(--navy); margin: 0 0 4px; line-height: 1.3;
  }
  .picker-card .pc-lot {
    font-size: 12.5px; color: var(--ink-faint); margin-bottom: 16px;
  }
  .picker-card .pc-cta {
    margin-top: auto;
    padding-top: 14px; border-top: 1px solid var(--rule);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; color: var(--navy); font-weight: 500;
  }
  .picker-card .pc-cta .arrow {
    color: var(--gold); transition: transform 0.15s ease;
  }
  .picker-card:hover .pc-cta .arrow { transform: translateX(3px); }

  /* ---- First-login tutorial overlay (3-slide modal) ---- */
  .tutorial-backdrop {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(11, 20, 36, 0.66);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: tutFadeIn 0.22s ease;
  }
  @keyframes tutFadeIn { from { opacity: 0; } to { opacity: 1; } }
  .tutorial-modal {
    background: white;
    border-radius: 14px;
    max-width: 520px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
    position: relative;
    animation: tutSlideUp 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  @keyframes tutSlideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .tutorial-close {
    position: absolute; top: 14px; right: 14px;
    width: 32px; height: 32px;
    background: transparent; border: none;
    border-radius: 50%; cursor: pointer;
    color: var(--ink-faint);
    font-size: 18px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s ease;
  }
  .tutorial-close:hover { background: var(--cream-soft); color: var(--navy); }
  .tutorial-slide {
    padding: 44px 36px 28px;
    text-align: center;
  }
  .tutorial-slide .icon {
    width: 64px; height: 64px;
    border-radius: 14px;
    background: var(--gold-faint);
    color: var(--gold);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 22px;
    font-size: 32px;
  }
  .tutorial-slide h3 {
    font-family: var(--font-serif); font-size: 24px; font-weight: 500;
    color: var(--navy); margin: 0 0 12px; letter-spacing: -0.015em;
  }
  .tutorial-slide h3 em { color: var(--gold); font-style: italic; }
  .tutorial-slide p {
    color: var(--ink-soft); font-size: 14.5px; line-height: 1.6;
    margin: 0 auto; max-width: 38ch;
  }
  .tutorial-controls {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 28px 24px;
    border-top: 1px solid var(--rule);
    background: var(--cream-soft);
  }
  .tutorial-dots {
    display: flex; gap: 7px;
  }
  .tutorial-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--rule);
    transition: all 0.2s ease;
  }
  .tutorial-dot.active { background: var(--gold); width: 18px; border-radius: 999px; }
  .tutorial-btn {
    padding: 9px 18px;
    border-radius: 6px; border: none;
    font-family: var(--font-sans); font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .tutorial-btn.primary {
    background: var(--navy); color: white;
  }
  .tutorial-btn.primary:hover { background: var(--navy-soft); }
  .tutorial-btn.ghost {
    background: transparent; color: var(--ink-faint);
  }
  .tutorial-btn.ghost:hover { color: var(--navy); }

  /* ---- Responsive ---- */
  @media (max-width: 980px) {
    /* Tablet: drop to 2-column so tiles don't get squashed below
       comfortable width */
    .tile-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  @media (max-width: 640px) {
    main { padding: 18px 14px 60px; }
    .hero { padding: 24px 20px; }
    .hero h1 { font-size: 26px; }
    .hero .stats { gap: 20px; }
    .tile-grid { grid-template-columns: 1fr; }
    header.top { padding: 12px 14px; }
    .top-right .user-meta { display: none; }
    .picker-grid { grid-template-columns: 1fr; }
    .picker-head h2 { font-size: 26px; }
    .header-chip { padding: 6px 10px; font-size: 11.5px; }
  }

  /* Mimic mode — body gets padding-top so the fixed banner doesn't cover
     the sticky header. Applied/removed by applyMimicBanner() in JS. */
  body.mimic-on { padding-top: 40px; }
  body.mimic-on header.top { top: 40px; }

  /* Demo community — same pattern. Banner is 32px tall (lighter weight).
     When mimic is also active, stack demo banner below mimic at 40px. */
  body.demo-on { padding-top: 32px; }
  body.demo-on #demoBanner { top: 0; }
  body.demo-on header.top { top: 32px; }
  body.demo-on.mimic-on { padding-top: 72px; }
  body.demo-on.mimic-on #demoBanner { top: 40px; }
  body.demo-on.mimic-on header.top { top: 72px; }
</style>
</head>
<body>

<!-- Mimic banner — fixed at very top, visible ONLY when /me returns
     mimic.active=true. Persistent across the whole portal session so staff
     can't forget they're impersonating. Body gets padding-top via the
     .mimic-on class to make room. Hidden by default. -->
<div id="mimicBanner" style="display:none; position:fixed; top:0; left:0; right:0; background:#b91c1c; color:#fff; padding:8px 16px; z-index:1000; align-items:center; justify-content:space-between; gap:12px; box-shadow:0 2px 8px rgba(0,0,0,0.25); font-family:Inter,-apple-system,sans-serif; font-size:13px; font-weight:600;">
  <div>🎭 <strong>MIMIC MODE</strong> — viewing portal as <span id="mimicTargetName" style="text-decoration:underline;">—</span> <span id="mimicStaffLabel" style="opacity:0.85; font-weight:400;"></span></div>
  <div style="display:flex; gap:10px; align-items:center;">
    <span id="mimicExpiresIn" style="opacity:0.85; font-size:12px; font-weight:400;"></span>
    <button onclick="exitMimic()" style="background:#fff; color:#b91c1c; border:0; border-radius:6px; padding:5px 12px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit;">Exit mimic →</button>
  </div>
</div>

<!-- Manager mode banner (migration 201). Shown when role='manager' is
     viewing a specific property. Read-only view; the banner makes that
     explicit and gives a one-click back to the picker. -->
<div id="managerBanner" style="display:none; position:fixed; top:0; left:0; right:0; background:#0B1D34; color:#fff; padding:8px 16px; z-index:1000; align-items:center; justify-content:space-between; gap:12px; box-shadow:0 2px 8px rgba(0,0,0,0.25); font-family:Inter,-apple-system,sans-serif; font-size:13px; font-weight:600;">
  <div>🏢 <strong>MANAGER VIEW</strong> · <span id="mgrBannerAddress">—</span> · <span id="mgrBannerEmail" style="opacity:0.75; font-weight:400;">—</span></div>
  <div style="display:flex; gap:10px; align-items:center;">

  community: 'Your community',

// =============================================================================
// Boot
// =============================================================================
function $(id) { return document.getElementById(id); }
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function dollars(cents) {
  if (cents == null || cents === '') return '—';
  const n = Number(cents) / 100;
  return n.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
}
function greetingForTime() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}
function fmtAsOf(iso) {
  if (!iso) return 'No recent snapshot';
  const d = new Date(iso);
  return 'As of ' + d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function getQueryParams() {
  const url = new URL(window.location.href);
  return {
    demo: url.searchParams.get('demo') === '1',
    community: url.searchParams.get('community') || '',
  };
}

// =============================================================================
// Data loaders
// =============================================================================
const SS_PROPERTY_KEY = 'bedrock_portal_property_id';

function getStoredPropertyId() {
  try { return sessionStorage.getItem(SS_PROPERTY_KEY) || ''; } catch (_) { return ''; }
}
function setStoredPropertyId(id) {
  try { sessionStorage.setItem(SS_PROPERTY_KEY, String(id || '')); } catch (_) { /* private mode */ }
}
function clearStoredPropertyId() {
  try { sessionStorage.removeItem(SS_PROPERTY_KEY); } catch (_) {}
}

function applyDemoBanner(ctx) {
  const banner = document.getElementById('demoBanner');
  if (!banner) return;
  const isDemo = !!(ctx && ctx.community && ctx.community.is_demo);
  if (isDemo) {
    document.getElementById('demoBannerName').textContent = ctx.community.name || 'Demo Community';
    banner.style.display = 'flex';
    document.body.classList.add('demo-on');
  } else {
    banner.style.display = 'none';
    document.body.classList.remove('demo-on');
  }
}

// Manager banner — shown when ctx.user.role === 'manager' AND we're viewing
// a specific property (not the picker). The picker handles its own header
// so we only show the banner on the homeowner-view portion.
function applyManagerBanner(ctx) {
  const banner = document.getElementById('managerBanner');
  if (!banner) return;
  const isManagerViewing = (ctx?.user?.role === 'manager')
    && !ctx?.manager_mode?.picker_required
    && ctx?.property?.address;
  if (isManagerViewing) {
    document.getElementById('mgrBannerAddress').textContent = ctx.property.address;
    document.getElementById('mgrBannerEmail').textContent = `as ${ctx.user.email || 'manager'}`;
    banner.style.display = 'flex';
    document.body.style.paddingTop = '40px';
  } else {
    banner.style.display = 'none';
  }
}

async function applyMimicBanner(ctx) {
  const banner = document.getElementById('mimicBanner');
  if (!banner) return;
  const mimic = ctx && ctx.mimic;
  if (mimic && mimic.active) {
    document.getElementById('mimicTargetName').textContent =
      (ctx.user && (ctx.user.name || ctx.user.email)) || '—';
    document.getElementById('mimicStaffLabel').textContent =
      `· staff: ${mimic.staff_email}`;
    // Live countdown until expiry
    const updateCountdown = () => {
      const expiresAt = new Date(mimic.expires_at).getTime();
      const ms = expiresAt - Date.now();
      const lbl = document.getElementById('mimicExpiresIn');
      if (!lbl) return;
      if (ms <= 0) { lbl.textContent = 'expired — refresh'; return; }
      const m = Math.floor(ms / 60000);
      const s = Math.floor((ms % 60000) / 1000);
      lbl.textContent = `expires in ${m}m ${s.toString().padStart(2,'0')}s`;
    };
    updateCountdown();
    if (window._mimicTimer) clearInterval(window._mimicTimer);
    window._mimicTimer = setInterval(updateCountdown, 1000);
    banner.style.display = 'flex';
    document.body.classList.add('mimic-on');
  } else {
    banner.style.display = 'none';
    document.body.classList.remove('mimic-on');
    if (window._mimicTimer) { clearInterval(window._mimicTimer); window._mimicTimer = null; }
  }
}

async function exitMimic() {
  try {
    await fetch('/api/portal/mimic/stop', { method: 'POST', credentials: 'same-origin' });
  } catch (_) { /* ignore */ }
  // Reload back to the portal — if staff also has their own portal session,
  // they'll see that; otherwise the auth redirect kicks them to the login page.
  window.location.href = '/portal';
}

async function loadPortal() {
  const { demo, community } = getQueryParams();

  // Demo mode — inject realistic mock data so Ed can pitch any community
  if (demo) {
    return buildDemoContext(community || 'waterview');
  }

  // Real auth mode. If we have a stored property selection in sessionStorage
  // (set by the property picker or restored on tab refresh), pass it as
  // ?property_id so /me returns context for THAT property. Otherwise /me
  // defaults to the first property — which is fine for single-property
  // homeowners and also a sensible default for first-load of the picker
  // before the user picks.
  // URL-level ?property_id wins (manager picker uses this to render a
  // specific property's view). Falls back to session-stored picker
  // choice. Falls back to no param (first-property default).
  const urlParams = new URLSearchParams(window.location.search);
  const urlPropertyId = urlParams.get('property_id');
  const storedId = urlPropertyId || getStoredPropertyId();
  const url = storedId
    ? `/api/portal/me?property_id=${encodeURIComponent(storedId)}`
    : '/api/portal/me';
  try {
    const r = await fetch(url, { credentials: 'same-origin' });
    if (r.status === 401) {
      window.location.href = '/portal-login.html';
      return null;
    }
    if (!r.ok) throw new Error('Could not load portal');
    return await r.json();
  } catch (err) {
    return { error: err.message };
  }
}

function buildDemoContext(communitySlug) {
  const communityNames = {
    'waterview':         'Waterview Estates',
    'canyon-gate':       'Canyon Gate at Cinco Ranch',
    'august-meadows':    'August Meadows',
    'still-creek-ranch': 'Still Creek Ranch',
    'lakes-of-pine-forest': 'Lakes of Pine Forest',
    'quail-ridge':       'Quail Ridge',
  };
  const name = communityNames[communitySlug] || 'Your Community';
  const today = new Date();
  const lastSnapshot = new Date(today.getTime() - 36 * 60 * 60 * 1000).toISOString();

  return {
    user: { name: 'Sample Homeowner', email: 'sample@example.com' },
    property: {
      address: '1234 Sample Drive',
      lot_block_section: 'Lot 12, Block 4, Section 1',
      community_slug: communitySlug,
      community_name: name,
    },
    community: {
      slug: communitySlug,
      name,
      hoa_legal_name: `${name} Owners Association, Inc.`,
      welcome_message: '',
      portal_active: true,
      portal_module_config: defaultDemoModuleConfig(communitySlug),
    },
    balance: { amount_cents: 0, status: 'current', as_of: lastSnapshot },
    compliance: { open_count: 0, status: 'good' },
    open_requests: { count: 1, label: '1 ARC application under review' },
    demo: true,
  };
}

function defaultDemoModuleConfig(slug) {
  // Demo: tiles are live where Bedrock has functional backends, coming-soon otherwise.
  return {
    property_summary: { status: 'live' },
    messages:         { status: 'live' },  // demo mode: links into Messages page (empty state)
    balance:          { status: 'live' },  // demo mode: renders mock $0 current account
    arc:              { status: 'live' },
    compliance:       { status: 'live' },  // demo mode: shows mock open + resolved notices
    key_fob:          { status: 'live' },
    clubhouse:        { status: 'live' },  // demo mode: clubhouse always shows the demo flow
    documents:        { status: 'live' },  // demo mode: renders mock governing docs library
    financials:       { status: 'live' },  // demo mode: renders the same docs payload filtered to financial group
    meetings:         { status: 'live' },  // demo mode: 2 upcoming + 5 past meeting minutes
    map:              { status: 'live' },  // demo mode: map renders mock amenities
    contacts:         { status: 'live' },  // demo mode: loads from community_contacts table (seeded for Waterview)
  };
}

// =============================================================================
// Rendering
// =============================================================================
function renderInactive(reason) {
  const tpl = $('inactiveTemplate');
  $('app').innerHTML = '';
  $('app').appendChild(tpl.content.cloneNode(true));
  if (reason) {
    $('inactiveTitle').textContent = reason.title || 'Portal not yet available';
    $('inactiveMessage').innerHTML = reason.message || $('inactiveMessage').innerHTML;
  }
}

function renderPortal(ctx) {
  if (ctx?.error) {
    renderInactive({ title: 'Couldn\'t load portal', message: escapeHtml(ctx.error) });
    return;
  }
  if (!ctx) return;

  // MANAGER MODE picker — Bedrock staff with role=manager get the property
  // browser instead of a homeowner view. Picking a property re-fetches
  // /me?property_id=X which falls through to the homeowner render.
  if (ctx.manager_mode?.picker_required) {
    renderManagerPicker(ctx);
    return;
  }

  // Multi-property picker — render BEFORE the portal itself if the user has
  // 2+ properties AND hasn't already picked one in this session. The picker
  // is the user's "which property today?" entry point. After they pick, we
  // re-fetch /me?property_id=<id> and re-enter renderPortal with the chosen
  // property's context — at which point properties.length >= 2 is still
  // true but getStoredPropertyId() now returns the chosen id, so we skip
  // the picker and render the portal proper.
  const stored = getStoredPropertyId();
  const props = Array.isArray(ctx.properties) ? ctx.properties : [];
  const showPicker = !ctx.demo && props.length >= 2 && !stored;
  if (showPicker) {
    renderPropertyPicker(ctx);
    return;
  }

  // Demo communities bypass the portal_active gate by design — the gate
  // exists so real boards can opt in formally, but demo communities are
  // always-on by definition. ctx.demo is the URL-param demo mode (older
  // path); ctx.community.is_demo is the seeded demo-community flag
  // (Drama Creek per migration 184). Either signal opens the portal.
  if (!ctx.community?.portal_active && !ctx.demo && !ctx.community?.is_demo) {
    renderInactive({
      title: 'Portal not yet available for your community',
      message: `Your community's portal is being prepared. In the meantime, contact Bedrock at <a href="mailto:info@bedrocktx.com">info@bedrocktx.com</a> or (832) 588-2485.`,
    });
    return;
  }

  const tpl = $('portalTemplate');
  $('app').innerHTML = '';
  $('app').appendChild(tpl.content.cloneNode(true));

  // Top bar
  $('userName').textContent = ctx.user.name || ctx.user.email;
  $('userMeta').textContent = ctx.property?.address || '';

  // Inject "Switch property" + "Tour" chips into the header. Both rendered
  // dynamically so the existing template stays minimal — chips only appear
  // when applicable (switcher: 2+ properties; tour: always available
  // post-login as a re-launch option). Inserted BEFORE the user-name block
  // so the visual hierarchy is: action chips → identity → sign-out.
  const switchEl = document.createElement('a');
  switchEl.id = 'switchPropertyBtn';
  switchEl.href = '#';
  switchEl.className = 'header-chip';
  switchEl.innerHTML = '🏠 Switch property';
  switchEl.title = 'Pick a different property to view';
  switchEl.addEventListener('click', (e) => {
    e.preventDefault();
    clearStoredPropertyId();
    // Reload to fetch /me without property_id — picker will show
    window.location.reload();
  });
  const tourEl = document.createElement('button');
  tourEl.id = 'tourBtn';
  tourEl.className = 'header-chip gold';
  tourEl.type = 'button';
  tourEl.innerHTML = '🎓 Tour';
  tourEl.title = 'Walk through what the portal can do';
  tourEl.addEventListener('click', () => showTutorialOverlay({ updateDismissed: false }));

  // Insert chips before the user-name container in the top-right group.
  // For multi-property users, both chips appear; otherwise only Tour.
  const topRight = document.querySelector('.top-right');
  const userNameWrapper = $('userName')?.parentElement;
  if (topRight && userNameWrapper) {
    if (props.length >= 2) topRight.insertBefore(switchEl, userNameWrapper);
    topRight.insertBefore(tourEl, userNameWrapper);
  }

  // Reveal the Board View switcher if user has board access. Remember the
  // last-chosen view so subsequent logins go straight there (we save 'board'
  // here on click; portal-login.html reads it on auth success).
  if (ctx.is_board_member) {
    const btn = $('boardViewBtn');
    btn.style.display = '';
    btn.addEventListener('click', (e) => {
      try { localStorage.setItem('bedrock_portal_last_view', 'board'); } catch (_) {}
      // Let the navigation proceed normally
    });
  }
  if (ctx.demo) $('demoBadge').style.display = '';

  // Hero
  $('greeting').textContent = greetingForTime();
  $('welcomeName').textContent = (ctx.user.name || '').split(' ')[0] || 'Welcome';
  $('welcomeCommunity').textContent = ctx.community.name;
  $('propertyLine').textContent = [ctx.property.address, ctx.property.lot_block_section]
    .filter(Boolean).join(' · ');
  // Hero map link — preserve demo mode + community slug if applicable
  const mapLink = $('heroMapLink');
  if (mapLink) {
    const q = getQueryParams ? getQueryParams() : { demo: false, community: '' };
    if (q.demo) {
      mapLink.href = `/portal/map?demo=1&community=${encodeURIComponent(q.community || ctx.community.slug || '')}`;
    } else {
      mapLink.href = '/portal/map';
    }
  }

  // Stats
  const bal = ctx.balance || {};
  const balVal = $('balanceValue');
  if (bal.status === 'current' || (bal.amount_cents === 0)) {
    balVal.textContent = 'Current';
    balVal.classList.add('good');
    $('balanceAsOf').textContent = fmtAsOf(bal.as_of);
  } else if (bal.amount_cents > 0) {
    balVal.textContent = dollars(bal.amount_cents);
    balVal.classList.add(bal.status === 'past_due' ? 'bad' : 'warn');
    $('balanceAsOf').textContent = `Due · ${fmtAsOf(bal.as_of)}`;
  } else {
    balVal.textContent = 'Not available';
    $('balanceAsOf').textContent = '';
  }

  const compVal = $('complianceValue');
  const comp = ctx.compliance || {};
  if (comp.status === 'good') {
    compVal.textContent = 'In good standing';
    compVal.classList.add('good');
    $('complianceSub').textContent = 'No open notices';
  } else if (comp.open_count) {
    compVal.textContent = `${comp.open_count} open`;
    compVal.classList.add('warn');
    $('complianceSub').textContent = 'Tap "Property Compliance" for details';
  } else {
    compVal.textContent = '—';
    $('complianceSub').textContent = '';
  }

  const reqVal = $('requestsValue');
  const req = ctx.open_requests || {};
  if (req.count) {
    reqVal.textContent = req.count;
    $('requestsSub').textContent = req.label || `${req.count} item${req.count===1?'':'s'} in progress`;
  } else {
    reqVal.textContent = 'None';
    $('requestsSub').textContent = 'No active requests';
  }

  // Welcome banner
  if (ctx.community.welcome_message) {
    $('welcomeBanner').style.display = '';
    $('welcomeBanner').innerHTML = ctx.community.welcome_message;
  }

  // Tiles
  renderTiles(ctx);

  // Footer
  $('footerHoa').textContent = `${ctx.community.hoa_legal_name || ctx.community.name} · administered by Bedrock Association Management`;

  // Wire logout
  $('logoutBtn').addEventListener('click', async () => {
    if (ctx.demo) {
      window.location.href = '/';
      return;
    }
    // Clear stored property choice so the next login starts clean (multi-
    // property users go back through the picker on next sign-in unless
    // they re-pick the same property).
    clearStoredPropertyId();
    try { await fetch('/api/portal/logout', { method: 'POST', credentials: 'same-origin' }); }
    finally { window.location.href = '/portal-login.html'; }
  });

  // Auto-show first-login tutorial overlay if the user hasn't dismissed it.
  // tutorial_dismissed = true means "user has seen + dismissed the tutorial
  // at least once" — they can still re-launch via the Tour chip.
  // Skip in demo mode (no real user, no persistence target).
  if (!ctx.demo && ctx.user && ctx.user.tutorial_dismissed === false) {
    // Small delay so the portal renders first, then the overlay appears
    // on top of a fully-loaded page rather than a flash of empty state.
    setTimeout(() => showTutorialOverlay({ updateDismissed: true }), 600);
  }
}

function renderTiles(ctx) {
  const cfg = ctx.community.portal_module_config || {};
  const grid = $('tileGrid');
  grid.innerHTML = '';

  // Group by section to provide light visual structure on long lists
  let lastSection = null;
  let currentGrid = null;

  for (const mod of MODULES) {
    const modCfg = cfg[mod.key] || { status: 'coming_soon' };
    if (modCfg.status === 'hidden') continue;

    // Section break — render a new label + new grid container
    if (mod.section !== lastSection) {
      if (lastSection !== null) {
        // wrap previous and add spacing
      }
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = SECTION_LABELS[mod.section] || '';
      grid.parentElement.appendChild(label);
      currentGrid = document.createElement('div');
      currentGrid.className = 'tile-grid';
      grid.parentElement.appendChild(currentGrid);
      lastSection = mod.section;
    }

    const isLive = modCfg.status === 'live';
    const isMaint = modCfg.status === 'maintenance';
    let link = isLive ? (modCfg.link || mod.buildLink({
      communitySlug: ctx.community.slug,
      payment_portal_url: cfg.payments?.link,
    })) : null;

    // Carry the demo flag through to downstream forms that support it.
    // This keeps the pitch demo coherent — clicking Clubhouse from a demo
    // portal lands on a demo clubhouse form, not a 404 because no real
    // amenity exists yet.
    if (link && ctx.demo && (link.startsWith('/clubhouse/') || link.startsWith('/portal/'))) {
      const sep = link.includes('?') ? '&' : '?';
      // Portal sub-pages (/portal/map, /portal/compliance, etc.) need community= explicitly
      const needsCommunity = link.startsWith('/portal/');
      link += `${sep}demo=1${needsCommunity ? `&community=${encodeURIComponent(ctx.community.slug)}` : ''}`;
    }

    const tile = document.createElement(isLive ? 'a' : 'div');
    tile.className = `tile ${modCfg.status}`;
    tile.dataset.tileKey = mod.key;
    if (isLive) {
      tile.href = link;
      tile.classList.add('has-action');
    }

    tile.innerHTML = `
      ${!isLive ? `<span class="ribbon">${isMaint ? 'Maintenance' : 'Coming soon'}</span>` : ''}
      <div class="icon">${mod.icon}</div>
      <h3>${escapeHtml(mod.title)} <span class="tile-badge" data-badge-key="${mod.key}" style="display:none;"></span></h3>
      <p>${escapeHtml(mod.description)}</p>
      ${isLive ? `
        <div class="meta">
          <span class="value">${escapeHtml(mod.cta)}</span>
          <span class="arrow">→</span>
        </div>` : ''}
      ${modCfg.notes ? `<div class="meta"><span style="font-size:11.5px;color:var(--ink-faint);">${escapeHtml(modCfg.notes)}</span></div>` : ''}
    `;

    currentGrid.appendChild(tile);
  }

  // Post-render decorations — kick off async badge counts where applicable.
  // Skip in demo mode (no real backend data, would 404 / 401).
  if (!ctx.demo) decorateTileBadges();
}

async function decorateTileBadges() {
  // Messages tile — unread count.
  try {
    const r = await fetch('/api/portal/messages', { credentials: 'same-origin' });
    if (!r.ok) return;
    const j = await r.json();
    const total = (j.threads || []).reduce((sum, t) => sum + (t.unread_count || 0), 0);
    if (total > 0) {
      document.querySelectorAll('[data-badge-key="messages"]').forEach((el) => {
        el.textContent = total > 99 ? '99+' : String(total);
        el.style.display = 'inline-block';
      });
    }
  } catch (_) { /* swallow — best-effort decoration */ }

  // Remove the initial empty grid container created by the template
  grid.remove();
}

async function managerLoadProperties() {
  const q = document.getElementById('mgrSearch').value.trim();
  const wrap = document.getElementById('mgrResults');
  wrap.innerHTML = '<div style="padding: 24px; text-align: center; color: #6b7280;">Loading…</div>';
  try {
    const r = await fetch('/api/portal/manager/properties' + (q ? ('?q=' + encodeURIComponent(q)) : ''), {
      credentials: 'same-origin',
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || `HTTP ${r.status}`);
    const props = j.properties || [];
    if (!props.length) {
      wrap.innerHTML = '<div style="padding: 24px; text-align: center; color: #94a3b8;">No properties match.</div>';
      return;
    }
    wrap.innerHTML = `
      <table style="width: 100%; border-collapse: collapse; font-size: 13.5px;">
        <thead>
          <tr style="background: #f8fafc; color: #475569; text-transform: uppercase; font-size: 10.5px; letter-spacing: 0.05em;">
            <th style="text-align: left; padding: 10px 16px;">Address</th>
            <th style="text-align: left; padding: 10px 16px;">Community</th>
            <th style="text-align: left; padding: 10px 16px;">Owner</th>
            <th style="text-align: left; padding: 10px 16px;">Account</th>
            <th style="padding: 10px 16px;"></th>
          </tr>
        </thead>
        <tbody>
          ${props.map(p => `
            <tr style="border-bottom: 1px solid #f1f5f9; cursor: pointer;"
                onclick="managerOpenProperty('${escapeHtml(p.property_id)}')"
                onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
              <td style="padding: 12px 16px; font-weight: 500; color: #0B1D34;">${escapeHtml(p.street_address || '—')}</td>
              <td style="padding: 12px 16px; color: #475569;">${escapeHtml(p.community_name || '—')}</td>
              <td style="padding: 12px 16px; color: #475569;">${escapeHtml(p.owner_name || '—')}</td>
              <td style="padding: 12px 16px; color: #6b7280; font-family: monospace; font-size: 12px;">${escapeHtml(p.vantaca_account_id || '—')}</td>
              <td style="padding: 12px 16px; text-align: right;"><span style="color: #0B1D34; font-size: 12px;">Open →</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } catch (e) {
    wrap.innerHTML = `<div style="padding: 24px; color: #b91c1c;">Load failed: ${escapeHtml(e.message)}</div>`;
  }
}

function managerOpenProperty(propertyId) {
  // Re-render the portal as that property's homeowner view
  window.location.href = '/portal?property_id=' + encodeURIComponent(propertyId);
}

// =============================================================================
// Property picker (multi-property users)
// =============================================================================
function renderPropertyPicker(ctx) {
  const tpl = $('propertyPickerTemplate');
  $('app').innerHTML = '';
  $('app').appendChild(tpl.content.cloneNode(true));

  $('pickerUserName').textContent = ctx.user?.name || ctx.user?.email || '';
  if (ctx.demo) $('pickerDemoBadge').style.display = '';

  const grid = $('pickerGrid');
  grid.innerHTML = '';

  (ctx.properties || []).forEach((p) => {
    const card = document.createElement('button');
    card.type = 'button';
    card.className = 'picker-card';
    card.innerHTML = `
      <div class="pc-community">${escapeHtml(p.community_name || 'Community')}</div>
      <div class="pc-address">${escapeHtml(p.address || '—')}</div>
      ${p.lot_block_section ? `<div class="pc-lot">${escapeHtml(p.lot_block_section)}</div>` : ''}
      <div class="pc-cta">
        <span>View this property</span>
        <span class="arrow">→</span>
      </div>
    `;
    card.addEventListener('click', async () => {
      // Lock in this choice for the session, then reload to fetch the
      // full portal context for THIS property. Reload (rather than re-
      // entering renderPortal with the lighter list payload) keeps the
      // data path consistent — /me handles property_id, frontend just
      // re-runs its normal flow.
      setStoredPropertyId(p.id);
      window.location.reload();
    });
    grid.appendChild(card);
  });

  // Wire logout in the picker header
  const logoutBtn = $('pickerLogoutBtn');
  if (logoutBtn) {
    logoutBtn.addEventListener('click', async () => {
      clearStoredPropertyId();
      try { await fetch('/api/portal/logout', { method: 'POST', credentials: 'same-origin' }); }
      finally { window.location.href = '/portal-login.html'; }
    });
  }
}

// =============================================================================
// First-login tutorial overlay (3 slides)
// =============================================================================
// Slide content — kept here so it's easy to edit copy without touching markup.
// Each slide: { icon, title (allows <em> for gold accent), body }.
// Length discipline: under 280 chars of body per slide. People skim overlays.
const TUTORIAL_SLIDES = [
  {
    icon: '👋',
    title: 'Welcome to your <em>community portal</em>',
    body: 'This is your one place for everything related to your home and community — your balance, compliance status, governing documents, and quick ways to request services. Built by Bedrock, made for you.',
  },
  {
    icon: '🏠',
    title: 'See your <em>account at a glance</em>',
    body: 'The hero card up top shows your current balance, compliance status, and any open requests. Click the tiles below for full detail on each. Everything updates as we process things on our end.',
  },
  {
    icon: '🎉',
    title: 'Make a <em>request anytime</em>',
    body: 'Submit an architectural request, ask for a new pool fob, or reserve the clubhouse — all from the "Make a request" tiles. Questions? Email info@bedrocktx.com or call (832) 588-2485. Welcome aboard!',
  },
];

let _tutorialSlideIndex = 0;
let _tutorialShouldDismiss = false;

function showTutorialOverlay({ updateDismissed = false } = {}) {
  _tutorialSlideIndex = 0;
  _tutorialShouldDismiss = !!updateDismissed;
  const tpl = $('tutorialOverlayTemplate');
  // Append to body so backdrop covers the entire viewport regardless of
  // current app contents.
  const fragment = tpl.content.cloneNode(true);
  document.body.appendChild(fragment);
  _renderTutorialSlide();

  // Wire controls
  $('tutCloseBtn')?.addEventListener('click', () => _dismissTutorial());
  $('tutBackBtn')?.addEventListener('click', () => {
    if (_tutorialSlideIndex > 0) { _tutorialSlideIndex--; _renderTutorialSlide(); }
  });
  $('tutNextBtn')?.addEventListener('click', () => {
    if (_tutorialSlideIndex < TUTORIAL_SLIDES.length - 1) {
      _tutorialSlideIndex++;
      _renderTutorialSlide();
    } else {
      // Final slide "Got it" → dismiss
      _dismissTutorial();
    }
  });
  // Click outside the modal also dismisses (backdrop click). Don't catch
  // clicks inside .tutorial-modal.
  $('tutorialBackdrop')?.addEventListener('click', (e) => {
    if (e.target.id === 'tutorialBackdrop') _dismissTutorial();
  });
  // ESC key to close
  document.addEventListener('keydown', _tutorialEscHandler);
}

function _tutorialEscHandler(e) {
  if (e.key === 'Escape') _dismissTutorial();
}

function _renderTutorialSlide() {
  const slide = TUTORIAL_SLIDES[_tutorialSlideIndex];
  const contentEl = $('tutSlideContent');
  if (contentEl) {
    contentEl.innerHTML = `
      <div class="icon">${slide.icon}</div>
      <h3 id="tutSlideTitle">${slide.title}</h3>
      <p>${escapeHtml(slide.body)}</p>
    `;
  }
  // Dots
  const dotsEl = $('tutDots');
  if (dotsEl) {
    dotsEl.innerHTML = TUTORIAL_SLIDES.map((_, i) =>
      `<div class="tutorial-dot${i === _tutorialSlideIndex ? ' active' : ''}"></div>`
    ).join('');
  }
  // Back button visibility (hidden on first slide)
  const backBtn = $('tutBackBtn');
  if (backBtn) backBtn.style.display = _tutorialSlideIndex === 0 ? 'none' : '';
  // Next button label changes on final slide
  const nextBtn = $('tutNextBtn');
  if (nextBtn) {
    nextBtn.textContent = (_tutorialSlideIndex === TUTORIAL_SLIDES.length - 1)
      ? 'Got it →'
      : 'Next →';
  }
}

function _dismissTutorial() {
  const backdrop = $('tutorialBackdrop');
  if (backdrop) backdrop.remove();
  document.removeEventListener('keydown', _tutorialEscHandler);
  // Only mark dismissed in the DB if this was an AUTO-show (first login).
  // Re-launches via "Tour" button don't update the timestamp.
  if (_tutorialShouldDismiss) {
    fetch('/api/portal/tutorial-dismissed', {
      method: 'POST',
      credentials: 'same-origin',
    }).catch(() => { /* best-effort */ });
    _tutorialShouldDismiss = false;
  }
}

  const ctx = await loadPortal();
  applyDemoBanner(ctx);
  applyMimicBanner(ctx);
  applyManagerBanner(ctx);
  renderPortal(ctx);
