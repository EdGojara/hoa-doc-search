<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>askEd · Bedrock Intelligence</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1A3050">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="askEd">
<link rel="stylesheet" href="/brand.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
  * { box-sizing: border-box; }
  :root {
    --paper: #ffffff;
    --cream-soft: #F5F4ED;
    --ink-dark: #1a1a1a;
    --ink-mid: #4a4a4a;
    --ink-light: #7a7a7a;
    --rule-light: #E5E3DA;
  }
  html, body {
    margin: 0; padding: 0;
    background: var(--cream-soft);
    color: var(--ink-dark);
    font-family: var(--font-sans);
    font-size: 15px; line-height: 1.5;
    height: 100vh; overflow: hidden;
  }

  /* ----- Top bar ----- */
  .topbar {
    background: var(--paper);
    border-bottom: 1px solid var(--rule-light);
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
    flex-shrink: 0;
  }
  .brand-block { display: flex; align-items: center; gap: 12px; }
  .brand-block svg { width: 28px; height: 35px; }
  .brand-block .wm {
    font-family: var(--font-serif); font-size: 16px; font-weight: 500;
    color: #1A3050; line-height: 1.1;
  }
  .brand-block .wm em { color: #D4AF37; font-style: italic; }
  .brand-block .sub {
    font-family: var(--font-mono); font-size: 9px;
    color: var(--ink-light); letter-spacing: 0.18em; text-transform: uppercase;
    margin-top: 2px;
  }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--paper); border: 1px solid var(--rule-light);
    color: var(--ink-mid); border-radius: 999px;
    padding: 6px 12px; font-size: 13px;
    cursor: pointer; text-decoration: none;
    transition: all 0.15s ease;
  }
  .pill:hover { border-color: #D4AF37; color: #1A3050; }
  .pill select {
    border: none; background: transparent;
    font-family: inherit; font-size: 13px; color: inherit;
    outline: none; cursor: pointer;
    appearance: none; padding-right: 4px;
  }

  /* ----- Main area ----- */
  .chat-shell {
    flex: 1;
    display: flex; flex-direction: column;
    height: calc(100vh - 60px);
    max-width: 900px; margin: 0 auto;
    width: 100%;
  }

  .messages {
    flex: 1; overflow-y: auto;
    padding: 24px 24px 8px;
    scroll-behavior: smooth;
  }

  .empty-state {
    text-align: center;
    padding: 40px 24px;
    color: var(--ink-mid);
  }
  .empty-state h1 {
    font-family: var(--font-serif);
    font-size: 28px; font-weight: 500;
    color: #1A3050;
    margin: 0 0 8px;
  }
  .empty-state h1 em { color: #D4AF37; font-style: italic; }
  .empty-state p { font-size: 14px; color: var(--ink-mid); margin-bottom: 24px; }
  .quickstart {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; max-width: 640px; margin: 0 auto;
  }
  .quickstart button {
    background: var(--paper); border: 1px solid var(--rule-light);
    border-radius: 18px; padding: 8px 14px;
    font-family: var(--font-sans); font-size: 13px;
    color: var(--ink-mid); cursor: pointer;
    transition: all 0.15s ease;
  }
  .quickstart button:hover {
    border-color: #D4AF37; color: #1A3050;
    background: #FFFBEF;
  }

  /* ----- Bubbles ----- */
  .turn { margin-bottom: 18px; max-width: 100%; }
  .turn.user { display: flex; justify-content: flex-end; flex-direction: column; align-items: flex-end; }
  .turn.assistant { display: flex; justify-content: flex-start; flex-direction: column; align-items: flex-start; }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 14px;
    line-height: 1.55;
    font-size: 14.5px;
    word-wrap: break-word;
  }
  .bubble.user {
    background: #1A3050; color: white;
    border-bottom-right-radius: 4px;
  }
  .bubble.assistant {
    background: var(--paper);
    border: 1px solid var(--rule-light);
    color: var(--ink-dark);
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 2px rgba(26, 48, 80, 0.04);
  }
  .bubble.assistant.thinking {
    color: var(--ink-light);
  }
  .bubble.assistant strong { color: #1A3050; }
  .bubble.assistant em { color: var(--ink-mid); }
  .bubble.assistant code {
    background: #F5F4ED;
    padding: 1px 5px; border-radius: 4px;
    font-family: var(--font-mono); font-size: 13px;
  }
  .bubble.assistant pre {
    background: #F5F4ED;
    padding: 10px 12px; border-radius: 6px;
    overflow-x: auto; font-size: 13px;
    font-family: var(--font-mono);
  }
  .bubble.assistant ul, .bubble.assistant ol { padding-left: 22px; margin: 8px 0; }
  .bubble.assistant li { margin-bottom: 4px; }
  .bubble.assistant p { margin: 0 0 10px; }
  .bubble.assistant p:last-child { margin-bottom: 0; }
  .bubble.assistant h2, .bubble.assistant h3 {
    font-family: var(--font-serif);
    color: #1A3050;
    font-size: 17px; font-weight: 500;
    margin: 14px 0 8px;
  }

  /* Attachment chip strip above the user bubble */
  .attach-chips {
    display: flex; flex-wrap: wrap; gap: 4px;
    margin-bottom: 6px; max-width: 78%;
    justify-content: flex-end;
  }
  .attach-chip {
    background: rgba(26, 48, 80, 0.08);
    color: #1A3050;
    border-radius: 12px;
    padding: 3px 10px;
    font-size: 11px;
    font-family: var(--font-mono);
    letter-spacing: 0.02em;
    display: inline-flex; align-items: center; gap: 4px;
  }

  /* "Reading: X playbook + Y docs" badge — appears above thinking bubble */
  .context-badge {
    background: #FFFBEF;
    border: 1px solid #E8D880;
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 11.5px;
    font-family: var(--font-mono);
    letter-spacing: 0.03em;
    color: #806820;
    margin-bottom: 6px;
    display: inline-flex; align-items: center; gap: 6px;
    max-width: 78%;
  }
  .context-badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #D4AF37;
    animation: dotPulse 1.2s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* Tool status pill — inline above bubble during tool execution */
  .tool-status {
    background: #EEF4FB;
    border: 1px solid #C8D8EB;
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 11.5px;
    font-family: var(--font-mono);
    letter-spacing: 0.03em;
    color: #1A3050;
    margin-bottom: 6px;
    display: inline-flex; align-items: center; gap: 6px;
    max-width: 78%;
  }
  .tool-status .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #1A3050;
    animation: dotPulse 1.2s ease-in-out infinite;
  }

  /* Bubble actions */
  .bubble-actions {
    display: flex; gap: 6px; margin-top: 8px;
    opacity: 0; transition: opacity 0.15s ease;
  }
  .turn.assistant:hover .bubble-actions,
  .bubble-actions:focus-within { opacity: 1; }
  .bubble-action {
    background: transparent;
    border: 1px solid var(--rule-light);
    color: var(--ink-light); font-size: 11px;
    padding: 3px 8px; border-radius: 12px;
    cursor: pointer; font-family: var(--font-mono);
    letter-spacing: 0.04em;
    transition: all 0.12s ease;
  }
  .bubble-action:hover { border-color: #D4AF37; color: #1A3050; }

  /* ----- Composer ----- */
  .composer-wrap {
    background: linear-gradient(180deg, rgba(245,244,237,0) 0%, var(--cream-soft) 30%);
    padding: 8px 24px 16px;
    flex-shrink: 0;
  }
  .composer-attachments {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 6px;
  }
  .composer-attachments .chip {
    background: var(--paper);
    border: 1px solid var(--rule-light);
    border-radius: 14px;
    padding: 4px 10px 4px 12px;
    font-size: 12px;
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--ink-mid);
  }
  .composer-attachments .chip button {
    background: none; border: none; cursor: pointer;
    color: var(--ink-light); font-size: 14px; line-height: 1;
    padding: 0 2px; border-radius: 50%;
  }
  .composer-attachments .chip button:hover { color: #962a2a; }

  .composer {
    background: var(--paper);
    border: 1px solid var(--rule-light);
    border-radius: 14px;
    padding: 6px 6px 6px 8px;
    display: flex; align-items: flex-end; gap: 4px;
    box-shadow: 0 2px 10px rgba(26, 48, 80, 0.04);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .composer:focus-within {
    border-color: #D4AF37;
    box-shadow: 0 2px 14px rgba(212, 175, 55, 0.12);
  }
  .composer.drag-over {
    border-color: #D4AF37;
    background: #FFFBEF;
  }
  .composer textarea {
    flex: 1; border: none; outline: none; resize: none;
    font-family: var(--font-sans); font-size: 15px; line-height: 1.5;
    background: transparent; color: var(--ink-dark);
    max-height: 220px; min-height: 24px;
    padding: 8px 4px;
  }
  .icon-btn {
    background: transparent; border: none;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    color: var(--ink-light); font-size: 18px;
    border-radius: 10px;
    transition: all 0.12s ease;
  }
  .icon-btn:hover { color: #1A3050; background: rgba(26, 48, 80, 0.06); }
  .send-btn {
    background: #1A3050; color: white;
    border: none; border-radius: 10px;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    transition: background 0.12s ease, transform 0.08s ease;
  }
  .send-btn:hover { background: #2A4870; }
  .send-btn:active { transform: scale(0.96); }
  .send-btn:disabled { background: #C0C5CE; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; fill: white; }
  .send-btn.stop { background: #962a2a; }
  .send-btn.stop:hover { background: #b03434; }
  .send-btn.stop svg rect { fill: white; }

  .composer-hint {
    font-size: 11px; color: var(--ink-light); text-align: center;
    margin-top: 6px;
    font-family: var(--font-mono); letter-spacing: 0.04em;
  }

  /* Streaming caret */
  .caret {
    display: inline-block; width: 6px; height: 14px;
    background: #1A3050; vertical-align: -2px;
    animation: blink 1s steps(2) infinite;
    margin-left: 2px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Mic button (left of textarea, mirrors paperclip on the right) */
  .icon-btn.listening {
    background: #962a2a; color: white;
    animation: pulseRec 1.2s ease-in-out infinite;
  }
  .icon-btn.listening:hover { background: #b03434; color: white; }
  @keyframes pulseRec {
    0%, 100% { box-shadow: 0 0 0 0 rgba(150, 42, 42, 0.45); }
    50%      { box-shadow: 0 0 0 8px rgba(150, 42, 42, 0); }
  }
  .icon-btn.disabled { opacity: 0.35; cursor: not-allowed; }

  /* Pill toggles in the topbar — Read aloud, Concise */
  .pill.toggle {
    background: var(--paper); cursor: pointer;
    user-select: none;
  }
  .pill.toggle.on {
    background: #FFFBEF; border-color: #D4AF37; color: #1A3050;
  }
  .pill.toggle input { display: none; }
  .pill .voice-select-wrap {
    display: none; margin-left: 4px; padding-left: 6px;
    border-left: 1px solid var(--rule-light);
  }
  .pill.toggle.on .voice-select-wrap { display: inline-flex; }

  /* Per-bubble speak button (replaces standalone Replay) */
  .bubble-action.speak.playing { color: #1A3050; border-color: #D4AF37; }

  /* Floating stop-talking pill — visible while TTS is playing */
  .stop-tts {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: #962a2a; color: white; border: none;
    padding: 8px 18px; border-radius: 999px;
    font-size: 13px; cursor: pointer; z-index: 90;
    box-shadow: 0 4px 14px rgba(150,42,42,0.4);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
    font-family: var(--font-sans);
  }
  .stop-tts.show { opacity: 1; pointer-events: auto; }

  /* Install banner — Android Chrome A2HS */
  .install-banner {
    position: fixed; bottom: 16px; left: 16px; right: 16px;
    background: #1A3050; color: white;
    padding: 12px 16px; border-radius: 12px;
    display: none; align-items: center; gap: 12px;
    box-shadow: 0 6px 20px rgba(26,48,80,0.3);
    z-index: 110;
    font-size: 13.5px;
  }
  .install-banner.show { display: flex; }
  .install-banner button {
    background: #D4AF37; color: #1A3050; border: none;
    padding: 6px 14px; border-radius: 6px; cursor: pointer;
    font-weight: 600; font-family: inherit;
  }
  .install-banner .dismiss {
    background: transparent; color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.3);
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(8px);
    background: #1A3050; color: white;
    padding: 10px 18px; border-radius: 8px;
    font-size: 13px; opacity: 0;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: #962a2a; }

  /* Responsive */
  @media (max-width: 640px) {
    .topbar { padding: 10px 14px; flex-wrap: wrap; }
    .messages { padding: 16px 14px 8px; }
    .composer-wrap { padding: 8px 14px 14px; }
    .bubble { max-width: 88%; font-size: 14px; }
    .topbar-right { gap: 6px; flex-wrap: wrap; }
    .pill { padding: 5px 10px; font-size: 12px; }
    .brand-block .sub { display: none; }
    .context-badge, .tool-status { max-width: 88%; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand-block">
    <svg viewBox="0 0 88 110" xmlns="http://www.w3.org/2000/svg">
      <polygon points="0,0 88,0 84,28 4,28" fill="#D4AF37"/>
      <polygon points="5,34 83,34 78,68 10,68" fill="#D4AF37"/>
      <polygon points="11,74 77,74 73,110 15,110" fill="#D4AF37"/>
    </svg>
    <div>
      <div class="wm">💬 Chat with <em>askEd</em></div>
      <div class="sub">Multi-turn · Ed Voice · Community-aware</div>
    </div>
  </div>
  <div class="topbar-right">
    <label class="pill toggle" id="speakerPill" title="Read responses aloud (Ed's voice)">
      <input type="checkbox" id="speakerToggle"><span aria-hidden="true">🔊</span><span>Read aloud</span>
      <span class="voice-select-wrap"><select id="voiceSelect" aria-label="askEd voice" style="background:transparent; border:none; font-family:inherit; font-size:12px; color:inherit; outline:none;">
        <option value="onyx">Onyx</option>
        <option value="echo">Echo</option>
        <option value="fable">Fable</option>
        <option value="alloy">Alloy</option>
        <option value="nova">Nova</option>
        <option value="shimmer">Shimmer</option>
      </select></span>
    </label>
    <label class="pill toggle" id="concisePill" title="Terse 1-2 sentence answers (great for field staff + voice)">
      <input type="checkbox" id="conciseToggle"><span aria-hidden="true">⚡</span><span>Concise</span>
    </label>
    <div class="pill" title="Which community's docs to consult">
      <span aria-hidden="true">🏘️</span>
      <select id="communitySelect" aria-label="Community">
        <option value="">All communities</option>
      </select>
    </div>
    <button class="pill" id="newChatBtn" title="Start a new conversation">
      <span aria-hidden="true">+</span> New chat
    </button>
    <a href="/" class="pill" title="Back to trustEd">← App</a>
  </div>
</div>

<div class="chat-shell">
  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <h1>Chat with <em>Ed</em></h1>
      <p>Ask anything. Follow up. Drill in. Attach PDFs, screenshots, or contracts.</p>
      <div class="quickstart">
        <button onclick="quickstart(this)">What's our standard violation cure period?</button>
        <button onclick="quickstart(this)">Draft an email to a board declining a non-bid renewal</button>
        <button onclick="quickstart(this)">A homeowner says my staff was rude. How do I handle it?</button>
        <button onclick="quickstart(this)">Explain reserve fund vehicles for a board that wants equities</button>
        <button onclick="quickstart(this)">What's the §209 notice requirement again?</button>
      </div>
    </div>
  </div>

  <div class="composer-wrap">
    <div class="composer-attachments" id="composerAttachments"></div>
    <div class="composer" id="composer">
      <button class="icon-btn" id="micBtn" title="Tap to speak (transcribed by Whisper)" aria-label="Voice input">🎤</button>
      <button class="icon-btn" id="attachBtn" title="Attach PDFs or images (or drag & drop)" aria-label="Attach files">📎</button>
      <input type="file" id="fileInput" accept=".pdf,image/*" multiple style="display:none;">
      <textarea id="input" placeholder="Ask Ed anything…  (Enter = send · Shift+Enter = new line · 🎤 to speak · 📎 or drop files)" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" disabled title="Send">
        <svg viewBox="0 0 24 24"><path d="M3 11l18-8-8 18-2-8-8-2z"/></svg>
      </button>
    </div>
    <div class="composer-hint" id="composerHint">Ed-voice synthesis · community docs + playbook + vendor directory</div>
  </div>
</div>

<button class="stop-tts" id="stopTtsBtn" aria-label="Stop Ed talking">⏹ Stop talking</button>

<div class="install-banner" id="installBanner">
  <div style="flex:1;">📲 Install askEd to your home screen for one-tap access</div>
  <button id="installBtn">Install</button>
  <button class="dismiss" id="dismissInstall">Not now</button>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

const messagesEl = document.getElementById('messages');
const emptyEl    = document.getElementById('emptyState');
const inputEl    = document.getElementById('input');
const sendBtn    = document.getElementById('sendBtn');
const commSel    = document.getElementById('communitySelect');
const newBtn     = document.getElementById('newChatBtn');
const toastEl    = document.getElementById('toast');
const composerEl = document.getElementById('composer');
const composerHint = document.getElementById('composerHint');
const attachBtn  = document.getElementById('attachBtn');
const fileInput  = document.getElementById('fileInput');
const attachStrip = document.getElementById('composerAttachments');
const micBtn       = document.getElementById('micBtn');
const speakerPill  = document.getElementById('speakerPill');
const speakerToggle = document.getElementById('speakerToggle');
const voiceSelectEl = document.getElementById('voiceSelect');
const concisePill   = document.getElementById('concisePill');
const conciseToggle = document.getElementById('conciseToggle');
const stopTtsBtn    = document.getElementById('stopTtsBtn');
const installBanner = document.getElementById('installBanner');
const installBtn    = document.getElementById('installBtn');
const dismissInstall = document.getElementById('dismissInstall');

// In-memory conversation. Each turn: { role: 'user'|'assistant', content: '...', attachments?: [{name, type}] }
let history = [];
let pendingFiles = []; // File objects waiting to attach to next send
let inFlight = false;
let currentAbort = null; // AbortController for the active stream

// ---------- Toast ----------
function toast(msg, kind) {
  toastEl.className = 'toast show ' + (kind || '');
  toastEl.textContent = msg;
  clearTimeout(window._tt);
  window._tt = setTimeout(() => { toastEl.className = 'toast'; }, 3500);
}

// ---------- Markdown ----------
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function renderMarkdown(text) {
  if (!text) return '';
  const codeBlocks = [];
  text = text.replace(/```([\s\S]*?)```/g, (m, code) => {
    codeBlocks.push(code);
    return ` CODE${codeBlocks.length - 1} `;
  });
  let html = escapeHtml(text);
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/^(?:\s*[-•] .+(?:\n|$))+/gm, (m) => {
    const items = m.trim().split('\n').map((line) => `<li>${line.replace(/^\s*[-•]\s+/, '')}</li>`).join('');
    return `<ul>${items}</ul>`;
  });
  html = html.replace(/^(?:\s*\d+\. .+(?:\n|$))+/gm, (m) => {
    const items = m.trim().split('\n').map((line) => `<li>${line.replace(/^\s*\d+\.\s+/, '')}</li>`).join('');
    return `<ol>${items}</ol>`;
  });
  html = html.split(/\n\n+/).map((para) => {
    if (/^<(h2|h3|ul|ol|pre)/.test(para.trim())) return para;
    return `<p>${para.replace(/\n/g, '<br>')}</p>`;
  }).join('');
  html = html.replace(/ CODE(\d+) /g, (m, i) => `<pre>${escapeHtml(codeBlocks[i])}</pre>`);
  return html;
}

// ---------- Render turn ----------
function appendTurn(role, content, attachments) {
  if (emptyEl && emptyEl.parentNode) emptyEl.remove();
  const turn = document.createElement('div');
  turn.className = 'turn ' + role;

  // Attachment chips above user bubble
  if (role === 'user' && Array.isArray(attachments) && attachments.length > 0) {
    const chips = document.createElement('div');
    chips.className = 'attach-chips';
    for (const a of attachments) {
      const chip = document.createElement('span');
      chip.className = 'attach-chip';
      chip.textContent = (a.type === 'application/pdf' ? '📄 ' : '🖼️ ') + a.name;
      chips.appendChild(chip);
    }
    turn.appendChild(chips);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + role;
  if (role === 'user') {
    bubble.textContent = content;
  } else {
    bubble.innerHTML = renderMarkdown(content);
  }
  turn.appendChild(bubble);

  if (role === 'assistant' && content) {
    addAssistantActions(turn, bubble, content);
  }

  messagesEl.appendChild(turn);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return { turn, bubble };
}

function addAssistantActions(turn, bubble, text) {
  const actions = document.createElement('div');
  actions.className = 'bubble-actions';
  actions.innerHTML = `
    <button class="bubble-action copy" title="Copy to clipboard">📋 Copy</button>
    <button class="bubble-action regen" title="Regenerate this answer">🔄 Regenerate</button>
  `;
  bubble.appendChild(actions);
  actions.querySelector('.copy').addEventListener('click', () => {
    navigator.clipboard.writeText(text).then(
      () => toast('Copied'),
      () => toast('Could not copy', 'error')
    );
  });
  actions.querySelector('.regen').addEventListener('click', () => {
    if (inFlight) return toast('Wait for the current answer to finish', 'error');
    regenerateLast();
  });
}

// ---------- Attachments ----------
function renderAttachmentStrip() {
  attachStrip.innerHTML = '';
  for (let i = 0; i < pendingFiles.length; i++) {
    const f = pendingFiles[i];
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `<span>${f.type === 'application/pdf' ? '📄' : '🖼️'} ${escapeHtml(f.name)}</span> <button title="Remove" aria-label="Remove attachment">×</button>`;
    chip.querySelector('button').addEventListener('click', () => {
      pendingFiles.splice(i, 1);
      renderAttachmentStrip();
      updateSendDisabled();
    });
    attachStrip.appendChild(chip);
  }
}
function addPendingFiles(fileList) {
  for (const f of fileList) {
    const ok = f.type === 'application/pdf' || f.type.startsWith('image/');
    if (!ok) {
      toast(`Skipped ${f.name}: only PDFs and images`, 'error');
      continue;
    }
    if (f.size > 25 * 1024 * 1024) {
      toast(`Skipped ${f.name}: over 25MB`, 'error');
      continue;
    }
    pendingFiles.push(f);
  }
  renderAttachmentStrip();
  updateSendDisabled();
}

function setStreaming(streaming) {

  if (streaming) {
    sendBtn.classList.add('stop');

    sendBtn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2" fill="white"/></svg>';

  } else {

async function sendMessage() {
  const text = inputEl.value.trim();
  if ((!text && pendingFiles.length === 0) || inFlight) return;

  // Capture & clear UI state
  const turnAttachments = pendingFiles.map((f) => ({ name: f.name, type: f.type }));
  const filesToSend = pendingFiles.slice();
  pendingFiles = [];
  renderAttachmentStrip();
  inputEl.value = '';
  inputEl.style.height = 'auto';

  appendTurn('user', text || '(see attachment)', turnAttachments);
  history.push({ role: 'user', content: text || '(see attached files)' });

  await runStream({ filesToSend });
}

async function regenerateLast() {
  // Find last user turn + last assistant turn. Remove assistant from history.
  // The assistant DOM bubble is replaced with the streamed regen.
  if (history.length < 2) return;
  if (history[history.length - 1].role !== 'assistant') return;
  // Pop assistant from history.
  history.pop();
  // Remove the last assistant turn from DOM.
  const turns = messagesEl.querySelectorAll('.turn.assistant');
  if (turns.length > 0) turns[turns.length - 1].remove();
  await runStream({ filesToSend: [] });
}

let runStream = async function ({ filesToSend }) {
  // Placeholder assistant bubble with context badge + thinking caret
  if (emptyEl && emptyEl.parentNode) emptyEl.remove();
  const turn = document.createElement('div');
  turn.className = 'turn assistant';

  const contextBadge = document.createElement('div');
  contextBadge.className = 'context-badge';
  contextBadge.innerHTML = '<span class="dot"></span> Pulling context…';
  turn.appendChild(contextBadge);

  const bubble = document.createElement('div');
  bubble.className = 'bubble assistant thinking';
  bubble.innerHTML = '<em>Ed is thinking</em><span class="caret"></span>';
  turn.appendChild(bubble);
  messagesEl.appendChild(turn);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  let assistantText = '';
  let firstDelta = false;
  let activeToolStatusEl = null;

  setStreaming(true);
  currentAbort = new AbortController();

  try {
    const form = new FormData();
    form.append('community', commSel.value || '');
    form.append('messages', JSON.stringify(history));
    for (const f of filesToSend) form.append('attachment', f, f.name);

    const res = await fetch('/ask-ed-chat-stream', {
      method: 'POST',
      body: form,
      signal: currentAbort.signal,
    });
    if (!res.ok || !res.body) throw new Error('HTTP ' + res.status);
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const frames = buf.split('\n\n');
      buf = frames.pop();
      for (const frame of frames) {
        const line = frame.split('\n').find((l) => l.startsWith('data:'));
        if (!line) continue;
        let payload;
        try { payload = JSON.parse(line.slice(5).trim()); } catch (_) { continue; }

        if (payload.type === 'context_loaded') {
          // Update the badge with real counts
          const parts = [];
          if (payload.community) parts.push(`📍 ${payload.community}`);
          if (payload.has_community_profile) parts.push(`profile`);
          if (payload.playbook_count > 0) parts.push(`${payload.playbook_count} playbook example${payload.playbook_count === 1 ? '' : 's'}`);
          if (payload.doc_count > 0) parts.push(`${payload.doc_count} doc section${payload.doc_count === 1 ? '' : 's'}`);
          contextBadge.innerHTML = `<span class="dot"></span> Reading ${parts.length > 0 ? parts.join(' · ') : 'general guidance'}`;
          if (payload.rewritten_query) {
            contextBadge.title = `Searched as: "${payload.rewritten_query}"`;
          }
        } else if (payload.type === 'tool_status') {
          // Drop the prior tool status, show the new one above the bubble
          if (activeToolStatusEl) activeToolStatusEl.remove();
          activeToolStatusEl = document.createElement('div');
          activeToolStatusEl.className = 'tool-status';
          activeToolStatusEl.innerHTML = `<span class="dot"></span> ${escapeHtml(payload.message || 'Tool…')}`;
          turn.insertBefore(activeToolStatusEl, bubble);
          messagesEl.scrollTop = messagesEl.scrollHeight;
        } else if (payload.type === 'delta' && payload.text) {
          if (!firstDelta) {
            firstDelta = true;
            bubble.classList.remove('thinking');
            bubble.innerHTML = '';
            // Once text starts, finalize the context badge to a settled state
            contextBadge.querySelector('.dot').style.animation = 'none';
            contextBadge.querySelector('.dot').style.background = '#9B8A3F';
            // Tool status (if any) can stay — it represents a real action taken
          }
          assistantText += payload.text;
          bubble.innerHTML = renderMarkdown(assistantText) + '<span class="caret"></span>';
          messagesEl.scrollTop = messagesEl.scrollHeight;
        } else if (payload.type === 'error') {
          throw new Error(payload.message || 'Stream error');
        } else if (payload.type === 'done') {
          // final
        }
      }
    }

    if (!assistantText) {
      bubble.classList.remove('thinking');
      bubble.innerHTML = '<em>No response received. Try again?</em>';
      contextBadge.remove();
    } else {
      bubble.innerHTML = renderMarkdown(assistantText);
      addAssistantActions(turn, bubble, assistantText);
      history.push({ role: 'assistant', content: assistantText });
      saveSession();
    }
  } catch (err) {
    const aborted = err.name === 'AbortError';
    bubble.classList.remove('thinking');
    if (aborted) {
      if (assistantText) {
        // Keep what we got; note that it was stopped
        bubble.innerHTML = renderMarkdown(assistantText) + '<p><em style="color:#962a2a; font-size:13px;">— stopped</em></p>';
        addAssistantActions(turn, bubble, assistantText);
        history.push({ role: 'assistant', content: assistantText });
        saveSession();
      } else {
        bubble.innerHTML = '<em style="color:#962a2a;">Stopped.</em>';
        history.pop(); // roll back the user turn since there's no answer
      }
      contextBadge.remove();
    } else {
      bubble.innerHTML = `<em style="color:#962a2a;">Something went wrong: ${escapeHtml(err.message || 'unknown error')}</em>`;
      contextBadge.remove();
      history.pop(); // roll back so retry doesn't include unanswered turn
    }
  } finally {
    currentAbort = null;
    setStreaming(false);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    inputEl.focus();
  }
};

// ---------- Persistence ----------
const STORE_KEY = 'asked-chat-history-v1';
function saveSession() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({
      community: commSel.value || '',
      history: history.slice(-30),
    }));
  } catch (_) {}
}
function restoreSession() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.community) commSel.value = data.community;
    if (Array.isArray(data.history) && data.history.length > 0) {
      history = data.history.slice();
      if (emptyEl && emptyEl.parentNode) emptyEl.remove();
      for (const turn of history) appendTurn(turn.role, turn.content);
    }
  } catch (_) {}
}

async function loadCommunities() {
  try {
    const res = await fetch('/api/billing/communities');
    if (!res.ok) return;
    const data = await res.json();
    const list = (data.communities || []).slice()
      .sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    for (const c of list) {
      const opt = document.createElement('option');
      opt.value = c.name;
      opt.textContent = c.name;
      commSel.appendChild(opt);
    }
    restoreSession();
  } catch (err) {
    console.warn('communities load failed', err);
    restoreSession();
  }
}

  if (history.length > 0) {
    if (confirm('Switching communities will clear the current thread (so Ed pulls the right docs). Continue?')) {
      resetChat();
    } else {
      // Revert the selection by re-saving the previous community
      const stored = (() => { try { return JSON.parse(localStorage.getItem(STORE_KEY) || '{}').community || ''; } catch (_) { return ''; } })();
      commSel.value = stored;
      return;
    }
  }
  saveSession();
});

// ============================================================================
// TTS playback — sentence-aware queue with strict ordering
// ============================================================================
const ttsAudio = new Audio();
ttsAudio.preload = 'auto';
let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  try {
    ttsAudio.src = 'data:audio/wav;base64,UklGRhwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
    const p = ttsAudio.play();
    if (p && p.then) p.then(() => { audioUnlocked = true; }).catch(() => {});
    else audioUnlocked = true;
  } catch (_) {}
}
document.addEventListener('click', unlockAudio, { once: true, capture: true });
document.addEventListener('touchstart', unlockAudio, { once: true, capture: true });

const ttsQueue = [];
let ttsPlaying = false;
let currentTtsResolver = null;

function updateStopTtsBtn() {
  const visible = ttsPlaying || ttsQueue.length > 0;
  stopTtsBtn.classList.toggle('show', visible);
}

function enqueueTtsSentence(sentence) {
  if (!speakerToggle.checked) return;
  const cleaned = cleanForTts(sentence);
  if (!cleaned) return;
  const voiceAtRequest = currentVoice;
  const audioPromise = fetch('/api/tts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text: cleaned, voice: voiceAtRequest }),
  })
    .then((r) => { if (!r.ok) throw new Error('TTS HTTP ' + r.status); return r.blob(); })
    .then((blob) => URL.createObjectURL(blob))
    .catch((err) => { console.warn('tts seg failed', err); return null; });
  ttsQueue.push({ audioPromise });
  updateStopTtsBtn();
  drainTtsQueue();
}

async function drainTtsQueue() {
  if (ttsPlaying) return;
  const next = ttsQueue.shift();
  if (!next) { updateStopTtsBtn(); return; }
  ttsPlaying = true;
  updateStopTtsBtn();
  try {
    const url = await next.audioPromise;
    if (!url) { ttsPlaying = false; updateStopTtsBtn(); return drainTtsQueue(); }
    ttsAudio.src = url;
    await new Promise((resolve) => {
      currentTtsResolver = resolve;
      ttsAudio.onended = () => { URL.revokeObjectURL(url); resolve(); };
      ttsAudio.onerror = () => { URL.revokeObjectURL(url); resolve(); };
      const p = ttsAudio.play();
      if (p && p.catch) p.catch(() => resolve());
    });
    currentTtsResolver = null;
  } catch (err) { console.warn('tts play err', err); }
  ttsPlaying = false;
  updateStopTtsBtn();
  drainTtsQueue();
}

function resetTtsQueue() {
  ttsQueue.length = 0;
  try { ttsAudio.pause(); } catch (_) {}
  try { ttsAudio.currentTime = 0; } catch (_) {}
  if (currentTtsResolver) { currentTtsResolver(); currentTtsResolver = null; }
  updateStopTtsBtn();
}

// One-off speak (voice preview + bubble replay button)
async function speakOne(text) {
  resetTtsQueue();
  const cleaned = cleanForTts(text);
  if (!cleaned) return;
  try {
    const res = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: cleaned, voice: currentVoice }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    ttsAudio.src = url;
    ttsAudio.onended = () => URL.revokeObjectURL(url);
    ttsAudio.onerror = () => URL.revokeObjectURL(url);
    await ttsAudio.play();
  } catch (err) { console.warn('speakOne failed', err); }
}

function cleanForTts(text) {
  let t = String(text || '')
    .replace(/^#{1,6}\s+.*$/gm, '')       // drop heading lines
    .replace(/^[-*•]\s+/gm, '')           // bullet dashes
    .replace(/^\d+\.\s+/gm, '')           // ordered-list markers
    .replace(/[*_`]/g, '')                // markdown emphasis
    .replace(/\[(.*?)\]\(.*?\)/g, '$1')   // markdown links
    .replace(/[✅📋💡⚠️🧠🎙️📑🏗️📊🏘️🚤🐕🌳🔊📲⚡💬]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
  if (t.length < 3) return '';
  if (/^[A-Z\s\-]{4,}$/.test(t)) return '';
  return t;
}

function flushSentences(buffer) {
  const sentences = [];
  let remainder = buffer;
  const re = /([.!?])\s+|\n{2,}/g;
  let lastIdx = 0;
  let m;
  while ((m = re.exec(buffer)) !== null) {
    const end = m.index + (m[1] ? 1 : 0);
    const piece = buffer.slice(lastIdx, end).trim();
    if (piece) sentences.push(piece);
    lastIdx = re.lastIndex;
  }
  remainder = buffer.slice(lastIdx);
  return { sentences, remainder };
}

// ============================================================================
// MIC input — record → /api/stt (Whisper) → fill textarea → auto-send
// ============================================================================
let mediaRecorder = null;
let recordedChunks = [];
let listening = false;

function pickAudioMime() {
  const candidates = ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/mp4;codecs=mp4a.40.2','audio/ogg;codecs=opus'];
  for (const m of candidates) {
    if (typeof MediaRecorder !== 'undefined' && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(m)) return m;
  }
  return '';
}

if (!window.MediaRecorder || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
  micBtn.classList.add('disabled');
  micBtn.disabled = true;
  micBtn.title = 'Voice input not supported on this browser';
}

micBtn.addEventListener('click', async () => {
  if (micBtn.disabled) return;
  if (listening) { stopListening(); return; }
  unlockAudio();
  resetTtsQueue();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mime = pickAudioMime();
    const opts = mime ? { mimeType: mime } : {};
    mediaRecorder = new MediaRecorder(stream, opts);
    recordedChunks = [];
    mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach((t) => t.stop());
      listening = false;
      micBtn.classList.remove('listening');
      if (recordedChunks.length === 0) { toast('No audio captured — tap mic and try again', 'error'); return; }
      const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || mime || 'audio/webm' });
      await transcribeAndSubmit(blob);
    };
    mediaRecorder.start();
    listening = true;
    micBtn.classList.add('listening');
    micBtn.title = 'Tap again to stop recording';
    toast('🎤 Listening… tap mic again when done');
  } catch (err) {
    console.warn('mic error', err);
    if (err.name === 'NotAllowedError' || err.name === 'SecurityError') {
      toast('🚫 Mic access denied. Allow microphone in browser settings.', 'error');
    } else if (err.name === 'NotFoundError') {
      toast('🚫 No microphone found.', 'error');
    } else {
      toast('Mic error: ' + (err.message || err.name), 'error');
    }
  }
});

function stopListening() {
  if (!listening || !mediaRecorder) return;
  try { mediaRecorder.stop(); } catch (err) { console.warn('stop err', err); }
}

async function transcribeAndSubmit(blob) {
  toast('✍️ Transcribing…');
  try {
    const form = new FormData();
    const ext = (blob.type || '').includes('mp4') ? 'mp4'
              : (blob.type || '').includes('mpeg') ? 'mp3'
              : (blob.type || '').includes('ogg') ? 'ogg'
              : 'webm';
    form.append('audio', blob, `voice.${ext}`);
    const res = await fetch('/api/stt', { method: 'POST', body: form });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || ('HTTP ' + res.status));
    const text = (data.text || '').trim();
    if (!text) { toast("Didn't catch that — try again", 'error'); return; }
    inputEl.value = text;
    inputEl.dispatchEvent(new Event('input'));
    // Auto-send transcribed input
    sendMessage();
  } catch (err) {
    console.warn('stt failed', err);
    toast('Transcription error: ' + (err.message || 'unknown'), 'error');
  }
}

// ============================================================================
// PATCH sendMessage / runStream to pass concise flag + feed TTS during stream
// ============================================================================
// Wrap original runStream to inject concise + TTS sentence flushing without
// rewriting the function. We monkey-patch FormData on the outgoing chat
// request and listen to the existing delta stream.
//
// Simpler: extend the existing runStream by adding hooks. The current
// implementation does its own SSE parsing. We add a small intercept by
// shadowing fetch only for the chat endpoint — but that's heavy. Instead,
// override runStream itself by reassigning. The original was defined as
// `async function runStream(...)` so it's available on the window scope.

const _origRunStream = runStream;
runStream = async function patchedRunStream({ filesToSend }) {
  // Stop any in-flight TTS playback when a new message starts streaming
  resetTtsQueue();

  // We need to add `concise` to the form, AND tap deltas for TTS. The
  // simplest path is to call the original but patch FormData via a one-shot
  // override. Easier: replicate the original's body but with extra params
  // and TTS observation.
  if (emptyEl && emptyEl.parentNode) emptyEl.remove();
  const turn = document.createElement('div');
  turn.className = 'turn assistant';

  const contextBadge = document.createElement('div');
  contextBadge.className = 'context-badge';
  contextBadge.innerHTML = '<span class="dot"></span> Pulling context…';
  turn.appendChild(contextBadge);

  const bubble = document.createElement('div');
  bubble.className = 'bubble assistant thinking';
  bubble.innerHTML = '<em>Ed is thinking</em><span class="caret"></span>';
  turn.appendChild(bubble);
  messagesEl.appendChild(turn);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  let assistantText = '';
  let pendingForTts = '';
  let firstDelta = false;
  let activeToolStatusEl = null;

  setStreaming(true);
  currentAbort = new AbortController();

  try {
    const form = new FormData();
    form.append('community', commSel.value || '');
    form.append('messages', JSON.stringify(history));
    form.append('concise', conciseToggle.checked ? 'true' : 'false');
    for (const f of filesToSend) form.append('attachment', f, f.name);

    const res = await fetch('/ask-ed-chat-stream', {
      method: 'POST', body: form, signal: currentAbort.signal,
    });
    if (!res.ok || !res.body) throw new Error('HTTP ' + res.status);
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const frames = buf.split('\n\n');
      buf = frames.pop();
      for (const frame of frames) {
        const line = frame.split('\n').find((l) => l.startsWith('data:'));
        if (!line) continue;
        let payload;
        try { payload = JSON.parse(line.slice(5).trim()); } catch (_) { continue; }

        if (payload.type === 'context_loaded') {
          const parts = [];
          if (payload.community) parts.push(`📍 ${payload.community}`);
          if (payload.has_community_profile) parts.push('profile');
          if (payload.playbook_count > 0) parts.push(`${payload.playbook_count} playbook example${payload.playbook_count === 1 ? '' : 's'}`);
          if (payload.doc_count > 0) parts.push(`${payload.doc_count} doc section${payload.doc_count === 1 ? '' : 's'}`);
          contextBadge.innerHTML = `<span class="dot"></span> Reading ${parts.length > 0 ? parts.join(' · ') : 'general guidance'}`;
          if (payload.rewritten_query) contextBadge.title = `Searched as: "${payload.rewritten_query}"`;
        } else if (payload.type === 'tool_status') {
          if (activeToolStatusEl) activeToolStatusEl.remove();
          activeToolStatusEl = document.createElement('div');
          activeToolStatusEl.className = 'tool-status';
          activeToolStatusEl.innerHTML = `<span class="dot"></span> ${escapeHtml(payload.message || 'Tool…')}`;
          turn.insertBefore(activeToolStatusEl, bubble);
          messagesEl.scrollTop = messagesEl.scrollHeight;
        } else if (payload.type === 'delta' && payload.text) {
          if (!firstDelta) {
            firstDelta = true;
            bubble.classList.remove('thinking');
            bubble.innerHTML = '';
            const dotEl = contextBadge.querySelector('.dot');
            if (dotEl) { dotEl.style.animation = 'none'; dotEl.style.background = '#9B8A3F'; }
          }
          assistantText += payload.text;
          pendingForTts += payload.text;
          bubble.innerHTML = renderMarkdown(assistantText) + '<span class="caret"></span>';
          messagesEl.scrollTop = messagesEl.scrollHeight;

          // Stream TTS: flush completed sentences as they arrive
          if (speakerToggle.checked) {
            const { sentences, remainder } = flushSentences(pendingForTts);
            pendingForTts = remainder;
            for (const s of sentences) if (s.length >= 12) enqueueTtsSentence(s);
          }
        } else if (payload.type === 'error') {
          throw new Error(payload.message || 'Stream error');
        } else if (payload.type === 'done') {
          // Flush any trailing prose as the final TTS chunk
          if (speakerToggle.checked && pendingForTts.trim()) {
            enqueueTtsSentence(pendingForTts.trim());
            pendingForTts = '';
          }
        }
      }
    }

    if (!assistantText) {
      bubble.classList.remove('thinking');
      bubble.innerHTML = '<em>No response received. Try again?</em>';
      contextBadge.remove();
    } else {
      bubble.innerHTML = renderMarkdown(assistantText);
      addAssistantActionsWithSpeak(turn, bubble, assistantText);
      history.push({ role: 'assistant', content: assistantText });
      saveSession();
    }
  } catch (err) {
    const aborted = err.name === 'AbortError';
    bubble.classList.remove('thinking');
    if (aborted) {
      if (assistantText) {
        bubble.innerHTML = renderMarkdown(assistantText) + '<p><em style="color:#962a2a; font-size:13px;">— stopped</em></p>';
        addAssistantActionsWithSpeak(turn, bubble, assistantText);
        history.push({ role: 'assistant', content: assistantText });
        saveSession();
      } else {
        bubble.innerHTML = '<em style="color:#962a2a;">Stopped.</em>';
        history.pop();
      }
      contextBadge.remove();
    } else {
      bubble.innerHTML = `<em style="color:#962a2a;">Something went wrong: ${escapeHtml(err.message || 'unknown error')}</em>`;
      contextBadge.remove();
      history.pop();
    }
  } finally {
    currentAbort = null;
    setStreaming(false);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    inputEl.focus();
  }
};

// Replace addAssistantActions to include a Speak button
function addAssistantActionsWithSpeak(turn, bubble, text) {
  const actions = document.createElement('div');
  actions.className = 'bubble-actions';
  actions.innerHTML = `
    <button class="bubble-action speak" title="Read aloud">🔊 Speak</button>
    <button class="bubble-action copy" title="Copy to clipboard">📋 Copy</button>
    <button class="bubble-action regen" title="Regenerate this answer">🔄 Regenerate</button>
  `;
  bubble.appendChild(actions);
  actions.querySelector('.copy').addEventListener('click', () => {
    navigator.clipboard.writeText(text).then(() => toast('Copied'), () => toast('Could not copy', 'error'));
  });
  actions.querySelector('.regen').addEventListener('click', () => {
    if (inFlight) return toast('Wait for the current answer to finish', 'error');
    regenerateLast();
  });
  actions.querySelector('.speak').addEventListener('click', (e) => {
    const btn = e.currentTarget;
    if (btn.classList.contains('playing')) {
      resetTtsQueue();
      btn.classList.remove('playing');
      return;
    }
    btn.classList.add('playing');
    // Replay = clear queue + speak the full text as one block, then drop the
    // playing state when audio ends.
    resetTtsQueue();
    speakOne(text).finally(() => {
      // small heuristic: the speak() promise resolves when play() starts, so
      // poll until ttsAudio is paused or ends
      const check = setInterval(() => {
        if (ttsAudio.paused || ttsAudio.ended) {
          btn.classList.remove('playing');
          clearInterval(check);
        }
      }, 400);
    });
  });
}
