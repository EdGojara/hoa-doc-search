<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bedrock HOA Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
    
    .header { background: #1a3a5c; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    .header-icon { width: 40px; height: 40px; background: #2d6a9f; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .header-text h1 { font-size: 18px; font-weight: 600; }
    .header-text p { font-size: 12px; opacity: 0.8; margin-top: 2px; }

    .community-bar { background: #f8f9fa; border-bottom: 1px solid #e0e0e0; padding: 10px 16px; display: flex; align-items: center; gap: 10px; }
    .community-bar label { font-size: 13px; font-weight: 600; color: #1a3a5c; white-space: nowrap; }
    .community-bar select { flex: 1; border: 1px solid #d0d7de; border-radius: 8px; padding: 8px 12px; font-size: 14px; outline: none; background: white; color: #1a1a1a; cursor: pointer; }
    .community-bar select:focus { border-color: #2d6a9f; }

    .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    
    .message { display: flex; gap: 10px; max-width: 85%; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }
    
    .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 4px; }
    .assistant .avatar { background: #1a3a5c; color: white; }
    .user .avatar { background: #2d6a9f; color: white; }
    
    .bubble { padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 14px; }
    .assistant .bubble { background: white; color: #1a1a1a; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .user .bubble { background: #2d6a9f; color: white; border-bottom-right-radius: 4px; }
    
    .bubble strong { font-weight: 600; }
    .bubble ul { padding-left: 18px; margin-top: 6px; }
    .bubble li { margin-bottom: 4px; }

    .no-community { text-align: center; padding: 40px 20px; color: #888; font-size: 14px; }
    .no-community span { font-size: 32px; display: block; margin-bottom: 12px; }
    
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 20px 12px; }
    .suggestion-btn { background: white; border: 1px solid #d0d7de; border-radius: 20px; padding: 8px 14px; font-size: 13px; cursor: pointer; color: #1a3a5c; transition: all 0.2s; }
    .suggestion-btn:hover { background: #1a3a5c; color: white; border-color: #1a3a5c; }
    
    .input-area { background: white; border-top: 1px solid #e0e0e0; padding: 12px 16px; display: flex; gap: 10px; align-items: flex-end; }
    .input-area textarea { flex: 1; border: 1px solid #d0d7de; border-radius: 20px; padding: 10px 16px; font-size: 14px; resize: none; outline: none; max-height: 120px; font-family: inherit; line-height: 1.4; }
    .input-area textarea:focus { border-color: #2d6a9f; }
    .input-area textarea:disabled { background: #f5f5f5; }
    .send-btn { background: #1a3a5c; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s; }
    .send-btn:hover { background: #2d6a9f; }
    .send-btn:disabled { background: #ccc; cursor: not-allowed; }
    
    .typing { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
    .typing span { width: 8px; height: 8px; background: #aaa; border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    .welcome { text-align: center; padding: 30px 20px; color: #666; }
    .welcome h2 { color: #1a3a5c; margin-bottom: 8px; font-size: 20px; }
    .welcome p { font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-icon">🏠</div>
  <div class="header-text">
    <h1>Bedrock HOA Assistant</h1>
    <p>Ask questions about governing documents</p>
  </div>
</div>

<div class="community-bar">
  <label>Community:</label>
  <select id="communitySelect" onchange="onCommunityChange()">
    <option value="">— Select a community —</option>
    <option value="Lakes of Pine Forest">Lakes of Pine Forest</option>
    <option value="Canyon Gate at Cinco Ranch">Canyon Gate at Cinco Ranch</option>
    <option value="Eaglewood">Eaglewood</option>
    <option value="Waterview Estates">Waterview Estates</option>
    <option value="Quail Ridge">Quail Ridge</option>
    <option value="Still Creek Ranch">Still Creek Ranch</option>
    <option value="August Meadows">August Meadows</option>
  </select>
</div>

<div class="chat-container" id="chat">
  <div class="no-community">
    <span>🏘️</span>
    Select a community above to get started.
  </div>
</div>

<div class="suggestions" id="suggestions" style="display:none">
  <button class="suggestion-btn" onclick="sendSuggestion(this)">What are the parking rules?</button>
  <button class="suggestion-btn" onclick="sendSuggestion(this)">Can homeowners have pets?</button>
  <button class="suggestion-btn" onclick="sendSuggestion(this)">What is the quorum for meetings?</button>
  <button class="suggestion-btn" onclick="sendSuggestion(this)">What happens if assessments aren't paid?</button>
  <button class="suggestion-btn" onclick="sendSuggestion(this)">Can I rent out my home?</button>
</div>

<div class="input-area">
  <textarea id="input" placeholder="Select a community first..." rows="1" disabled onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
  </button>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const suggestions = document.getElementById('suggestions');
  const communitySelect = document.getElementById('communitySelect');
  let conversationHistory = [];
  let currentCommunity = '';

  function onCommunityChange() {
    currentCommunity = communitySelect.value;
    conversationHistory = [];
    chat.innerHTML = '';
    
    if (!currentCommunity) {
      chat.innerHTML = '<div class="no-community"><span>🏘️</span>Select a community above to get started.</div>';
      input.disabled = true;
      input.placeholder = 'Select a community first...';
      sendBtn.disabled = true;
      suggestions.style.display = 'none';
      return;
    }

    chat.innerHTML = `<div class="welcome"><h2>${currentCommunity}</h2><p>Ask me anything about this community's governing documents — CC&Rs, bylaws, rules, and guidelines.</p></div>`;
    input.disabled = false;
    input.placeholder = 'Ask a question...';
    sendBtn.disabled = false;
    suggestions.style.display = 'flex';
    input.focus();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendSuggestion(btn) {
    input.value = btn.textContent;
    suggestions.style.display = 'none';
    sendMessage();
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const avatar = role === 'assistant' ? '🏠' : '👤';
    div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${formatText(text)}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function formatText(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>')
      .replace(/## (.*?)(<br>|$)/g, '<strong style="font-size:15px">$1</strong><br>')
      .replace(/\* (.*?)(<br>|$)/g, '• $1<br>');
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typing';
    div.innerHTML = `<div class="avatar">🏠</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const question = input.value.trim();
    if (!question || !currentCommunity) return;

    suggestions.style.display = 'none';
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage('user', question);
    conversationHistory.push({ role: 'user', content: question });

    showTyping();

    try {
      const res = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, community: currentCommunity, history: conversationHistory })
      });
      const data = await res.json();
      removeTyping();
      addMessage('assistant', data.answer);
      conversationHistory.push({ role: 'assistant', content: data.answer });
    } catch (err) {
      removeTyping();
      addMessage('assistant', 'Sorry, something went wrong. Please try again.');
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
