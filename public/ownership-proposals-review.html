<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ownership Change Review · Bedrock Intelligence</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="/brand.css">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--navy-deep);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: 14px; line-height: 1.45;
  }
  header.app {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--rule);
    background: var(--navy-deep);
  }
  .brand-lockup { display: flex; align-items: center; gap: 14px; }
  .brand-lockup svg { width: 32px; height: 40px; }
  .brand-lockup .wm {
    font-family: var(--font-serif); font-size: 18px; font-weight: 500;
    color: var(--ink); letter-spacing: -0.01em; line-height: 1.05;
  }
  .brand-lockup .wm em { font-style: italic; color: var(--gold); }
  .brand-lockup .sub {
    font-size: 10.5px; color: var(--ink-faint);
    letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px;
  }
  header .module-name {
    font-family: var(--font-serif); font-size: 22px; font-weight: 500; color: var(--ink);
  }
  header .module-name em { color: var(--gold); font-style: italic; }
  header .util a {
    color: var(--ink-soft); text-decoration: none; font-size: 13px; margin-left: 18px;
  }
  header .util a:hover { color: var(--gold); }

  .shell {
    display: grid; grid-template-columns: 1fr 0;
    transition: grid-template-columns 0.18s ease;
    height: calc(100vh - 73px); overflow: hidden;
  }
  .shell.detail-open { grid-template-columns: 1fr 600px; }
  main.queue { overflow-y: auto; padding: 20px 32px 40px; }
  aside.detail {
    background: var(--navy-soft);
    border-left: 1px solid var(--rule-strong);
    overflow-y: auto; padding: 22px 26px 60px;
  }

  .filter-bar {
    display: flex; gap: 14px; align-items: flex-end;
    margin-bottom: 18px; flex-wrap: wrap;
  }
  .filter-bar label {
    font-size: 11px; color: var(--ink-faint);
    letter-spacing: 0.06em; text-transform: uppercase;
    display: flex; flex-direction: column; gap: 4px;
  }
  .filter-bar select, .filter-bar input {
    background: var(--navy-soft); border: 1px solid var(--rule-strong);
    color: var(--ink); padding: 7px 10px; font-size: 13px;
    border-radius: 4px; min-width: 180px;
    font-family: var(--font-sans);
  }
  .filter-bar input[type="search"] { min-width: 260px; }
  .filter-bar .count {
    margin-left: auto; color: var(--ink-faint); font-size: 12px; font-family: var(--font-mono);
  }

  table.queue {
    width: 100%; border-collapse: collapse;
    background: var(--navy-soft); border-radius: 6px; overflow: hidden;
  }
  table.queue thead th {
    text-align: left; padding: 11px 14px;
    border-bottom: 1px solid var(--rule-strong);
    font-weight: 500; color: var(--ink-faint);
    font-size: 11px; letter-spacing: 0.07em; text-transform: uppercase;
    white-space: nowrap;
  }
  table.queue tbody tr {
    cursor: pointer; border-bottom: 1px solid var(--rule);
    transition: background 0.1s ease;
  }
  table.queue tbody tr:hover { background: rgba(255,255,255,0.025); }
  table.queue tbody tr.active { background: rgba(212,175,55,0.07); }
  table.queue tbody td {
    padding: 11px 14px; color: var(--ink);
    font-size: 13px; vertical-align: top;
  }
  table.queue tbody td .sub {
    display: block; color: var(--ink-faint); font-size: 11.5px; margin-top: 2px;
  }
  table.queue tbody td.num {
    font-family: var(--font-mono); color: var(--ink-soft); font-size: 12.5px;
  }
  .arrow { color: var(--gold); font-family: var(--font-mono); margin: 0 6px; }

  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 500;
    text-transform: capitalize; letter-spacing: 0.02em;
    border: 1px solid transparent;
  }
  .badge.pending  { background: rgba(231,180,90,0.14); color: #E8C96E; border-color: rgba(231,180,90,0.4); }
  .badge.approved { background: rgba(80,200,120,0.12); color: #6BD194; border-color: rgba(80,200,120,0.3); }
  .badge.rejected { background: rgba(231,90,90,0.12); color: #E48A8A; border-color: rgba(231,90,90,0.3); }
  .badge.superseded, .badge.withdrawn {
    background: rgba(168,178,196,0.08); color: var(--ink-faint); border-color: rgba(168,178,196,0.15);
  }

  .empty-state {
    padding: 80px 20px; text-align: center;
    color: var(--ink-faint);
    background: var(--navy-soft); border-radius: 6px;
  }
  .empty-state h2 {
    font-family: var(--font-serif); font-size: 22px;
    color: var(--ink-soft); margin: 0 0 8px;
  }
  .empty-state p { margin: 6px 0; font-size: 13.5px; }

  /* Detail panel */
  aside.detail h2 {
    font-family: var(--font-serif); font-size: 20px; color: var(--ink);
    margin: 0 0 4px;
  }
  aside.detail .addr {
    font-family: var(--font-mono); font-size: 12px;
    color: var(--gold); margin-bottom: 14px;
  }
  aside.detail .close-detail {
    float: right; background: transparent; border: none;
    color: var(--ink-faint); font-size: 20px; cursor: pointer; margin-top: -4px;
  }
  aside.detail .close-detail:hover { color: var(--gold); }
  aside.detail section {
    margin-bottom: 22px; padding-bottom: 18px;
    border-bottom: 1px solid var(--rule);
  }
  aside.detail section:last-of-type { border-bottom: none; }
  aside.detail section h3 {
    font-size: 11px; color: var(--ink-faint);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin: 0 0 10px; font-weight: 500;
  }
  aside.detail dl {
    display: grid; grid-template-columns: 130px 1fr;
    gap: 4px 12px; margin: 0; font-size: 13px;
  }
  aside.detail dt { color: var(--ink-faint); font-size: 12.5px; }
  aside.detail dd { margin: 0; color: var(--ink); }

  .compare-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 14px; margin-bottom: 16px;
  }
  .compare-card {
    background: var(--navy-deep); border: 1px solid var(--rule-strong);
    border-radius: 8px; padding: 14px 16px;
  }
  .compare-card .label {
    font-size: 10.5px; color: var(--ink-faint);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 8px; font-weight: 500;
  }
  .compare-card.current  { border-left: 3px solid var(--ink-faint); }
  .compare-card.proposed { border-left: 3px solid var(--gold); }
  .compare-card .name {
    font-size: 14.5px; color: var(--ink); font-weight: 500;
    margin-bottom: 4px;
  }
  .compare-card .contact {
    font-size: 12px; color: var(--ink-soft); line-height: 1.55;
  }
  .compare-card .contact .field { display: block; }
  .compare-card .contact .empty { color: var(--ink-faint); font-style: italic; }

  .source-info {
    background: var(--navy-deep);
    border: 1px solid var(--rule-strong);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px; color: var(--ink-soft);
  }
  .source-info .src-line { padding: 2px 0; }
  .source-info code {
    color: var(--gold); font-family: var(--font-mono);
    background: rgba(212,175,55,0.08);
    padding: 1px 5px; border-radius: 3px; font-size: 11px;
  }

  .action-form input, .action-form textarea {
    width: 100%; background: var(--navy-deep);
    border: 1px solid var(--rule-strong);
    color: var(--ink); padding: 8px 10px; font-size: 13px;
    border-radius: 4px; font-family: var(--font-sans);
  }
  .action-form textarea { min-height: 60px; resize: vertical; }
  .action-form label {
    display: block; font-size: 11px; color: var(--ink-faint);
    letter-spacing: 0.06em; text-transform: uppercase;
    margin: 12px 0 4px;
  }
  .button-row { display: flex; gap: 10px; margin-top: 16px; }
  .primary-btn, .danger-btn, .secondary-btn {
    padding: 10px 18px; border-radius: 4px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    font-family: var(--font-sans);
    transition: all 0.15s ease;
    border: 1px solid transparent;
  }
  .primary-btn {
    background: var(--gold); color: var(--navy-deep); border-color: var(--gold);
  }
  .primary-btn:hover { background: var(--gold-bright); }
  .primary-btn:disabled {
    background: var(--ink-faint); color: var(--navy-deep);
    cursor: not-allowed; opacity: 0.5;
  }
  .danger-btn {
    background: transparent; color: #E48A8A; border: 1px solid rgba(231,90,90,0.4);
  }
  .danger-btn:hover { background: rgba(231,90,90,0.08); }
  .secondary-btn {
    background: transparent; color: var(--ink-soft); border: 1px solid var(--rule-strong);
  }
  .secondary-btn:hover { color: var(--gold); border-color: var(--gold); }

  .loader {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--ink-faint); border-top-color: var(--gold);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: -2px; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed; bottom: 24px; right: 32px;
    background: var(--navy-soft); border: 1px solid var(--rule-strong);
    color: var(--ink); padding: 12px 18px; border-radius: 6px;
    font-size: 13px; z-index: 100;
    box-shadow: 0 8px 28px rgba(0,0,0,0.4);
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.2s ease, transform 0.2s ease;
    max-width: 380px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: rgba(80,200,120,0.4); }
  .toast.error   { border-color: rgba(231,90,90,0.4); }
</style>
</head>
<body>

<header class="app">
  <div class="brand-lockup">
    <svg viewBox="0 0 88 110" xmlns="http://www.w3.org/2000/svg">
      <polygon points="0,0 88,0 84,28 4,28" fill="#D4AF37"/>
      <polygon points="5,34 83,34 78,68 10,68" fill="#D4AF37"/>
      <polygon points="11,74 77,74 73,110 15,110" fill="#D4AF37"/>
    </svg>
    <div>
      <div class="wm">Bedrock <em>Intelligence</em></div>
      <div class="sub">trustEd · operations platform</div>
    </div>
  </div>
  <div class="module-name">Ownership <em>Review</em></div>
  <div class="util">
    <a href="/">← Platform</a>
    <a href="#" id="refreshBtn">Refresh</a>
  </div>
</header>

<div class="shell" id="shell">
  <main class="queue">
    <div class="filter-bar">
      <label>Community
        <select id="filterCommunity"><option value="">All</option></select>
      </label>
      <label>Status
        <select id="filterStatus">
          <option value="pending" selected>Pending</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
          <option value="all">All</option>
        </select>
      </label>
      <label>Search
        <input type="search" id="filterSearch" placeholder="address, owner, account…">
      </label>
      <div class="count" id="resultCount">—</div>
    </div>
    <div id="queueBody">
      <div class="empty-state"><div class="loader"></div> Loading queue…</div>
    </div>
  </main>
  <aside class="detail" id="detailPanel" style="display:none;"></aside>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
const state = { items: [], total: 0, selectedId: null };
const filters = { community_id: '', status: 'pending', q: '' };

function $(id) { return document.getElementById(id); }
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtAge(days) {
  if (days == null) return '';
  const d = Number(days);
  if (d < 1) return Math.round(d * 24) + 'h';
  if (d < 14) return Math.round(d) + 'd';
  return Math.round(d / 7) + 'w';
}
function toast(msg, kind) {
  const t = $('toast');
  t.className = 'toast show ' + (kind || '');
  t.textContent = msg;
  setTimeout(() => { t.className = 'toast'; }, 4200);
}
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
  return data;
}

async function loadCommunities() {
  try {
    const r = await fetch('/api/communities');
    if (!r.ok) return;
    const data = await r.json();
    const list = Array.isArray(data) ? data : (data.communities || data.items || []);
    const sel = $('filterCommunity');
    list.sort((a, b) => (a.name || '').localeCompare(b.name || '')).forEach((c) => {
      const opt = document.createElement('option');
      opt.value = c.id; opt.textContent = c.name;
      sel.appendChild(opt);
    });
  } catch (_) {}
}

async function loadQueue() {
  const params = new URLSearchParams();
  if (filters.community_id) params.set('community_id', filters.community_id);
  if (filters.status) params.set('status', filters.status);
  if (filters.q) params.set('q', filters.q);
  params.set('limit', '200');

  $('queueBody').innerHTML = `<div class="empty-state"><div class="loader"></div> Loading queue…</div>`;
  try {
    const data = await api('GET', `/api/ownership-proposals?${params.toString()}`);
    state.items = data.items || [];
    state.total = data.total || 0;
    $('resultCount').textContent = `${state.total} proposal${state.total === 1 ? '' : 's'}`;

    if (!state.items.length) {
      $('queueBody').innerHTML = `
        <div class="empty-state">
          <h2>No ${escapeHtml(filters.status)} proposals</h2>
          <p>Ownership change proposals get created when the Vantaca import detects a different owner for an existing property. Staff reviews + approves here before the transition applies.</p>
        </div>`;
      return;
    }

    $('queueBody').innerHTML = `
      <table class="queue">
        <thead><tr>
          <th>Property</th>
          <th>Current → Proposed Owner</th>
          <th>Source</th>
          <th>Age</th>
          <th>Status</th>
        </tr></thead>
        <tbody>${state.items.map(rowHtml).join('')}</tbody>
      </table>`;
    $('queueBody').querySelectorAll('tbody tr').forEach((tr) => {
      tr.addEventListener('click', () => loadDetail(tr.dataset.id));
    });
  } catch (err) {
    $('queueBody').innerHTML = `<div class="empty-state"><h2>Couldn't load queue</h2><p>${escapeHtml(err.message)}</p></div>`;
  }
}

function rowHtml(item) {
  return `
    <tr data-id="${item.id}" class="${state.selectedId === item.id ? 'active' : ''}">
      <td>
        <strong>${escapeHtml(item.street_address || '—')}${item.unit ? ' #' + escapeHtml(item.unit) : ''}</strong>
        <span class="sub">${escapeHtml(item.community_name || '')}${item.vantaca_account_id ? ' · Acct ' + escapeHtml(item.vantaca_account_id) : ''}</span>
      </td>
      <td>
        ${escapeHtml(item.current_owner_name || '—')}
        <span class="arrow">→</span>
        ${escapeHtml(item.proposed_owner_name || '—')}
      </td>
      <td>
        ${escapeHtml(item.source || '—')}
        <span class="sub">${item.source_filename ? escapeHtml(item.source_filename) : ''}</span>
      </td>
      <td class="num">${fmtAge(item.age_days)}</td>
      <td>
        <span class="badge ${item.status}">${escapeHtml((item.status || '').replace(/_/g, ' '))}</span>
      </td>
    </tr>`;
}

async function loadDetail(id) {
  state.selectedId = id;
  document.querySelectorAll('table.queue tbody tr').forEach((tr) => {
    tr.classList.toggle('active', tr.dataset.id === id);
  });
  $('shell').classList.add('detail-open');
  const panel = $('detailPanel');
  panel.style.display = '';
  panel.innerHTML = `<div style="padding:80px 0;text-align:center;color:var(--ink-faint);"><div class="loader"></div></div>`;
  try {
    const data = await api('GET', `/api/ownership-proposals/${id}`);
    renderDetail(data);
  } catch (err) {
    panel.innerHTML = `<div class="empty-state">Couldn't load: ${escapeHtml(err.message)}</div>`;
  }
}
function closeDetail() {
  state.selectedId = null;
  $('shell').classList.remove('detail-open');
  $('detailPanel').style.display = 'none';
  document.querySelectorAll('table.queue tbody tr').forEach((tr) => tr.classList.remove('active'));
}
window.__closeOwnershipDetail = closeDetail;

function renderDetail(p) {
  const isPending = p.status === 'pending';
  const panel = $('detailPanel');
  panel.innerHTML = `
    <button class="close-detail" onclick="window.__closeOwnershipDetail()">×</button>
    <h2>${escapeHtml(p.street_address || '—')}${p.unit ? ' #' + escapeHtml(p.unit) : ''}</h2>
    <div class="addr">${escapeHtml(p.community_name || '')}${p.vantaca_account_id ? ' · Vantaca Acct ' + escapeHtml(p.vantaca_account_id) : ''}</div>

    <section>
      <h3>Ownership transition</h3>
      <div class="compare-grid">
        <div class="compare-card current">
          <div class="label">Currently on file</div>
          <div class="name">${escapeHtml(p.current_owner_name || '(none)')}</div>
          <div class="contact">
            ${p.current_owner_email ? `<span class="field">${escapeHtml(p.current_owner_email)}</span>` : '<span class="field empty">No email</span>'}
            ${p.current_owner_email && p.current_owner_phone ? '<span class="field">' + escapeHtml(p.current_owner_phone) + '</span>' : ''}
          </div>
        </div>
        <div class="compare-card proposed">
          <div class="label">Proposed</div>
          <div class="name">${escapeHtml(p.proposed_owner_name || '—')}</div>
          <div class="contact">
            ${p.proposed_owner_email ? `<span class="field">${escapeHtml(p.proposed_owner_email)}</span>` : '<span class="field empty">No email</span>'}
            ${p.proposed_owner_phone ? `<span class="field">${escapeHtml(p.proposed_owner_phone)}</span>` : ''}
            ${p.proposed_mailing_address ? `<span class="field" style="margin-top:6px;color:var(--ink);">${escapeHtml(p.proposed_mailing_address)}</span>` : ''}
          </div>
        </div>
      </div>
    </section>

    <section>
      <h3>Source</h3>
      <div class="source-info">
        <div class="src-line">Type: <code>${escapeHtml(p.source || '—')}</code></div>
        ${p.source_filename ? `<div class="src-line">File: <code>${escapeHtml(p.source_filename)}</code></div>` : ''}
        <div class="src-line">Proposed: ${fmtDate(p.created_at)}${p.age_days ? ' · ' + fmtAge(p.age_days) + ' ago' : ''}</div>
      </div>
    </section>

    ${!isPending ? `
      <section>
        <h3>Decision</h3>
        <dl>
          <dt>Status</dt> <dd><span class="badge ${p.status}">${escapeHtml(p.status)}</span></dd>
          <dt>Reviewed by</dt> <dd>${escapeHtml(p.reviewed_by || '—')}</dd>
          <dt>Reviewed at</dt> <dd>${fmtDate(p.reviewed_at)}</dd>
          ${p.decision_notes ? '<dt>Notes</dt><dd>' + escapeHtml(p.decision_notes) + '</dd>' : ''}
        </dl>
      </section>
    ` : `
      <section>
        <h3>Decision</h3>
        <div class="action-form">
          <label>Your name (audit trail)</label>
          <input type="text" id="reviewedBy" placeholder="Your name">
          <label>Notes (optional for approve, required for reject)</label>
          <textarea id="decisionNotes" placeholder="e.g., Verified against deed records / Mistake in Vantaca, contacted owner / etc."></textarea>
          <div class="button-row">
            <button class="primary-btn" id="approveBtn">✓ Approve — apply ownership transition</button>
            <button class="danger-btn" id="rejectBtn">Reject</button>
            <button class="secondary-btn" onclick="window.__closeOwnershipDetail()">Cancel</button>
          </div>
        </div>
      </section>
    `}
  `;

  if (isPending) {
    $('approveBtn').addEventListener('click', () => decide(p.id, 'approve'));
    $('rejectBtn').addEventListener('click', () => decide(p.id, 'reject'));
  }
}

async function decide(id, action) {
  const reviewed_by = $('reviewedBy').value.trim();
  if (!reviewed_by) { toast('Enter your name first (audit trail).', 'error'); return; }
  const notes = $('decisionNotes').value.trim();
  if (action === 'reject' && !notes) { toast('Rejection requires a reason.', 'error'); return; }

  const btn = action === 'approve' ? $('approveBtn') : $('rejectBtn');
  btn.disabled = true;
  btn.innerHTML = `<span class="loader"></span> ${action === 'approve' ? 'Approving' : 'Rejecting'}…`;

  try {
    await api('POST', `/api/ownership-proposals/${id}/${action}`, { reviewed_by, notes: notes || null });
    toast(action === 'approve' ? 'Ownership transition applied.' : 'Proposal rejected.', 'success');
    await loadQueue();
    await loadDetail(id);
  } catch (err) {
    toast(`${action} failed: ${err.message}`, 'error');
    btn.disabled = false;
    btn.textContent = action === 'approve' ? '✓ Approve — apply ownership transition' : 'Reject';
  }
}

function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }
$('filterCommunity').addEventListener('change', (e) => { filters.community_id = e.target.value; loadQueue(); });
$('filterStatus').addEventListener('change', (e) => { filters.status = e.target.value; loadQueue(); });
$('filterSearch').addEventListener('input', debounce((e) => { filters.q = e.target.value; loadQueue(); }, 250));
$('refreshBtn').addEventListener('click', (e) => { e.preventDefault(); loadQueue(); });

(async () => { await loadCommunities(); await loadQueue(); })();
</script>
</body>
</html>
