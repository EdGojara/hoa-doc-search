<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Accounting · Bedrock</title>
<style>
  :root { --navy:#0B1D34; --gold:#D4AF37; --ink:#1f2430; --ink-soft:#475569; --ink-faint:#94a3b8;
          --rule:#e7e3d8; --bg:#f7f5ef; --ok:#15803d; --err:#b91c1c; --font-serif:'Cormorant Garamond',Georgia,serif; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:Inter,system-ui,-apple-system,sans-serif; font-size:14px; }
  header.page { background:var(--navy); color:#fff; padding:18px 26px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; border-bottom:3px solid var(--gold); }
  header.page h1 { font-family:var(--font-serif); font-weight:600; font-size:26px; margin:0; }
  header.page h1 em { color:var(--gold); font-style:italic; }
  .wrap { max-width:1100px; margin:0 auto; padding:22px 26px 60px; }
  select { padding:8px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.3); background:#fff; color:var(--ink); font-size:14px; min-width:200px; }
  .tabs { display:flex; gap:6px; margin:18px 0 16px; flex-wrap:wrap; }
  .tab { padding:8px 16px; border:1px solid var(--rule); border-radius:999px; background:#fff; cursor:pointer; font-size:13px; font-weight:600; color:var(--ink-soft); }
  .tab.active { background:var(--navy); color:#fff; border-color:var(--navy); }
  .card { background:#fff; border:1px solid var(--rule); border-radius:12px; padding:18px 20px; box-shadow:0 1px 2px rgba(0,0,0,0.03); }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:8px 10px; color:var(--ink-faint); font-size:11px; letter-spacing:0.05em; text-transform:uppercase; border-bottom:2px solid var(--rule); }
  td { padding:7px 10px; border-bottom:1px solid #f1efe8; }
  td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; }
  tr.total td { font-weight:700; border-top:2px solid var(--navy); border-bottom:none; padding-top:10px; }
  .badge { display:inline-block; padding:3px 11px; border-radius:999px; font-size:12px; font-weight:700; }
  .badge.ok { background:#dcfce7; color:var(--ok); } .badge.err { background:#fee2e2; color:var(--err); }
  .pill { font-size:11px; padding:1px 8px; border-radius:99px; background:#eef2f7; color:var(--ink-soft); }
  .muted { color:var(--ink-faint); }
  .summary { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:14px; }
  .stat { background:#fff; border:1px solid var(--rule); border-radius:10px; padding:10px 16px; min-width:150px; }
  .stat .v { font-size:22px; font-weight:700; color:var(--navy); } .stat .l { font-size:11px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.05em; }
  h2.sec { font-family:var(--font-serif); font-size:20px; color:var(--navy); margin:0 0 4px; }
</style>
</head>
<body>
<header class="page">
  <h1>Bedrock <em>Accounting</em></h1>
  <select id="commSel"></select>
</header>
<div class="wrap">
  <div class="tabs" id="tabs">
    <div class="tab active" data-v="trial">Trial Balance</div>
    <div class="tab" data-v="ar">AR Aging — Homeowners</div>
    <div class="tab" data-v="ap">AP Aging — Vendors</div>
    <div class="tab" data-v="coa">Chart of Accounts</div>
    <div class="tab" data-v="je">Journal Entries</div>
  </div>
  <div id="body"><div class="muted" style="padding:30px; text-align:center;">Loading…</div></div>
</div>
<script>
  const $ = (id) => document.getElementById(id);
  const fmt = (cents) => '$' + (Number(cents||0)/100).toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
  const esc = (s) => String(s==null?'':s).replace(/[&<>"]/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  let CID = null, VIEW = 'trial';

  async function init() {
    const r = await fetch('/api/gl/communities'); const j = await r.json();
    const comms = j.communities || [];
    $('commSel').innerHTML = comms.map((c)=>`<option value="${c.id}">${esc(c.name)}</option>`).join('') || '<option>No GL set up</option>';
    CID = comms[0] && comms[0].id;
    $('commSel').addEventListener('change', (e)=>{ CID = e.target.value; load(); });
    document.querySelectorAll('.tab').forEach((t)=>t.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach((x)=>x.classList.remove('active')); t.classList.add('active');
      VIEW = t.dataset.v; load();
    }));
    if (CID) load(); else $('body').innerHTML = '<div class="card muted">No community has a GL set up yet.</div>';
  }

  async function load() {
    $('body').innerHTML = '<div class="muted" style="padding:30px; text-align:center;">Loading…</div>';
    try {
      if (VIEW==='trial') return renderTrial();
      if (VIEW==='ar') return renderArAging();
      if (VIEW==='ap') return renderApAging();
      if (VIEW==='coa') return renderCoa();
      if (VIEW==='je') return renderJe();
    } catch (e) { $('body').innerHTML = '<div class="card" style="color:var(--err)">Couldn\'t load: '+esc(e.message)+'</div>'; }
  }

  async function renderTrial() {
    const j = await (await fetch(`/api/gl/${CID}/trial-balance`)).json();
    const rows = (j.rows||[]).filter(r=>r.total_debits_cents||r.total_credits_cents);
    const body = rows.length ? rows.map((r)=>`<tr>
        <td>${esc(r.account_number)}</td><td>${esc(r.account_name)}</td>
        <td><span class="pill">${esc(r.fund_code||'—')}</span></td>
        <td class="num">${r.total_debits_cents?fmt(r.total_debits_cents):''}</td>
        <td class="num">${r.total_credits_cents?fmt(r.total_credits_cents):''}</td></tr>`).join('')
      : '<tr><td colspan="5" class="muted" style="padding:20px; text-align:center;">No posted activity — books are open at zero.</td></tr>';
    $('body').innerHTML = `<div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <h2 class="sec">Trial Balance</h2>
        <span class="badge ${j.balanced?'ok':'err'}">${j.balanced?'✓ In balance':'✗ Out of balance'}</span>
      </div>
      <table><thead><tr><th>Acct</th><th>Name</th><th>Fund</th><th class="num">Debit</th><th class="num">Credit</th></tr></thead>
      <tbody>${body}<tr class="total"><td colspan="3">Total</td><td class="num">${fmt(j.totals.debits)}</td><td class="num">${fmt(j.totals.credits)}</td></tr></tbody></table>
    </div>`;
  }

  const BUCKETS = [['current','Current'],['d1_30','1–30'],['d31_60','31–60'],['d61_90','61–90'],['d91_120','91–120'],['d120_plus','120+']];

  // Collection escalation ladder — label + badge color per status.
  const COLL = {
    none:                 ['—',                  '#94A3B8','transparent'],
    late_notice:          ['Late Notice',        '#92400e','#fef3c7'],
    delinquent_reminder:  ['Delinquent Reminder','#92400e','#fde68a'],
    certified_demand:     ['Certified Demand',   '#9a3412','#fed7aa'],
    board_review:         ['Board Review',       '#3730a3','#e0e7ff'],
    payment_plan:         ['Payment Plan',       '#065f46','#d1fae5'],
    with_attorney:        ['With Attorney',      '#991b1b','#fee2e2'],
    bankruptcy:           ['Bankruptcy',         '#fff','#7c3aed'],
    lien_filed:           ['Lien Filed',         '#991b1b','#fecaca'],
    foreclosure:          ['Foreclosure',        '#fff','#b91c1c'],
    written_off:          ['Written Off',        '#64748b','#f1f5f9'],
  };
  const collBadge = (st) => { const c = COLL[st] || COLL.none; return st && st !== 'none'
    ? `<span style="display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; color:${c[1]}; background:${c[2]};">${c[0]}</span>` : ''; };

  async function renderArAging() {
    const j = await (await fetch(`/api/gl/${CID}/ar-aging`)).json();
    const cats = j.summary.by_category || [];
    const sb = j.summary.by_bucket || {};
    // Category × aging matrix (assessments / late fee / interest / certified, etc.)
    const catRows = cats.length ? cats.map((c)=>`<tr>
        <td>${esc(c.label)}</td>
        ${BUCKETS.map(([k])=>`<td class="num">${c.buckets[k]?fmt(c.buckets[k]):'<span class=muted>—</span>'}</td>`).join('')}
        <td class="num" style="font-weight:700;">${fmt(c.total)}</td></tr>`).join('')
      : `<tr><td colspan="8" class="muted" style="padding:16px; text-align:center;">No open charges — homeowner ledgers are at zero.</td></tr>`;
    const hoRows = (j.homeowners||[]).map((h)=>`<tr style="cursor:pointer;" onclick="arDrill('${h.property_id}','${esc((h.street_address||'').replace(/'/g,''))}')">
        <td>${esc(h.street_address)}</td><td>${esc(h.owner_name)}</td>
        <td>${collBadge(h.collection_status)}</td>
        ${BUCKETS.map(([k])=>`<td class="num">${h.buckets[k]?fmt(h.buckets[k]):''}</td>`).join('')}
        <td class="num" style="font-weight:600;">${fmt(h.total)}</td><td class="num">${h.oldest_days}</td></tr>`).join('');
    const cs = j.collection_summary || {};
    const csChips = Object.keys(cs).length
      ? `<div style="margin-bottom:14px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;"><span class="sub">In collections:</span>${Object.entries(cs).sort((a,b)=>b[1]-a[1]).map(([st,n])=>`${collBadge(st)} <span class="muted" style="font-size:12px;">×${n}</span>`).join('&nbsp;&nbsp;')}</div>`
      : '';
    $('body').innerHTML = `
      <div class="summary">
        <div class="stat"><div class="v">${fmt(j.summary.total_cents)}</div><div class="l">Total AR outstanding</div></div>
        <div class="stat"><div class="v">${j.homeowner_count}</div><div class="l">Homeowners with a balance</div></div>
        <div class="stat"><div class="v">${cats.length}</div><div class="l">Charge categories</div></div>
      </div>
      <div class="card" style="margin-bottom:16px;"><h2 class="sec" style="margin-bottom:10px;">AR by category &amp; age</h2>
        <table><thead><tr><th>Category</th>${BUCKETS.map(([,l])=>`<th class="num">${l}</th>`).join('')}<th class="num">Total</th></tr></thead>
        <tbody>${catRows}<tr class="total"><td>Total</td>${BUCKETS.map(([k])=>`<td class="num">${fmt(sb[k]||0)}</td>`).join('')}<td class="num">${fmt(j.summary.total_cents)}</td></tr></tbody></table>
      </div>
      <div class="card"><h2 class="sec" style="margin-bottom:4px;">Homeowner ledgers</h2>
        <div class="sub" style="margin-bottom:10px;">Click a row to see every open charge for that homeowner.</div>
        ${csChips}
        <table><thead><tr><th>Property</th><th>Owner</th><th>Status</th>${BUCKETS.map(([,l])=>`<th class="num">${l}</th>`).join('')}<th class="num">Balance</th><th class="num">Oldest</th></tr></thead>
        <tbody>${hoRows || `<tr><td colspan="10" class="muted" style="padding:16px; text-align:center;">No homeowner has an open balance.</td></tr>`}</tbody></table>
      </div>
      <div id="drill"></div>`;
  }

  window._arDrillPid = null;
  window.arDrill = async function(pid, label) {
    window._arDrillPid = pid; window._arDrillLabel = label;
    const d = $('drill'); d.innerHTML = '<div class="muted" style="padding:14px;">Loading charges…</div>';
    const j = await (await fetch(`/api/gl/${CID}/ar-aging/property/${pid}`)).json();
    const bk = j.bankruptcy_split;
    const rows = (j.charges||[]).map((c)=>`<tr>
      <td>${esc(c.category)}</td><td>${esc(c.description||'')}</td>
      <td>${esc((c.due_date||'').slice(0,10))}</td><td class="num">${c.days_past_due}</td>
      ${bk?`<td>${c.petition_phase==='pre_petition'?'<span style="color:#7c3aed; font-weight:700; font-size:11px;">PRE</span>':'<span style="color:#065f46; font-weight:700; font-size:11px;">POST</span>'}</td>`:''}
      <td class="num">${fmt(c.original_cents)}</td><td class="num" style="font-weight:600;">${fmt(c.balance_cents)}</td></tr>`).join('');

    // Pre/post-petition split panel (only when a petition date is set).
    const splitPanel = bk ? `
      <div style="display:flex; gap:14px; margin:12px 0;">
        <div style="flex:1; padding:12px; background:#f5f3ff; border:1px solid #ddd6fe; border-radius:8px;">
          <div style="font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:#7c3aed; font-weight:700;">Pre-petition (stayed)</div>
          <div style="font-size:22px; font-weight:800; color:#5b21b6;">${fmt(bk.pre_petition_cents)}</div>
          <div class="muted" style="font-size:11px;">Filed before ${esc(bk.petition_date)} · frozen by the automatic stay (§362)</div>
        </div>
        <div style="flex:1; padding:12px; background:#ecfdf5; border:1px solid #a7f3d0; border-radius:8px;">
          <div style="font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:#065f46; font-weight:700;">Post-petition (collectible)</div>
          <div style="font-size:22px; font-weight:800; color:#047857;">${fmt(bk.post_petition_cents)}</div>
          <div class="muted" style="font-size:11px;">Incurred on/after ${esc(bk.petition_date)} · debtor's ongoing obligation</div>
        </div>
      </div>` : '';

    const coll = j.collection || { collection_status: 'none' };
    const opt = (v,l,sel)=>`<option value="${v}"${v===sel?' selected':''}>${l}</option>`;
    const statusSel = Object.entries(COLL).map(([k,c])=>opt(k, c[0]==='—'?'None':c[0], coll.collection_status||'none')).join('');
    const val = (x)=> x ? String(x).slice(0,10) : '';
    const collPanel = `
      <div style="margin:8px 0 14px; padding:14px; background:#fafbfc; border:1px solid #e5e7eb; border-radius:8px;">
        <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
          <strong style="font-size:13px;">Collection status</strong>
          <select id="coll-status" onchange="arToggleBk()" style="padding:5px 8px; border:1px solid #cbd5e1; border-radius:6px; font-size:13px;">${statusSel}</select>
          <span class="muted" style="font-size:12px;">${coll.status_since?'since '+esc(val(coll.status_since)):''}</span>
        </div>
        <div id="bk-fields" style="margin-top:12px; display:${coll.collection_status==='bankruptcy'?'block':'none'};">
          <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end;">
            <label style="font-size:12px;">Petition date<br><input type="date" id="bk-petition" value="${esc(val(coll.bankruptcy_petition_date))}" style="padding:5px; border:1px solid #cbd5e1; border-radius:6px;"></label>
            <label style="font-size:12px;">Chapter<br><select id="bk-chapter" style="padding:5px; border:1px solid #cbd5e1; border-radius:6px;">${['','7','11','12','13'].map(v=>opt(v,v||'—',coll.bankruptcy_chapter||'')).join('')}</select></label>
            <label style="font-size:12px;">Case number<br><input type="text" id="bk-case" value="${esc(coll.bankruptcy_case_number||'')}" placeholder="e.g. 26-30412" style="padding:5px; border:1px solid #cbd5e1; border-radius:6px;"></label>
            <label style="font-size:12px;">Discharge / dismissal<br><input type="date" id="bk-discharge" value="${esc(val(coll.bankruptcy_discharge_date))}" style="padding:5px; border:1px solid #cbd5e1; border-radius:6px;"></label>
          </div>
          <div class="muted" style="font-size:11px; margin-top:6px;">Setting the petition date splits this ledger into pre- vs post-petition automatically.</div>
        </div>
        <div style="margin-top:12px;"><button onclick="arSaveCollection('${pid}')" style="padding:6px 16px; background:var(--navy,#0B1D34); color:#fff; border:none; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer;">Save</button> <span id="coll-saved" class="muted" style="font-size:12px;"></span></div>
      </div>`;

    d.innerHTML = `<div class="card" style="margin-top:16px; border-color:var(--navy);">
      <h2 class="sec" style="margin-bottom:4px;">${esc(label)} — open charges (${fmt(j.total_cents)}) ${collBadge(coll.collection_status)}</h2>
      ${collPanel}
      ${splitPanel}
      <table><thead><tr><th>Category</th><th>Description</th><th>Due</th><th class="num">Days late</th>${bk?'<th>Phase</th>':''}<th class="num">Original</th><th class="num">Balance</th></tr></thead>
      <tbody>${rows||'<tr><td colspan=7 class=muted>No open charges.</td></tr>'}</tbody></table></div>`;
    d.scrollIntoView({behavior:'smooth', block:'nearest'});
  };

  window.arToggleBk = function() {
    const st = $('coll-status').value;
    $('bk-fields').style.display = st==='bankruptcy' ? 'block' : 'none';
  };

  window.arSaveCollection = async function(pid) {
    const body = { collection_status: $('coll-status').value };
    if (body.collection_status === 'bankruptcy') {
      body.bankruptcy_petition_date = $('bk-petition').value || '';
      body.bankruptcy_chapter = $('bk-chapter').value || '';
      body.bankruptcy_case_number = $('bk-case').value || '';
      body.bankruptcy_discharge_date = $('bk-discharge').value || '';
    }
    $('coll-saved').textContent = 'Saving…';
    const r = await fetch(`/api/gl/${CID}/collections/${pid}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if (r.ok) { $('coll-saved').textContent = 'Saved ✓'; arDrill(pid, window._arDrillLabel); }
    else { const j = await r.json().catch(()=>({})); $('coll-saved').textContent = 'Failed: ' + (j.error||r.status); }
  };

  async function renderApAging() {
    const j = await (await fetch(`/api/gl/${CID}/ap-aging`)).json();
    const sb = j.summary.by_bucket || {};
    const rows = (j.vendors||[]).map((v)=>`<tr style="cursor:pointer;" onclick="apDrill('${v.vendor_id}','${esc((v.vendor_name||'').replace(/'/g,''))}')">
      <td>${esc(v.vendor_name)}</td><td>${esc(v.category||'')}</td>
      ${BUCKETS.map(([k])=>`<td class="num">${v.buckets[k]?fmt(v.buckets[k]):''}</td>`).join('')}
      <td class="num" style="font-weight:600;">${fmt(v.total)}</td><td class="num">${v.oldest_days}</td></tr>`).join('');
    $('body').innerHTML = `
      <div class="summary">
        <div class="stat"><div class="v">${fmt(j.summary.total_cents)}</div><div class="l">Total AP outstanding</div></div>
        <div class="stat"><div class="v">${j.vendor_count}</div><div class="l">Vendors owed</div></div>
      </div>
      <div class="card"><h2 class="sec" style="margin-bottom:4px;">Vendor aging</h2>
        <div class="sub" style="margin-bottom:10px;">Click a vendor to see their open invoices.</div>
        <table><thead><tr><th>Vendor</th><th>Category</th>${BUCKETS.map(([,l])=>`<th class="num">${l}</th>`).join('')}<th class="num">Balance</th><th class="num">Oldest</th></tr></thead>
        <tbody>${rows || `<tr><td colspan="9" class="muted" style="padding:16px; text-align:center;">No open vendor invoices.</td></tr>`}
        ${j.vendor_count?`<tr class="total"><td colspan="2">Total</td>${BUCKETS.map(([k])=>`<td class="num">${fmt(sb[k]||0)}</td>`).join('')}<td class="num">${fmt(j.summary.total_cents)}</td><td></td></tr>`:''}</tbody></table>
      </div>
      <div id="drill"></div>`;
  }

  window.apDrill = async function(vid, label) {
    const d = $('drill'); d.innerHTML = '<div class="muted" style="padding:14px;">Loading invoices…</div>';
    const j = await (await fetch(`/api/gl/${CID}/ap-aging/vendor/${vid}`)).json();
    const rows = (j.invoices||[]).map((i)=>`<tr>
      <td>${esc(i.invoice_number||'—')}</td><td>${esc((i.invoice_date||'').slice(0,10))}</td>
      <td>${esc((i.due_date||'').slice(0,10))}</td><td class="num">${i.days_past_due}</td>
      <td class="num">${fmt(i.total_cents)}</td><td class="num" style="font-weight:600;">${fmt(i.balance_cents)}</td></tr>`).join('');
    d.innerHTML = `<div class="card" style="margin-top:16px; border-color:var(--navy);">
      <h2 class="sec" style="margin-bottom:10px;">${esc(label)} — open invoices (${fmt(j.total_cents)})</h2>
      <table><thead><tr><th>Invoice #</th><th>Date</th><th>Due</th><th class="num">Days late</th><th class="num">Total</th><th class="num">Balance</th></tr></thead>
      <tbody>${rows||'<tr><td colspan=6 class=muted>No open invoices.</td></tr>'}</tbody></table></div>`;
    d.scrollIntoView({behavior:'smooth', block:'nearest'});
  };

  async function renderCoa() {
    const j = await (await fetch(`/api/gl/${CID}/chart-of-accounts`)).json();
    const rows = (j.accounts||[]).map((a)=>`<tr>
      <td>${esc(a.account_number)}</td><td>${esc(a.account_name)}</td>
      <td><span class="pill">${esc(a.account_type)}</span></td>
      <td>${esc(a.account_funds?a.account_funds.fund_code:'shared')}</td>
      <td class="muted">${esc(a.normal_balance)}</td></tr>`).join('');
    $('body').innerHTML = `<div class="card"><h2 class="sec" style="margin-bottom:10px;">Chart of Accounts</h2>
      <table><thead><tr><th>Acct</th><th>Name</th><th>Type</th><th>Fund</th><th>Normal</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }

  async function renderJe() {
    const j = await (await fetch(`/api/gl/${CID}/journal-entries`)).json();
    const rows = (j.journal_entries||[]).length ? j.journal_entries.map((e)=>`<tr>
      <td>${esc(e.reference)}</td><td>${esc((e.posting_date||'').slice(0,10))}</td>
      <td>${esc(e.description)}</td><td><span class="pill">${esc((e.source_module||'').replace(/_/g,' '))}</span></td>
      <td class="num">${fmt(e.total_debits_cents)}</td></tr>`).join('')
      : '<tr><td colspan="5" class="muted" style="padding:20px; text-align:center;">No journal entries yet.</td></tr>';
    $('body').innerHTML = `<div class="card"><h2 class="sec" style="margin-bottom:10px;">Journal Entries</h2>
      <table><thead><tr><th>Reference</th><th>Date</th><th>Description</th><th>Source</th><th class="num">Amount</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }

  init();
</script>
</body>
</html>
