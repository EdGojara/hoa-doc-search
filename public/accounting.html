<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Accounting · Bedrock</title>
<style>
  :root { --navy:#0B1D34; --gold:#D4AF37; --ink:#1f2430; --ink-soft:#475569; --ink-faint:#94a3b8;
          --rule:#e7e3d8; --bg:#f7f5ef; --ok:#15803d; --err:#b91c1c; --font-serif:'Cormorant Garamond',Georgia,serif; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:Inter,system-ui,-apple-system,sans-serif; font-size:14px; }
  header.page { background:var(--navy); color:#fff; padding:18px 26px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; border-bottom:3px solid var(--gold); }
  header.page h1 { font-family:var(--font-serif); font-weight:600; font-size:26px; margin:0; }
  header.page h1 em { color:var(--gold); font-style:italic; }
  .wrap { max-width:1100px; margin:0 auto; padding:22px 26px 60px; }
  select { padding:8px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.3); background:#fff; color:var(--ink); font-size:14px; min-width:200px; }
  .tabs { display:flex; gap:6px; margin:18px 0 16px; flex-wrap:wrap; }
  .tab { padding:8px 16px; border:1px solid var(--rule); border-radius:999px; background:#fff; cursor:pointer; font-size:13px; font-weight:600; color:var(--ink-soft); }
  .tab.active { background:var(--navy); color:#fff; border-color:var(--navy); }
  .card { background:#fff; border:1px solid var(--rule); border-radius:12px; padding:18px 20px; box-shadow:0 1px 2px rgba(0,0,0,0.03); }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:8px 10px; color:var(--ink-faint); font-size:11px; letter-spacing:0.05em; text-transform:uppercase; border-bottom:2px solid var(--rule); }
  td { padding:7px 10px; border-bottom:1px solid #f1efe8; }
  td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; }
  tr.total td { font-weight:700; border-top:2px solid var(--navy); border-bottom:none; padding-top:10px; }
  .badge { display:inline-block; padding:3px 11px; border-radius:999px; font-size:12px; font-weight:700; }
  .badge.ok { background:#dcfce7; color:var(--ok); } .badge.err { background:#fee2e2; color:var(--err); }
  .pill { font-size:11px; padding:1px 8px; border-radius:99px; background:#eef2f7; color:var(--ink-soft); }
  .muted { color:var(--ink-faint); }
  .summary { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:14px; }
  .stat { background:#fff; border:1px solid var(--rule); border-radius:10px; padding:10px 16px; min-width:150px; }
  .stat .v { font-size:22px; font-weight:700; color:var(--navy); } .stat .l { font-size:11px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.05em; }
  h2.sec { font-family:var(--font-serif); font-size:20px; color:var(--navy); margin:0 0 4px; }
</style>
</head>
<body>
<header class="page">
  <h1>Bedrock <em>Accounting</em></h1>
  <select id="commSel"></select>
</header>
<div class="wrap">
  <div class="tabs" id="tabs">
    <div class="tab active" data-v="trial">Trial Balance</div>
    <div class="tab" data-v="ledgers">Homeowner Ledgers</div>
    <div class="tab" data-v="coa">Chart of Accounts</div>
    <div class="tab" data-v="je">Journal Entries</div>
  </div>
  <div id="body"><div class="muted" style="padding:30px; text-align:center;">Loading…</div></div>
</div>
<script>
  const $ = (id) => document.getElementById(id);
  const fmt = (cents) => '$' + (Number(cents||0)/100).toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
  const esc = (s) => String(s==null?'':s).replace(/[&<>"]/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  let CID = null, VIEW = 'trial';

  async function init() {
    const r = await fetch('/api/gl/communities'); const j = await r.json();
    const comms = j.communities || [];
    $('commSel').innerHTML = comms.map((c)=>`<option value="${c.id}">${esc(c.name)}</option>`).join('') || '<option>No GL set up</option>';
    CID = comms[0] && comms[0].id;
    $('commSel').addEventListener('change', (e)=>{ CID = e.target.value; load(); });
    document.querySelectorAll('.tab').forEach((t)=>t.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach((x)=>x.classList.remove('active')); t.classList.add('active');
      VIEW = t.dataset.v; load();
    }));
    if (CID) load(); else $('body').innerHTML = '<div class="card muted">No community has a GL set up yet.</div>';
  }

  async function load() {
    $('body').innerHTML = '<div class="muted" style="padding:30px; text-align:center;">Loading…</div>';
    try {
      if (VIEW==='trial') return renderTrial();
      if (VIEW==='ledgers') return renderLedgers();
      if (VIEW==='coa') return renderCoa();
      if (VIEW==='je') return renderJe();
    } catch (e) { $('body').innerHTML = '<div class="card" style="color:var(--err)">Couldn\'t load: '+esc(e.message)+'</div>'; }
  }

  async function renderTrial() {
    const j = await (await fetch(`/api/gl/${CID}/trial-balance`)).json();
    const rows = (j.rows||[]).filter(r=>r.total_debits_cents||r.total_credits_cents);
    const body = rows.length ? rows.map((r)=>`<tr>
        <td>${esc(r.account_number)}</td><td>${esc(r.account_name)}</td>
        <td><span class="pill">${esc(r.fund_code||'—')}</span></td>
        <td class="num">${r.total_debits_cents?fmt(r.total_debits_cents):''}</td>
        <td class="num">${r.total_credits_cents?fmt(r.total_credits_cents):''}</td></tr>`).join('')
      : '<tr><td colspan="5" class="muted" style="padding:20px; text-align:center;">No posted activity — books are open at zero.</td></tr>';
    $('body').innerHTML = `<div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <h2 class="sec">Trial Balance</h2>
        <span class="badge ${j.balanced?'ok':'err'}">${j.balanced?'✓ In balance':'✗ Out of balance'}</span>
      </div>
      <table><thead><tr><th>Acct</th><th>Name</th><th>Fund</th><th class="num">Debit</th><th class="num">Credit</th></tr></thead>
      <tbody>${body}<tr class="total"><td colspan="3">Total</td><td class="num">${fmt(j.totals.debits)}</td><td class="num">${fmt(j.totals.credits)}</td></tr></tbody></table>
    </div>`;
  }

  async function renderLedgers() {
    const j = await (await fetch(`/api/gl/${CID}/homeowner-ledgers`)).json();
    const L = j.ledgers || [];
    const withBal = L.filter(l=>l.balance_cents>0).length;
    const rows = L.length ? L.map((l)=>`<tr>
        <td>${esc(l.street_address||'—')}</td><td>${esc(l.owner_name||'—')}</td>
        <td class="num" style="${l.balance_cents>0?'color:var(--err); font-weight:600;':'color:var(--ink-faint);'}">${fmt(l.balance_cents)}</td>
        <td class="num">${l.max_days_past_due||0}</td></tr>`).join('')
      : '<tr><td colspan="4" class="muted" style="padding:20px; text-align:center;">No homeowner accounts yet.</td></tr>';
    $('body').innerHTML = `
      <div class="summary">
        <div class="stat"><div class="v">${j.count}</div><div class="l">Homeowner accounts</div></div>
        <div class="stat"><div class="v">${withBal}</div><div class="l">With a balance</div></div>
        <div class="stat"><div class="v">${fmt(j.total_outstanding_cents)}</div><div class="l">Total outstanding</div></div>
      </div>
      <div class="card"><h2 class="sec" style="margin-bottom:10px;">Homeowner Ledgers</h2>
      <table><thead><tr><th>Property</th><th>Owner</th><th class="num">Balance</th><th class="num">Days past due</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  }

  async function renderCoa() {
    const j = await (await fetch(`/api/gl/${CID}/chart-of-accounts`)).json();
    const rows = (j.accounts||[]).map((a)=>`<tr>
      <td>${esc(a.account_number)}</td><td>${esc(a.account_name)}</td>
      <td><span class="pill">${esc(a.account_type)}</span></td>
      <td>${esc(a.account_funds?a.account_funds.fund_code:'shared')}</td>
      <td class="muted">${esc(a.normal_balance)}</td></tr>`).join('');
    $('body').innerHTML = `<div class="card"><h2 class="sec" style="margin-bottom:10px;">Chart of Accounts</h2>
      <table><thead><tr><th>Acct</th><th>Name</th><th>Type</th><th>Fund</th><th>Normal</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }

  async function renderJe() {
    const j = await (await fetch(`/api/gl/${CID}/journal-entries`)).json();
    const rows = (j.journal_entries||[]).length ? j.journal_entries.map((e)=>`<tr>
      <td>${esc(e.reference)}</td><td>${esc((e.posting_date||'').slice(0,10))}</td>
      <td>${esc(e.description)}</td><td><span class="pill">${esc((e.source_module||'').replace(/_/g,' '))}</span></td>
      <td class="num">${fmt(e.total_debits_cents)}</td></tr>`).join('')
      : '<tr><td colspan="5" class="muted" style="padding:20px; text-align:center;">No journal entries yet.</td></tr>';
    $('body').innerHTML = `<div class="card"><h2 class="sec" style="margin-bottom:10px;">Journal Entries</h2>
      <table><thead><tr><th>Reference</th><th>Date</th><th>Description</th><th>Source</th><th class="num">Amount</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }

  init();
</script>
</body>
</html>
