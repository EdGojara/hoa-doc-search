<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Accounting · Bedrock</title>
<style>
  :root { --navy:#0B1D34; --gold:#D4AF37; --ink:#1f2430; --ink-soft:#475569; --ink-faint:#94a3b8;
          --rule:#e7e3d8; --bg:#f7f5ef; --ok:#15803d; --err:#b91c1c; --font-serif:'Cormorant Garamond',Georgia,serif; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:Inter,system-ui,-apple-system,sans-serif; font-size:14px; }
  header.page { background:var(--navy); color:#fff; padding:18px 26px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; border-bottom:3px solid var(--gold); }
  header.page h1 { font-family:var(--font-serif); font-weight:600; font-size:26px; margin:0; }
  header.page h1 em { color:var(--gold); font-style:italic; }
  .wrap { max-width:1100px; margin:0 auto; padding:22px 26px 60px; }
  select { padding:8px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.3); background:#fff; color:var(--ink); font-size:14px; min-width:200px; }
  .tabs { display:flex; gap:6px; margin:18px 0 16px; flex-wrap:wrap; }
  .tab { padding:8px 16px; border:1px solid var(--rule); border-radius:999px; background:#fff; cursor:pointer; font-size:13px; font-weight:600; color:var(--ink-soft); }
  .tab.active { background:var(--navy); color:#fff; border-color:var(--navy); }
  /* Two-level nav: primary group pills (navy) + secondary view pills (gold) */
  .groupnav { display:flex; gap:8px; margin:18px 0 12px; flex-wrap:wrap; }
  .gtab { padding:9px 18px; border:1px solid var(--rule); border-radius:999px; background:#fff; cursor:pointer; font-size:14px; font-weight:700; color:var(--ink-soft); }
  .gtab.active { background:var(--navy); color:#fff; border-color:var(--navy); }
  .subnav { display:flex; gap:6px; margin:0 0 18px; flex-wrap:wrap; align-items:center; }
  .stab { padding:6px 14px; border-radius:999px; border:1px solid var(--rule); background:#fff; cursor:pointer; font-size:12.5px; font-weight:600; color:var(--ink-soft); }
  .stab.active { background:var(--gold); color:var(--navy); border-color:var(--gold); }
  .subnav.solo { display:none; }
  .card { background:#fff; border:1px solid var(--rule); border-radius:12px; padding:18px 20px; box-shadow:0 1px 2px rgba(0,0,0,0.03); }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:8px 10px; color:var(--ink-faint); font-size:11px; letter-spacing:0.05em; text-transform:uppercase; border-bottom:2px solid var(--rule); }
  td { padding:7px 10px; border-bottom:1px solid #f1efe8; }
  td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; }
  tr.total td { font-weight:700; border-top:2px solid var(--navy); border-bottom:none; padding-top:10px; }
  .badge { display:inline-block; padding:3px 11px; border-radius:999px; font-size:12px; font-weight:700; }
  .badge.ok { background:#dcfce7; color:var(--ok); } .badge.err { background:#fee2e2; color:var(--err); }
  .pill { font-size:11px; padding:1px 8px; border-radius:99px; background:#eef2f7; color:var(--ink-soft); }
  .muted { color:var(--ink-faint); }
  .summary { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:14px; }
  .stat { background:#fff; border:1px solid var(--rule); border-radius:10px; padding:10px 16px; min-width:150px; }
  .stat .v { font-size:22px; font-weight:700; color:var(--navy); } .stat .l { font-size:11px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.05em; }
  h2.sec { font-family:var(--font-serif); font-size:20px; color:var(--navy); margin:0 0 4px; }
</style>
</head>
<body>
<header class="page">
  <div>
    <div style="display:flex; gap:20px; align-items:center; margin-bottom:7px; font-size:13px;">
      <a href="/" style="color:#fff; text-decoration:none; opacity:.85;">&larr; trustEd Home</a>
      <a href="/admin/accounting" style="color:var(--gold); text-decoration:none; font-weight:600;">Accounting</a>
    </div>
    <h1>Bedrock <em>Accounting</em></h1>
  </div>
  <select id="commSel"></select>
</header>
<div class="wrap">
  <div class="groupnav" id="groupnav"></div>
  <div class="subnav" id="subnav"></div>
  <div id="body"><div class="muted" style="padding:30px; text-align:center;">Loading…</div></div>
</div>
<script>
  const $ = (id) => document.getElementById(id);
  const fmt = (cents) => '$' + (Number(cents||0)/100).toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
  const esc = (s) => String(s==null?'':s).replace(/[&<>"]/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  // Five workflow groups — daily work (Homeowners, Bills) first; technical
  // setup (chart, journal entries, policy) tucked into Setup at the end.
  const GROUPS = [
    { id:'homeowners', label:'👤 Homeowners', views:[['owners','Accounts'],['ar','AR Aging']] },
    { id:'bills',      label:'🧾 Bills (AP)', views:[['ap','AP Aging']] },
    { id:'bank',       label:'🏦 Bank Rec',   views:[['bankrec','Reconciliation']] },
    { id:'financials', label:'📊 Financials', views:[['bs','Balance Sheet'],['is','Income Statement'],['eq','Equity'],['trial','Trial Balance'],['tieout','Tie-Out']] },
    { id:'budget',     label:'📈 Budget',     views:[['bva','Budget vs Actual'],['budget','Budget']] },
    { id:'setup',      label:'⚙️ Setup',      views:[['periods','Periods'],['policy','Billing Policy'],['coa','Chart of Accounts'],['je','Journal Entries']] },
  ];
  let CID = null, GROUP = 'homeowners', VIEW = 'owners';

  function renderNav() {
    const g = GROUPS.find((x)=>x.id===GROUP) || GROUPS[0];
    $('groupnav').innerHTML = GROUPS.map((x)=>`<div class="gtab ${x.id===GROUP?'active':''}" data-g="${x.id}">${x.label}</div>`).join('');
    $('subnav').className = 'subnav' + (g.views.length < 2 ? ' solo' : '');
    $('subnav').innerHTML = g.views.map(([v,lbl])=>`<div class="stab ${v===VIEW?'active':''}" data-v="${v}">${esc(lbl)}</div>`).join('');
    $('groupnav').querySelectorAll('.gtab').forEach((t)=>t.addEventListener('click',()=>{
      GROUP = t.dataset.g; VIEW = (GROUPS.find((x)=>x.id===GROUP)||GROUPS[0]).views[0][0]; renderNav(); load();
    }));
    $('subnav').querySelectorAll('.stab').forEach((t)=>t.addEventListener('click',()=>{
      VIEW = t.dataset.v; renderNav(); load();
    }));
  }

  async function init() {
    renderNav();  // show the nav immediately — don't block on the data fetch
    const r = await fetch('/api/gl/communities'); const j = await r.json();
    const comms = j.communities || [];
    $('commSel').innerHTML = comms.map((c)=>`<option value="${c.id}">${esc(c.name)}</option>`).join('') || '<option>No GL set up</option>';
    CID = comms[0] && comms[0].id;
    $('commSel').addEventListener('change', (e)=>{ CID = e.target.value; load(); });
    if (CID) load(); else $('body').innerHTML = '<div class="card muted">No community has a GL set up yet.</div>';
  }

  async function load() {
    $('body').innerHTML = '<div class="muted" style="padding:30px; text-align:center;">Loading…</div>';
    try {
      if (VIEW==='trial') return renderTrial();
      if (VIEW==='tieout') return renderTieOut();
      if (VIEW==='policy') return renderBillingPolicy();
      if (VIEW==='owners') return renderOwners();
      if (VIEW==='ar') return renderArAging();
      if (VIEW==='ap') return renderApAging();
      if (VIEW==='bankrec') return renderBankRec();
      if (VIEW==='coa') return renderCoa();
      if (VIEW==='je') return renderJe();
      if (VIEW==='bs') return renderBalanceSheet();
      if (VIEW==='is') return renderIncomeStatement();
      if (VIEW==='eq') return renderEquity();
      if (VIEW==='bva') return renderBVA();
      if (VIEW==='budget') return renderBudget();
      if (VIEW==='periods') return renderPeriods();
    } catch (e) { $('body').innerHTML = '<div class="card" style="color:var(--err)">Couldn\'t load: '+esc(e.message)+'</div>'; }
  }

  // ── Financial statements + budget + periods — consolidated from the old Books
  //    tab. All compute from the same GL via /api/books/* (journal entries +
  //    chart of accounts), so they tie to the Trial Balance. fmtDate/fmt/esc are
  //    the page's existing helpers.
  const dateInput = (id,val) => `<input type="date" id="${id}" value="${val}" style="padding:6px 8px; border:1px solid var(--rule); border-radius:6px; font-size:13px;">`;
  const goBtn = (id) => `<button id="${id}" style="padding:7px 14px; border:none; border-radius:6px; background:var(--navy); color:#fff; font-weight:600; cursor:pointer; font-size:13px;">View</button>`;
  const dToday = () => new Date().toISOString().slice(0,10);
  const dMonthStart = () => dToday().slice(0,8)+'01';
  const dYearStart = () => dToday().slice(0,4)+'-01-01';

  async function renderBalanceSheet() {
    $('body').innerHTML = `<div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:14px;">
        <h2 class="sec">Balance Sheet</h2>
        <div style="display:flex; gap:8px; align-items:center;"><span class="muted" style="font-size:12px;">As of</span>${dateInput('bs-asof',dToday())}${goBtn('bs-go')}</div>
      </div><div id="bs-out" class="muted">Loading…</div></div>`;
    const run = async () => {
      const asOf = $('bs-asof').value; if (!asOf) { $('bs-out').innerHTML='Pick a date.'; return; }
      $('bs-out').innerHTML = 'Loading…';
      try { const j = await (await fetch(`/api/books/balance-sheet?community_id=${CID}&as_of_date=${asOf}`)).json();
        if (j.error) throw new Error(j.error); $('bs-out').innerHTML = bsHTML(j);
      } catch (e) { $('bs-out').innerHTML = `<div style="color:var(--err)">Couldn't load: ${esc(e.message)}</div>`; }
    };
    $('bs-go').addEventListener('click', run); run();
  }
  function bsHTML(j) {
    const sec = (title,rows,total) => `<h3 class="sec" style="font-size:14px; margin:16px 0 6px;">${esc(title)}</h3>
      <table><tbody>${(rows||[]).length ? rows.map((r)=>`<tr><td style="width:80px; font-family:ui-monospace,monospace; color:var(--ink-soft);">${esc(r.account_number||'')}</td><td>${esc(r.account_name||'')}${r.is_computed?' <em class="muted" style="font-size:11px;">(computed)</em>':''}</td><td><span class="pill">${esc(r.fund_code||'—')}</span></td><td class="num">${fmt(r.balance_cents)}</td></tr>`).join('') : '<tr><td colspan="4" class="muted">— none —</td></tr>'}
        <tr class="total"><td colspan="3">Total ${esc(title)}</td><td class="num">${fmt(total)}</td></tr></tbody></table>`;
    const t = j.totals;
    return `<div class="muted" style="margin-bottom:8px;">As of ${fmtDate(j.as_of_date)}</div>
      ${sec('Assets',j.sections.assets,t.assets_cents)}
      ${sec('Liabilities',j.sections.liabilities,t.liabilities_cents)}
      ${sec('Equity / Fund Balance',j.sections.equity,t.equity_cents)}
      <div style="margin-top:16px; padding:10px 12px; border-radius:8px; font-weight:600; background:${t.balanced?'#dcfce7':'#fee2e2'}; color:${t.balanced?'#166534':'#991b1b'};">
        ${t.balanced?'✓ Balance Sheet balances':'⚠ Out of balance by '+fmt(t.difference_cents)} · Assets ${fmt(t.assets_cents)} = Liabilities ${fmt(t.liabilities_cents)} + Equity ${fmt(t.equity_cents)}</div>`;
  }

  async function renderIncomeStatement() {
    $('body').innerHTML = `<div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:14px;">
        <h2 class="sec">Income Statement</h2>
        <div style="display:flex; gap:8px; align-items:center;"><span class="muted" style="font-size:12px;">From</span>${dateInput('is-start',dMonthStart())}<span class="muted" style="font-size:12px;">to</span>${dateInput('is-end',dToday())}${goBtn('is-go')}</div>
      </div><div id="is-out" class="muted">Loading…</div></div>`;
    const run = async () => {
      const s=$('is-start').value, e=$('is-end').value; if (!s||!e) { $('is-out').innerHTML='Pick a period.'; return; }
      $('is-out').innerHTML='Loading…';
      try { const j = await (await fetch(`/api/books/income-statement?community_id=${CID}&period_start=${s}&period_end=${e}`)).json();
        if (j.error) throw new Error(j.error); $('is-out').innerHTML = isHTML(j);
      } catch (err) { $('is-out').innerHTML = `<div style="color:var(--err)">Couldn't load: ${esc(err.message)}</div>`; }
    };
    $('is-go').addEventListener('click', run); run();
  }
  function isHTML(j) {
    const sec = (title,rows,pt,yt) => `<h3 class="sec" style="font-size:14px; margin:16px 0 6px;">${esc(title)}</h3>
      <table><thead><tr><th>Acct</th><th>Account</th><th>Fund</th><th class="num">Period</th><th class="num">YTD</th></tr></thead>
      <tbody>${(rows||[]).length ? rows.map((r)=>`<tr><td style="font-family:ui-monospace,monospace; color:var(--ink-soft);">${esc(r.account_number||'')}</td><td>${esc(r.account_name||'')}</td><td><span class="pill">${esc(r.fund_code||'—')}</span></td><td class="num">${fmt(r.period_amount_cents)}</td><td class="num">${fmt(r.ytd_amount_cents)}</td></tr>`).join('') : '<tr><td colspan="5" class="muted">— none —</td></tr>'}
        <tr class="total"><td colspan="3">Total ${esc(title)}</td><td class="num">${fmt(pt)}</td><td class="num">${fmt(yt)}</td></tr></tbody></table>`;
    const ni = j.totals.period.net_income_cents, col = ni>=0?'#166534':'#991b1b';
    return `<div class="muted" style="margin-bottom:8px;">${fmtDate(j.period_start)} — ${fmtDate(j.period_end)}</div>
      ${sec('Revenue',j.sections.revenue,j.totals.period.revenue_cents,j.totals.ytd.revenue_cents)}
      ${sec('Expenses',j.sections.expenses,j.totals.period.expenses_cents,j.totals.ytd.expenses_cents)}
      <div style="margin-top:16px; padding:12px; border-radius:8px; background:#f5f8fc; border:2px solid ${col};">
        <div style="display:flex; justify-content:space-between; font-weight:700;"><span>NET INCOME</span><span style="color:${col};">Period ${fmt(ni)} · YTD ${fmt(j.totals.ytd.net_income_cents)}</span></div></div>`;
  }

  async function renderEquity() {
    $('body').innerHTML = `<div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:14px;">
        <h2 class="sec">Statement of Equity</h2>
        <div style="display:flex; gap:8px; align-items:center;"><span class="muted" style="font-size:12px;">From</span>${dateInput('eq-start',dYearStart())}<span class="muted" style="font-size:12px;">to</span>${dateInput('eq-end',dToday())}${goBtn('eq-go')}</div>
      </div><div id="eq-out" class="muted">Loading…</div></div>`;
    const run = async () => {
      const s=$('eq-start').value, e=$('eq-end').value; if (!s||!e) { $('eq-out').innerHTML='Pick a period.'; return; }
      $('eq-out').innerHTML='Loading…';
      try { const j = await (await fetch(`/api/books/equity-statement?community_id=${CID}&period_start=${s}&period_end=${e}`)).json();
        if (j.error) throw new Error(j.error); $('eq-out').innerHTML = eqHTML(j);
      } catch (err) { $('eq-out').innerHTML = `<div style="color:var(--err)">Couldn't load: ${esc(err.message)}</div>`; }
    };
    $('eq-go').addEventListener('click', run); run();
  }
  function eqHTML(j) {
    const funds = new Set([...Object.keys(j.beginning.by_fund||{}),...Object.keys(j.ending.by_fund||{})]);
    const rows = [...funds].map((code)=>{ const b=j.beginning.by_fund[code]||{total:0}, e=j.ending.by_fund[code]||{total:0};
      return `<tr><td style="font-weight:600;">${esc(code==='consolidated'?'Unsegregated':code)}</td><td class="num">${fmt(b.total)}</td><td class="num">${fmt(e.total-b.total)}</td><td class="num" style="font-weight:600;">${fmt(e.total)}</td></tr>`; }).join('');
    return `<div class="muted" style="margin-bottom:8px;">${fmtDate(j.period_start)} — ${fmtDate(j.period_end)}</div>
      <table><thead><tr><th>Fund</th><th class="num">Beginning</th><th class="num">Net Change</th><th class="num">Ending</th></tr></thead><tbody>${rows}</tbody></table>
      <div style="margin-top:12px; padding:10px 12px; background:#f5f8fc; border-radius:8px;">Period Net Income: <strong>${fmt(j.period_net_income_cents)}</strong></div>`;
  }

  async function renderBVA() {
    $('body').innerHTML = `<div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:14px;">
        <h2 class="sec">Budget vs Actual</h2>
        <div style="display:flex; gap:8px; align-items:center;"><span class="muted" style="font-size:12px;">Through</span>${dateInput('bva-end',dToday())}${goBtn('bva-go')}</div>
      </div><div id="bva-out" class="muted">Loading…</div></div>`;
    const run = async () => {
      const e=$('bva-end').value; if (!e) { $('bva-out').innerHTML='Pick a period end.'; return; }
      $('bva-out').innerHTML='Loading…';
      try { const j = await (await fetch(`/api/books/budget-vs-actual?community_id=${CID}&period_end=${e}`)).json();
        if (j.error) throw new Error(j.error); $('bva-out').innerHTML = bvaHTML(j);
      } catch (err) { $('bva-out').innerHTML = `<div style="color:var(--err)">Couldn't load: ${esc(err.message)}</div>`; }
    };
    $('bva-go').addEventListener('click', run); run();
  }
  function bvaHTML(j) {
    if (!j.has_budget) return `<div class="muted" style="padding:24px; text-align:center;">No budget loaded for fiscal year ${esc(String(j.fiscal_year||''))}. Use the <strong>Budget</strong> tab to upload one.</div>`;
    const vc = (v) => Math.abs(v)<=1 ? 'var(--ink-soft)' : (v>=0?'#166534':'#991b1b');
    const rows = (j.rows||[]).map((r)=>`<tr><td style="font-family:ui-monospace,monospace; color:var(--ink-soft);">${esc(r.account_number)}</td><td>${esc(r.account_name)}</td>
      <td class="num">${fmt(r.mtd_budget_cents)}</td><td class="num">${fmt(r.mtd_actual_cents)}</td><td class="num" style="color:${vc(r.mtd_variance_cents)};">${fmt(r.mtd_variance_cents)}</td>
      <td class="num">${fmt(r.ytd_budget_cents)}</td><td class="num">${fmt(r.ytd_actual_cents)}</td><td class="num" style="color:${vc(r.ytd_variance_cents)};">${fmt(r.ytd_variance_cents)}</td>
      <td class="num">${fmt(r.annual_budget_cents)}</td></tr>`).join('');
    return `<table><thead><tr><th>#</th><th>Account</th><th class="num">MTD Bud</th><th class="num">MTD Act</th><th class="num">MTD Var</th><th class="num">YTD Bud</th><th class="num">YTD Act</th><th class="num">YTD Var</th><th class="num">Annual</th></tr></thead><tbody>${rows}</tbody></table>`;
  }

  async function renderPeriods() {
    $('body').innerHTML = `<div class="card"><h2 class="sec" style="margin-bottom:12px;">Accounting Periods</h2><div id="per-out" class="muted">Loading…</div></div>`;
    try {
      const j = await (await fetch(`/api/books/periods?community_id=${CID}`)).json();
      const rows = j.periods||[];
      if (!rows.length) { $('per-out').innerHTML='<div class="muted" style="padding:20px;">No periods set up.</div>'; return; }
      const badge = (s) => { const ok=s==='open'||s==='reopened'; const bg=ok?'#dcfce7':(s==='closed'?'#fef3c7':'#f1f5f9'), fg=ok?'#166534':(s==='closed'?'#92400e':'#64748b');
        return `<span style="font-size:11px; font-weight:700; padding:2px 8px; border-radius:10px; background:${bg}; color:${fg};">${esc(s)}</span>`; };
      $('per-out').innerHTML = `<table><thead><tr><th>FY</th><th>Period</th><th>Start</th><th>End</th><th>Status</th></tr></thead><tbody>${rows.map((p)=>`<tr><td>${esc(String(p.fiscal_year))}</td><td>${esc(String(p.period_number))}</td><td>${fmtDate(p.period_start)}</td><td>${fmtDate(p.period_end)}</td><td>${badge(p.status)}</td></tr>`).join('')}</tbody></table>`;
    } catch (e) { $('per-out').innerHTML = `<div style="color:var(--err)">Couldn't load: ${esc(e.message)}</div>`; }
  }

  // Budget upload → extract → match-to-CoA → save (draft/approve)
  let _coaCache = [], _pendingBudget = null;
  async function renderBudget() {
    $('body').innerHTML = `<div class="card">
      <h2 class="sec" style="margin-bottom:8px;">Budget</h2>
      <div class="muted" style="margin-bottom:12px; font-size:13px;">Upload an approved annual budget (PDF). trustEd extracts the line items and matches them to your chart of accounts.</div>
      <div id="bdg-drop" style="border:2px dashed var(--rule); border-radius:10px; padding:26px; text-align:center; cursor:pointer; background:#fafbfc;">
        <div style="font-size:13px; color:var(--ink-soft);">📄 Drop a budget PDF here or <strong>click to choose</strong></div>
        <input type="file" id="bdg-file" accept=".pdf" style="display:none;">
      </div>
      <div id="bdg-preview"></div>
      <div id="bdg-list" style="margin-top:14px;" class="muted">Loading…</div></div>`;
    const drop=$('bdg-drop'), file=$('bdg-file');
    drop.addEventListener('click',()=>file.click());
    drop.addEventListener('dragover',(e)=>{e.preventDefault(); drop.style.background='#eef4fb';});
    drop.addEventListener('dragleave',()=>{drop.style.background='#fafbfc';});
    drop.addEventListener('drop',(e)=>{e.preventDefault(); drop.style.background='#fafbfc'; if(e.dataTransfer.files[0]) uploadBudget(e.dataTransfer.files[0]);});
    file.addEventListener('change',()=>{ if(file.files[0]) uploadBudget(file.files[0]); });
    try { _coaCache = (await (await fetch(`/api/books/coa?community_id=${CID}`)).json()).accounts || []; } catch (e) { _coaCache = []; }
    try {
      const ex = ((await (await fetch(`/api/books/budgets?community_id=${CID}`)).json()).budgets) || [];
      $('bdg-list').innerHTML = ex.length

  async function uploadBudget(f) {
    $('bdg-preview').innerHTML = `<div style="margin-top:12px; padding:14px; background:#f5f8fc; border-radius:8px; color:#315A87;">⏳ Extracting <strong>${esc(f.name)}</strong> (~30s)…</div>`;
    try {
      const fd = new FormData(); fd.append('file', f);
      const j = await (await fetch('/api/books/budgets/preview-pdf', { method:'POST', body:fd })).json();
      if (j.error) throw new Error(j.error); _pendingBudget = j; renderBudgetPreview(j);

  function renderBudgetPreview(payload) {
    const ex = payload.extraction;
    const byV={}, byN={}; (_coaCache||[]).forEach((a)=>{ if(a.vantaca_account_number) byV[a.vantaca_account_number]=a; if(a.account_number) byN[a.account_number]=a; });
    let matched=0, unmatched=0;
    const lines = (ex.line_items||[]).map((li)=>{ const a=byV[li.account_number]||byN[li.account_number]||null; if(a)matched++; else unmatched++; return {...li,_a:a}; });
    const tr = lines.map((li)=>`<tr><td style="font-family:ui-monospace,monospace; font-size:11.5px;">${esc(li.account_number)}</td><td style="font-size:11.5px;">${esc(li.account_name)}</td><td style="font-size:11.5px;">${esc(li.account_type||'')}</td><td class="num" style="font-size:11.5px;">${fmt(li.annual_amount_cents)}</td><td style="font-size:11.5px; color:${li._a?'#166534':'#991b1b'};">${li._a?'✓ '+esc(li._a.account_number):'⚠ no match'}</td></tr>`).join('');
    $('bdg-preview').innerHTML = `<div class="card" style="margin-top:14px;">
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:10px;">
        <div><strong>Preview — FY ${esc(String(ex.fiscal_year||'?'))}</strong> · ${matched+unmatched} lines<div class="muted" style="font-size:12px;">${matched} matched, ${unmatched} unmatched</div></div>
        <div style="display:flex; gap:8px;"><button id="bdg-draft" style="padding:7px 12px; border:1px solid var(--rule); border-radius:6px; background:#fff; cursor:pointer;">💾 Save Draft</button><button id="bdg-approve" style="padding:7px 12px; border:none; border-radius:6px; background:#166534; color:#fff; cursor:pointer;">✓ Save & Approve</button></div>
      </div>
      ${ex.warnings&&ex.warnings.length?`<div style="padding:8px 12px; background:#fef3c7; border-radius:6px; font-size:12px; color:#92400e; margin-bottom:10px;">⚠ ${ex.warnings.map(esc).join('<br>⚠ ')}</div>`:''}
      <table><thead><tr><th>Source #</th><th>Account</th><th>Type</th><th class="num">Annual</th><th>Match</th></tr></thead><tbody>${tr}</tbody></table>
      ${unmatched>0?`<div class="muted" style="margin-top:10px; font-size:12px;">⚠ Unmatched accounts are skipped on save. Add the Vantaca account number to your CoA to map them.</div>`:''}
    </div>`;
    $('bdg-draft').addEventListener('click',()=>commitBudget('draft'));
    $('bdg-approve').addEventListener('click',()=>commitBudget('approved'));
  }
  async function commitBudget(status) {
    if (!_pendingBudget) return; const ex = _pendingBudget.extraction;
    const byV={}, byN={}; (_coaCache||[]).forEach((a)=>{ if(a.vantaca_account_number) byV[a.vantaca_account_number]=a; if(a.account_number) byN[a.account_number]=a; });
    const matched = (ex.line_items||[]).map((li)=>{ const a=byV[li.account_number]||byN[li.account_number]; return a?{account_id:a.id,fund_id:a.fund_id||null,annual_amount_cents:li.annual_amount_cents,monthly_amounts_cents:li.monthly_amounts_cents}:null; }).filter(Boolean);
    if (!matched.length) { alert('No matched lines to save.'); return; }
    try {
      const j = await (await fetch('/api/books/budgets', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ community_id:CID, fiscal_year:ex.fiscal_year, status, source_filename:_pendingBudget.filename, line_items:matched }) })).json();
      if (j.error) throw new Error(j.error); alert(`Saved budget — ${j.line_items_count} lines, status ${j.budget.status}.`); _pendingBudget=null; renderBudget();
    } catch (e) { alert('Save failed: '+e.message); }
  }

  function lfrMonth() { const v = ($('lfr_month')||{}).value || ''; return v; }

  window.lfrRun = async function() {

    $('lfr_result').innerHTML = `<div style="padding:10px 12px; background:#dcfce7; border:1px solid #86efac; border-radius:8px; color:#166534;">✓ Posted ${j.posted} account(s) — late fees ${fmt(j.late_fee_total_cents)} + interest ${fmt(j.interest_total_cents)} = ${fmt(j.grand_total_cents)} (${esc(j.journal_entry)}).</div>`;

  window.lfrReverse = async function() {

    const cents = (id) => { const x = parseFloat(v(id)); return Number.isFinite(x) ? Math.round(x*100) : 0; };
    const body = {
      assessment_default_amount_cents: cents('assessment_default_amount_dollars'),

  window.payToggle = function(pid) {
    const f = $('payForm'); if (!f) return;
    f.style.display = f.style.display === 'none' ? 'block' : 'none';
    if (f.style.display === 'block') { const d = $('pay_date'); if (d && !d.value) d.value = new Date().toISOString().slice(0,10); $('pay_amount').focus(); }
  };
  window.recordPayment = async function() {
    const pid = $('payForm').dataset.pid;
    const amt = parseFloat(($('pay_amount').value||'').trim());
    if (!(amt > 0)) { $('pay_msg').textContent = 'Enter an amount'; $('pay_msg').style.color = '#b91c1c'; return; }
    $('pay_msg').textContent = 'Posting…'; $('pay_msg').style.color = '#64748b';
    const body = { amount_dollars: amt, payment_date: $('pay_date').value, source: $('pay_source').value, reference: ($('pay_ref').value||'').trim() };
    const r = await fetch(`/api/gl/${CID}/owners/${pid}/payment`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const j = await r.json();
    if (!r.ok || j.error) { $('pay_msg').textContent = j.error || 'Failed'; $('pay_msg').style.color = '#b91c1c'; return; }
    ownerAccount(pid); // refresh the account with the new balance + ledger entry

  function renderLedger(j) {

  // -------- SUBLEDGER TIE-OUT (control-account integrity) --------

    const j = await (await fetch(`/api/gl/${CID}/tie-out`)).json();
    const controls = j.controls || [];

      const broken = c.status==='broken';
      const tied = c.status==='tied';
      const badge = broken ? '<span style="color:#b91c1c; font-weight:700;">⚠ OUT OF BALANCE</span>'

      return `<tr style="${broken?'background:#fef2f2;':''}">
        <td style="font-family:ui-monospace,monospace; color:#5a7390;">${esc(c.account)}</td>

  // -------- BANK RECONCILIATION --------
  const fmtDate = (d) => d ? new Date(d+'T00:00:00').toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'}) : '—';
  // Boundary view: book (GL) vs bank each month = deposits in transit, with the
  // online settlements explained from the payout key and the rest flagged.
  async function boundarySummaryCard() {
    let data;
    try { data = await (await fetch(`/api/bank-rec/boundary-summary?community_id=${CID}`)).json(); }
    catch(e){ return ''; }
    if (!data || !data.months || !data.months.length || data.error) return '';
    const rows = data.months.slice().sort((a,b)=>(b.period_end||'').localeCompare(a.period_end||'')).map((m)=>{
      const tied = m.reconciled;
      const resColor = Math.abs(m.residual_cents)<=100 ? '#047857' : (m.residual_cents<0?'#b91c1c':'#b45309');
      return `<tr style="cursor:pointer; ${tied?'':'background:#fff7ed;'}" onclick="wsOpen('${m.period_end}')" title="Open reconciliation worksheet">
        <td>${esc(fmtDate(m.period_end))}</td>
        <td class="num">${fmt(m.book_cents)}</td>
        <td class="num">${fmt(m.bank_cents)}</td>
        <td class="num">${fmt(m.book_minus_bank_cents)}</td>

      const glDesc=g.gl.length>1?`${g.gl.length} GL lines`:esc((g.gl[0]?g.gl[0].description:'').slice(0,34));
      // toggling the whole group: target each item to the opposite of current
      const next = cleared?'open':'cleared';
      const items = [...g.bank.map(x=>['bank',x.id]),...g.gl.map(x=>['gl',x.id])];
      return `<tr style="${cleared?'':'background:#fff7ed;'}">

        <td>${glDesc}</td><td class="num">${amt(glTot)}</td>
        <td>${bankDesc}</td><td class="num">${amt(bankTot)}</td>
        <td><button onclick='wsClearGroup(${JSON.stringify(items)},"${next}")' style="padding:2px 9px;border:1px solid var(--rule);border-radius:5px;background:#fff;cursor:pointer;font-size:11px;">${cleared?'Reopen':'Accept'}</button></td></tr>`;

      <td style="text-align:center;"><span style="color:#b45309;">○</span></td>
      <td>${esc(it.date||'')}</td>
      <td>${side==='gl'?esc((it.description||'').slice(0,34)):`<span class="muted">${label}</span>`}</td>
      <td class="num">${side==='gl'?amt(it.amount_cents):''}</td>
      <td>${side==='bank'?esc((it.description||'').slice(0,34)):`<span class="muted">${label}</span>`}</td>
      <td class="num">${side==='bank'?amt(it.amount_cents):''}</td><td></td></tr>`;
    const ditRows=(w.open_deposits_in_transit||[]).map(it=>openRow(it,'gl','(in transit)')).join('');
    const ocRows=(w.open_outstanding_checks||[]).map(it=>openRow(it,'gl','(outstanding)')).join('');
    const bankOnlyRows=(w.open_bank_unrecorded||[]).map(it=>openRow(it,'bank','(not in GL)')).join('');
    const tied = w.reconciled;
    d.innerHTML = `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;">
        <h2 class="sec" style="margin:0;">Reconciliation worksheet — ${esc(fmtDate(periodEnd))}</h2>

      <div class="sub" style="margin:6px 0 12px;">Bank ${fmt(w.bank_ending_cents)} + deposits in transit ${fmt(w.deposits_in_transit_cents)} − outstanding checks ${fmt(Math.abs(w.outstanding_checks_cents))} = ${fmt(w.reconciled_balance_cents)}, vs GL book ${fmt(w.gl_balance_cents)}. Accept confirms a match; Reopen disputes it; uncleared GL items carry to next month.</div>
      <table><thead><tr><th>✓</th><th>Date</th><th>GL (book)</th><th class="num">GL amt</th><th>Bank</th><th class="num">Bank amt</th><th></th></tr></thead>
      <tbody>
        ${matchRows||''}
        ${ditRows?`<tr><td colspan="7" style="background:#f8fafc;font-weight:600;font-size:12px;">Deposits in transit (carry forward) — ${fmt(w.deposits_in_transit_cents)}</td></tr>`+ditRows:''}
        ${ocRows?`<tr><td colspan="7" style="background:#f8fafc;font-weight:600;font-size:12px;">Outstanding checks (carry forward) — ${fmt(Math.abs(w.outstanding_checks_cents))}</td></tr>`+ocRows:''}
        ${bankOnlyRows?`<tr><td colspan="7" style="background:#fef2f2;font-weight:600;font-size:12px;color:#b91c1c;">On bank, not in GL — needs review</td></tr>`+bankOnlyRows:''}
      </tbody></table></div>`;

  // Build the structured reconciliation statement data (shared by screen + print).
  function brBuildStatement(rec, items) {
    const all = (items||[]).slice().sort((a,b)=>(a.date_ref||'').localeCompare(b.date_ref||''));
    const dit = all.filter((i)=>i.category==='deposit_in_transit');
    const oc = all.filter((i)=>i.category==='outstanding_check');
    const inLedger = all.filter((i)=>i.category==='bank_only'||i.category==='gl_only');
    const matched = all.filter((i)=>i.category==='matched');
    const bank = Number(rec.bank_ending_balance_cents||0);
    const ditTot = Number(rec.deposits_in_transit_total_cents||0);
    const ocTot = Number(rec.outstanding_checks_total_cents||0); // negative
    const book = Number(rec.gl_ending_balance_cents||0);
    const adjusted = bank + ditTot + ocTot;
    const diff = Number(rec.difference_cents||0);
    const reconciled = Math.abs(diff) <= 1;
    return { dit, oc, inLedger, matched, bank, ditTot, ocTot, book, adjusted, diff, reconciled };
  }

    const statement = `<div class="card" style="margin-top:16px; border-color:var(--navy);">

      <td class="num">${fmt(e.total_debits_cents)}</td></tr>`).join('')
      : '<tr><td colspan="5" class="muted" style="padding:20px; text-align:center;">No journal entries yet.</td></tr>';
    $('body').innerHTML = `<div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h2 class="sec">Journal Entries</h2>
        <button id="je-new" style="padding:7px 14px; border:none; border-radius:6px; background:var(--navy); color:#fff; font-weight:600; cursor:pointer; font-size:13px;">+ New Journal Entry</button>
      </div>
      <table><thead><tr><th>Reference</th><th>Date</th><th>Description</th><th>Source</th><th class="num">Amount</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    $('je-new').addEventListener('click', jeOpenModal);
  }

  // Manual journal-entry posting (ported from the old Books tab). Posts to
  // /api/books/journal-entries; the double-entry constraint is enforced
  // server-side and the Post button only enables when debits = credits.
  const _parseMoney = (v) => { if(!v) return 0; const n=Number(String(v).replace(/[$,\s]/g,'')); return Number.isFinite(n)?Math.round(n*100):0; };
  let _jeLineN = 0;
  async function jeOpenModal() {
    let accounts = [];
    try { accounts = ((await (await fetch(`/api/books/coa?community_id=${CID}`)).json()).accounts || []).filter((a)=>!a.is_summary); }
    catch (e) { alert('Could not load chart of accounts: '+e.message); return; }
    const opts = accounts.map((a)=>`<option value="${esc(a.id)}">${esc(a.account_number)} — ${esc(a.account_name)}</option>`).join('');
    const m = document.createElement('div');
    m.id = 'je-modal';
    m.style.cssText = 'position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:9999; display:flex; align-items:flex-start; justify-content:center; padding:40px 16px; overflow-y:auto;';
    m.innerHTML = `<div class="card" style="max-width:780px; width:100%;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <h2 class="sec">New Journal Entry</h2>
        <button id="je-x" style="background:none; border:none; font-size:20px; cursor:pointer; color:var(--ink-soft);">×</button>
      </div>
      <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:10px;">
        <div style="flex:0 0 150px;"><label class="muted" style="font-size:12px;">Date</label><input type="date" id="je-date" value="${dToday()}" style="padding:7px; width:100%; border:1px solid var(--rule); border-radius:6px;"></div>
        <div style="flex:1 1 320px;"><label class="muted" style="font-size:12px;">Description</label><input type="text" id="je-desc" placeholder="What does this entry record?" style="padding:7px; width:100%; border:1px solid var(--rule); border-radius:6px;"></div>
      </div>
      <table style="width:100%;"><thead><tr><th style="text-align:left;">Account</th><th class="num">Debit</th><th class="num">Credit</th><th style="text-align:left;">Memo</th><th></th></tr></thead><tbody id="je-lines"></tbody></table>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px; flex-wrap:wrap; gap:8px;">
        <button id="je-add" style="padding:6px 12px; border:1px solid var(--rule); border-radius:6px; background:#fff; cursor:pointer; font-size:12.5px;">+ Add line</button>
        <div style="font-size:13px;">Totals: <strong id="je-dr">$0.00</strong> Dr / <strong id="je-cr">$0.00</strong> Cr <span id="je-msg" style="margin-left:10px;"></span></div>
      </div>
      <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:14px;">
        <button id="je-cancel" style="padding:8px 14px; border:1px solid var(--rule); border-radius:6px; background:#fff; cursor:pointer;">Cancel</button>
        <button id="je-post" disabled style="padding:8px 16px; border:none; border-radius:6px; background:#166534; color:#fff; font-weight:600; cursor:pointer; opacity:.5;">Post Entry</button>
      </div></div>`;
    document.body.appendChild(m);
    $('je-x').addEventListener('click', jeCloseModal);
    $('je-cancel').addEventListener('click', jeCloseModal);
    $('je-add').addEventListener('click', ()=>jeAddLine(opts));
    $('je-post').addEventListener('click', jePost);
    _jeLineN = 0;
    jeAddLine(opts); jeAddLine(opts);
    jeUpdateTotals();
  }
  function jeCloseModal() { const m=$('je-modal'); if (m) m.remove(); }
  function jeAddLine(opts) {
    _jeLineN += 1;
    const tr = document.createElement('tr'); tr.id = 'je-line-'+_jeLineN;
    tr.innerHTML = `<td style="padding:4px;"><select class="je-acct" style="width:100%; padding:5px; font-size:12px;"><option value="">— Pick account —</option>${opts}</select></td>
      <td style="padding:4px;"><input type="text" class="je-debit" placeholder="0.00" style="width:90px; padding:5px; text-align:right; font-family:ui-monospace,monospace;"></td>
      <td style="padding:4px;"><input type="text" class="je-credit" placeholder="0.00" style="width:90px; padding:5px; text-align:right; font-family:ui-monospace,monospace;"></td>
      <td style="padding:4px;"><input type="text" class="je-memo" placeholder="Memo (optional)" style="width:100%; padding:5px;"></td>
      <td style="padding:4px; text-align:center;"><button class="je-rm" style="background:none; border:none; color:#991b1b; cursor:pointer; font-size:14px;">×</button></td>`;
    $('je-lines').appendChild(tr);
    tr.querySelector('.je-debit').addEventListener('input', jeUpdateTotals);
    tr.querySelector('.je-credit').addEventListener('input', jeUpdateTotals);
    tr.querySelector('.je-rm').addEventListener('click', ()=>{ tr.remove(); jeUpdateTotals(); });
  }
  function jeUpdateTotals() {
    let dr=0, cr=0;
    document.querySelectorAll('#je-lines tr').forEach((tr)=>{ dr+=_parseMoney(tr.querySelector('.je-debit').value); cr+=_parseMoney(tr.querySelector('.je-credit').value); });
    $('je-dr').textContent = fmt(dr); $('je-cr').textContent = fmt(cr);
    const ok = dr===cr && dr>0;
    $('je-msg').innerHTML = ok ? '<span style="color:#166534; font-weight:600;">✓ Balanced</span>' : (dr===0&&cr===0 ? '' : `<span style="color:#991b1b;">Off by ${fmt(Math.abs(dr-cr))}</span>`);
    const btn=$('je-post'); btn.disabled = !ok; btn.style.opacity = ok ? '1' : '.5';
  }
  async function jePost() {
    const posting_date=$('je-date').value, description=$('je-desc').value.trim();
    if (!posting_date || !description) { alert('Date + description required.'); return; }
    const lines=[];
    document.querySelectorAll('#je-lines tr').forEach((tr)=>{ const account_id=tr.querySelector('.je-acct').value; const d=_parseMoney(tr.querySelector('.je-debit').value); const c=_parseMoney(tr.querySelector('.je-credit').value); const memo=tr.querySelector('.je-memo').value||null; if(account_id&&(d>0||c>0)) lines.push({account_id,debit_cents:d,credit_cents:c,memo}); });
    if (lines.length < 2) { alert('Need at least 2 lines.'); return; }
    const btn=$('je-post'); btn.disabled=true; btn.textContent='Posting…';
    try {
      const j = await (await fetch('/api/books/journal-entries',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({community_id:CID,posting_date,description,source_module:'manual',lines})})).json();
      if (j.error) throw new Error(j.error);
      jeCloseModal(); alert(`Posted ${j.entry?j.entry.reference:'entry'}.`); renderJe();
    } catch (e) { alert('Post failed: '+e.message); btn.disabled=false; btn.textContent='Post Entry'; }
  }

  init();
</script>
</body>
</html>
