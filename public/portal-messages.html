<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Messages · Bedrock Portal</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0B1D34">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="/brand.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #F5F4ED; color: #1a1a1a; font-family: 'Inter', system-ui, sans-serif; font-size: 15px; min-height: 100vh; }

  .header {
    background: linear-gradient(180deg, #0B1D34 0%, #1E2761 100%);
    color: white;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header .back { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 4px 8px; }
  .header h1 { margin: 0; font-size: 17px; font-weight: 600; }
  .header .sub { font-size: 11px; opacity: 0.7; margin-top: 2px; }

  .container { max-width: 760px; margin: 0 auto; padding: 16px; }

  /* Thread list */
  .thread-card {
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .thread-card:active { transform: scale(0.99); }
  .thread-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
  .thread-card .meta-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px;
  }
  .thread-card .prop {
    font-size: 11.5px; color: #6b7280;
  }
  .thread-card .time { font-size: 11.5px; color: #9ca3af; }
  .thread-card .subject { font-size: 15px; font-weight: 600; color: #0B1D34; margin-bottom: 4px; line-height: 1.3; }
  .thread-card .status-tag {
    display: inline-block; font-size: 10.5px; font-weight: 600;
    padding: 3px 9px; border-radius: 10px;
    background: #f3f4f6; color: #4b5563;
  }
  .thread-card .status-tag.awaiting-them { background: #fef3c7; color: #78350f; }
  .thread-card .status-tag.awaiting-you { background: #dbeafe; color: #1e3a8a; }
  .thread-card .status-tag.closing { background: #fef9c3; color: #713f12; }
  .thread-card .status-tag.closed { background: #f3f4f6; color: #6b7280; }
  .thread-card .unread-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: #dc2626; margin-right: 6px; vertical-align: middle;
  }

  .new-message-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #0B1D34;
    color: white;
    border: none;
    border-radius: 28px;
    padding: 14px 22px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(11,29,52,0.3);
    z-index: 5;
  }

  /* Detail / compose view */
  .detail-header {
    background: white;
    padding: 16px 18px 12px;
    border-bottom: 1px solid #e5e7eb;
  }
  .detail-header .prop { font-size: 11.5px; color: #6b7280; margin-bottom: 5px; }
  .detail-header h2 { margin: 0; font-size: 18px; color: #0B1D34; line-height: 1.3; }

  .message {
    background: white;
    border-radius: 10px;
    padding: 12px 14px;
    margin: 8px 0;
    border: 1px solid #e5e7eb;
  }
  .message.from-them { background: #f8fafc; border-color: #e2e8f0; }
  .message.from-you { background: white; border-color: #d4af37; }
  .message.from-system { background: #fef9c3; border-color: #fde68a; font-style: italic; }
  .message .meta {
    font-size: 11px; color: #6b7280; margin-bottom: 5px;
  }
  .message .meta strong { color: #374151; }
  .message .body { font-size: 14.5px; line-height: 1.55; white-space: pre-wrap; }

  .composer {
    position: sticky; bottom: 0; background: white;
    padding: 14px 16px 18px; border-top: 1px solid #e5e7eb;
  }
  .composer textarea {
    width: 100%; min-height: 70px; padding: 12px 14px; font-size: 15px;
    font-family: inherit; border: 1px solid #d0d7de; border-radius: 8px;
    box-sizing: border-box; line-height: 1.4; resize: vertical;
  }
  .composer button {
    margin-top: 8px;
    background: #0B1D34; color: white; border: none;
    border-radius: 8px; padding: 12px 24px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    width: 100%;
  }

  .empty {
    text-align: center; padding: 60px 20px; color: #6b7280;
  }
  .empty .icon { font-size: 48px; margin-bottom: 14px; }
  .empty .title { font-size: 16px; font-weight: 600; color: #374151; margin-bottom: 6px; }
  .empty .sub { font-size: 13px; }

  /* Compose modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(15,23,42,0.55);
    z-index: 100; display: flex; align-items: flex-start; justify-content: center;
    padding: 30px 16px; overflow-y: auto;
  }
  .modal-bg.hidden { display: none; }
  .modal {
    background: white; border-radius: 14px; max-width: 560px; width: 100%;
    padding: 22px 22px 18px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }
  .modal h3 { margin: 0 0 14px; font-size: 17px; color: #0B1D34; }
  .modal .field { margin-bottom: 14px; }
  .modal label { font-size: 12px; font-weight: 600; color: #4a4a4a; display: block; margin-bottom: 4px; }
  .modal select, .modal input, .modal textarea {
    width: 100%; padding: 10px 12px; font-size: 14px; font-family: inherit;
    border: 1px solid #d0d7de; border-radius: 6px; box-sizing: border-box;
  }
  .modal textarea { min-height: 100px; resize: vertical; line-height: 1.4; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .modal-actions button {
    padding: 9px 18px; font-size: 13.5px; font-weight: 600;
    border: 1px solid transparent; border-radius: 6px; cursor: pointer;
  }
  .modal-actions .cancel { background: white; border-color: #d0d7de; color: #4a4a4a; }
  .modal-actions .submit { background: #0B1D34; color: white; }

  @media (max-width: 480px) {
    .new-message-btn { bottom: 16px; right: 16px; padding: 12px 18px; }
  }
</style>
</head>
<body>

<div class="header">
  <button class="back" id="backBtn" onclick="goBack()">←</button>
  <div>
    <h1 id="headerTitle">Messages</h1>
    <div class="sub" id="headerSub"></div>
  </div>
</div>

<div class="container" id="mainView"></div>

<!-- Floating new-message button (only on list view) -->
<button class="new-message-btn" id="newMsgBtn" onclick="openCompose()">＋ New message</button>

<!-- Compose modal -->
<div class="modal-bg hidden" id="composeModal">
  <div class="modal">
    <h3>New message to Bedrock</h3>
    <div class="field" id="composeProp">
      <label>Property</label>
      <select id="composePropSelect"></select>
    </div>
    <div class="field">
      <label>What can we help with?</label>
      <input type="text" id="composeSubject" placeholder="e.g. Pool key fob, ARC question, balance inquiry" maxlength="200">
    </div>
    <div class="field">
      <label>Message</label>
      <textarea id="composeBody" placeholder="Tell us what you need…"></textarea>
    </div>
    <div class="modal-actions">
      <button type="button" class="cancel" onclick="closeCompose()">Cancel</button>
      <button type="button" class="submit" onclick="submitCompose()">Send</button>
    </div>
  </div>
</div>

<script>
'use strict';

let portalScope = null;     // { contact_id, property_ids, communities... }
let allProperties = [];     // list of property objects for the picker
let currentView = 'list';   // 'list' | 'detail'
let currentThread = null;

// -----------------------------
// Bootstrap: verify auth + load
// -----------------------------
async function boot() {
  try {
    const r = await fetch('/api/portal/me', { credentials: 'same-origin' });
    if (r.status === 401) { window.location.href = '/portal-login.html'; return; }
    const me = await r.json();
    portalScope = me;
    allProperties = (me.properties || []).map((p) => ({
      id: p.id,
      address: p.street_address || '(property)',
      community: p.communities?.name || '',
    }));
    loadList();
  } catch (err) {
    document.getElementById('mainView').innerHTML = `<div class="empty"><div class="icon">⚠️</div><div class="title">Couldn't load</div><div class="sub">${esc(err.message)}</div></div>`;
  }
}

function esc(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function timeAgo(iso) {
  if (!iso) return '';
  const ms = Date.now() - new Date(iso).getTime();
  const min = Math.floor(ms / 60000);
  if (min < 1) return 'just now';
  if (min < 60) return min + 'm ago';
  const hr = Math.floor(min / 60);
  if (hr < 24) return hr + 'h ago';
  const d = Math.floor(hr / 24);
  if (d < 7) return d + 'd ago';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function statusLabel(s) {
  switch (s) {
    case 'awaiting_staff_first_response':
    case 'awaiting_staff_followup': return { txt: 'Bedrock is on it', cls: 'awaiting-them' };
    case 'awaiting_homeowner': return { txt: 'Your turn', cls: 'awaiting-you' };
    case 'closure_pending': return { txt: 'Wrapping up', cls: 'closing' };
    case 'closed': return { txt: 'Closed', cls: 'closed' };
    default: return { txt: s, cls: '' };
  }
}

// -----------------------------
// List view
// -----------------------------
async function loadList() {
  currentView = 'list';
  currentThread = null;
  document.getElementById('headerTitle').textContent = 'Messages';
  document.getElementById('headerSub').textContent = '';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('newMsgBtn').style.display = 'block';

  const main = document.getElementById('mainView');
  main.innerHTML = '<div class="empty"><div class="title">Loading…</div></div>';

  try {
    const r = await fetch('/api/portal/messages', { credentials: 'same-origin' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    const threads = j.threads || [];
    if (threads.length === 0) {
      main.innerHTML = `
        <div class="empty">
          <div class="icon">💬</div>
          <div class="title">No messages yet</div>
          <div class="sub">Tap <strong>＋ New message</strong> to start a conversation with Bedrock.</div>
        </div>
      `;
      return;
    }
    main.innerHTML = threads.map((t) => {
      const s = statusLabel(t.next_action_status);
      const prop = t.properties || {};
      const propLine = prop.street_address || '';
      const community = t.communities?.name || '';
      const unreadDot = t.unread_count > 0 ? '<span class="unread-dot"></span>' : '';
      return `
        <div class="thread-card" onclick="openThread('${t.id}')">
          <div class="meta-row">
            <div class="prop">${esc(propLine)}${community ? ' · ' + esc(community) : ''}</div>
            <div class="time">${esc(timeAgo(t.last_message_at || t.created_at))}</div>
          </div>
          <div class="subject">${unreadDot}${esc(t.subject || '(no subject)')}</div>
          <div><span class="status-tag ${s.cls}">${esc(s.txt)}</span></div>
        </div>
      `;
    }).join('');
  } catch (err) {
    main.innerHTML = `<div class="empty"><div class="icon">⚠️</div><div class="title">Couldn't load messages</div><div class="sub">${esc(err.message)}</div></div>`;
  }
}

// -----------------------------
// Detail view
// -----------------------------
async function openThread(threadId) {
  currentView = 'detail';
  document.getElementById('backBtn').style.display = 'inline-block';
  document.getElementById('newMsgBtn').style.display = 'none';

  const main = document.getElementById('mainView');
  main.innerHTML = '<div class="empty"><div class="title">Loading…</div></div>';

  try {
    const r = await fetch('/api/portal/messages/' + encodeURIComponent(threadId), { credentials: 'same-origin' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    currentThread = j.thread;
    const prop = j.thread.properties || {};
    const community = j.thread.communities?.name || '';
    document.getElementById('headerTitle').textContent = j.thread.subject || 'Message';
    document.getElementById('headerSub').textContent = (prop.street_address || '') + (community ? ' · ' + community : '');

    const isClosed = j.thread.next_action_status === 'closed';
    const msgHtml = (j.messages || []).map((m) => {
      const cls = m.direction === 'inbound' ? 'from-you' : (m.sender_type === 'system' ? 'from-system' : 'from-them');
      const who = m.direction === 'inbound' ? 'You' : (m.sender_display_name || (m.sender_type === 'claire' ? 'Claire (Bedrock AI)' : 'Bedrock'));
      const time = new Date(m.created_at).toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short', timeZone: 'America/Chicago' }) + ' CT';
      return `
        <div class="message ${cls}">
          <div class="meta"><strong>${esc(who)}</strong> · ${esc(time)}</div>
          <div class="body">${esc(m.body_text)}</div>
        </div>
      `;
    }).join('');

    const composerHtml = !isClosed ? `
      <div class="composer">
        <textarea id="replyText" placeholder="Type your reply…"></textarea>
        <button type="button" onclick="sendReply('${j.thread.id}')">Send</button>
      </div>
    ` : '<div class="empty"><div class="sub">This conversation is closed. Tap ＋ New message to start a new one.</div></div>';

    main.innerHTML = msgHtml + composerHtml;
    // Scroll to bottom of conversation
    setTimeout(() => window.scrollTo(0, document.body.scrollHeight), 50);
  } catch (err) {
    main.innerHTML = `<div class="empty"><div class="icon">⚠️</div><div class="title">Couldn't load conversation</div><div class="sub">${esc(err.message)}</div></div>`;
  }
}

async function sendReply(threadId) {
  const txt = document.getElementById('replyText');
  const body = (txt?.value || '').trim();
  if (!body) return;
  try {
    const r = await fetch('/api/portal/messages/' + encodeURIComponent(threadId) + '/reply', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ body_text: body }),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    if (txt) txt.value = '';
    await openThread(threadId);
  } catch (err) {
    alert('Send failed: ' + err.message);
  }
}

// -----------------------------
// Compose new
// -----------------------------
function openCompose() {
  const sel = document.getElementById('composePropSelect');
  const wrap = document.getElementById('composeProp');
  // Hide picker if only one property
  if (allProperties.length <= 1) {
    wrap.style.display = 'none';
    if (allProperties[0]) sel.innerHTML = `<option value="${esc(allProperties[0].id)}">${esc(allProperties[0].address)}</option>`;
  } else {
    wrap.style.display = 'block';
    sel.innerHTML = allProperties.map((p) => `<option value="${esc(p.id)}">${esc(p.address)}${p.community ? ' · ' + esc(p.community) : ''}</option>`).join('');
  }
  document.getElementById('composeSubject').value = '';
  document.getElementById('composeBody').value = '';
  document.getElementById('composeModal').classList.remove('hidden');
}

function closeCompose() {
  document.getElementById('composeModal').classList.add('hidden');
}

async function submitCompose() {
  const property_id = document.getElementById('composePropSelect').value;
  const subject = document.getElementById('composeSubject').value.trim();
  const body_text = document.getElementById('composeBody').value.trim();
  if (!property_id) { alert('Pick a property.'); return; }
  if (!subject) { alert('What can we help with? Add a short subject.'); return; }
  if (!body_text) { alert('Type your message.'); return; }
  try {
    const r = await fetch('/api/portal/messages', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ property_id, subject, body_text }),
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    closeCompose();
    if (j.thread?.id) await openThread(j.thread.id);
    else await loadList();
  } catch (err) {
    alert('Send failed: ' + err.message);
  }
}

function goBack() {
  if (currentView === 'detail') loadList();
  else window.location.href = '/portal.html';
}

boot();
</script>

</body>
</html>
